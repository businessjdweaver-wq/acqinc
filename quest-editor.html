    return '<option value="' + esc(c.id) + '"' + selAttr + '>' + esc(c.label) + '</option>';
  }).join('');
  if (t && t.category && !CONDITION_CATEGORIES.some(function(c){return c.id===t.category;})) {
    catOpts = '<option value="' + esc(t.category) + '" selected>' + esc(t.category) + ' (custom)</option>' + catOpts;
  }

  // Duration mode dropdown — conditions often have a lifecycle
  // (instantaneous, until-end-of-scene, N-rounds, until-cured, permanent).
  var durOpts = [
    {v:'instant',   l:'Instantaneous'},
    {v:'scene',     l:'Until end of scene'},
    {v:'rounds',    l:'N rounds / turns'},
    {v:'save',      l:'Until save succeeds'},
    {v:'rest',      l:'Until next rest'},
    {v:'cured',     l:'Until cured / removed'},
    {v:'permanent', l:'Permanent'}
  ];
  var durVal = (t && t.duration) || 'scene';
  var durOptsHtml = durOpts.map(function(o){
    return '<option value="'+esc(o.v)+'"'+(durVal===o.v?' selected':'')+'>'+esc(o.l)+'</option>';
  }).join('');

  var roAttr = canEdit ? '' : ' readonly disabled';
  fi.innerHTML =
    '<div id="form-title-row">' +
      '<div id="form-heading">🩹 ' + (isNew ? 'New Condition' : esc(t.label || t.content_key)) + '</div>' +
    '</div>' +

    (canEdit ? '' :
      '<div style="padding:10px 12px;background:rgba(26,107,138,.08);border:1px solid var(--border2);' +
      'border-radius:4px;margin-bottom:10px;font-size:.85em;color:var(--ink2);font-style:italic">' +
      'You are viewing this condition in read-only mode. Only the admin can modify the official vocabulary.</div>') +

    '<div class="fsec">' +
      '<div class="fsec-title">Identity</div>' +
      '<div class="fgrid c2">' +
        frow('Label *', '<input type="text" id="cf-label" value="' + esc(t ? (t.label||'') : '') +
          '" placeholder="e.g. Blinded"' + roAttr + '>') +
        frow('ID / Key *', '<input type="text" id="cf-key" value="' + esc(t ? t.content_key : '') +
          '" placeholder="e.g. blinded (lowercase, underscores)"' +
          (isNew && canEdit ? '' : ' readonly') + ' style="font-family:monospace">') +
      '</div>' +
      '<div class="fgrid c2" style="margin-top:10px">' +
        frow('Category *', '<select id="cf-cat"' + roAttr + '>' + catOpts + '</select>') +
        frow('Default Duration', '<select id="cf-dur"' + roAttr + '>' + durOptsHtml + '</select>') +
      '</div>' +
      '<div class="fgrid c1" style="margin-top:10px">' +
        frow('Description', '<textarea id="cf-desc" rows="3" placeholder="What does this condition do mechanically and narratively?"' +
          roAttr + '>' + esc(t ? (t.desc||'') : '') + '</textarea>') +
        frow('Sort Order', '<input type="number" id="cf-sort" value="' +
          (t && typeof t.sort_order === 'number' ? t.sort_order : 9999) +
          '" min="0" step="1"' + roAttr + '>') +
      '</div>' +
    '</div>' +

    (canEdit ? (
      '<div id="action-row">' +
        '<button class="btn btn-save" id="cf-save">💾 Save Condition</button>' +
        (!isNew && t && t._ownerUserId === ADMIN_UID ? '<button class="btn btn-del" id="cf-del">🗑 Delete</button>' : '') +
        (!isNew ? '<button class="btn btn-new" id="cf-dupe">⧉ Duplicate</button>' : '') +
        '<button class="btn btn-new" id="cf-new" style="margin-left:auto">+ New Condition</button>' +
        '<span id="save-flash"></span>' +
      '</div>'
    ) : '');

  if (!canEdit) return;

  document.getElementById('cf-save').onclick = function() {
    var label = (document.getElementById('cf-label').value || '').trim();
    var rawKey = (document.getElementById('cf-key').value || '').trim().toLowerCase();
    var slugKey = rawKey.replace(/[^a-z0-9_]/g,'_').replace(/^_+|_+$/g,'');
    var cat   = document.getElementById('cf-cat').value || 'physical';
    var dur   = document.getElementById('cf-dur').value || 'scene';
    var desc  = (document.getElementById('cf-desc').value || '').trim();
    var srt   = parseInt(document.getElementById('cf-sort').value, 10);
    if (isNaN(srt)) srt = 9999;
    if (!label || !slugKey) { alert('Label and ID are required.'); return; }
    if (isNew && conditions.some(function(x){return x.content_key===slugKey;})) {
      alert('A condition with ID "' + slugKey + '" already exists. Choose a different ID.');
      return;
    }
    var row = {
      content_type: 'condition',
      content_key:  slugKey,
      title:        label,
      owner_user_id: ADMIN_UID,
      visibility:   'official',
      status:       'published',
      sort_order:   srt,
      data: { category: cat, label: label, desc: desc, duration: dur }
    };
    sbUpsert(row).then(function(){
      flash('✓ Condition saved');
      return pullData();
    }).then(function(){
      sel = { kind: 'condition', key: slugKey };
      activeTab = 'conditions';
      renderList();
      showConditionForm(slugKey);
    }).catch(function(err){
      alert('Save failed: ' + (err.message || err));
    });
  };

  if (!isNew && t && t._ownerUserId === ADMIN_UID) {
    document.getElementById('cf-del').onclick = function() {
      if (prompt('Type DELETE to confirm removing condition "' + (t.label||t.content_key) + '". ' +
        'Outcome templates referencing this condition will retain the dangling reference until re-saved.') !== 'DELETE') {
        alert('Cancelled.'); return;
      }
      var filter = 'content_type=eq.condition' +
        '&content_key=eq.' + encodeURIComponent(t.content_key) +
        '&owner_user_id=eq.' + encodeURIComponent(ADMIN_UID);
      sbDelete(filter).then(function(){
        flash('✓ Condition deleted');
        return pullData();
      }).then(function(){
        sel = null;
        activeTab = 'conditions';
        renderList();
        showPlaceholder();
      }).catch(function(err){
        alert('Delete failed: ' + (err.message || err));
      });
    };
  }

  if (!isNew) {
    document.getElementById('cf-dupe').onclick = function() {
      var dupeKey = t.content_key + '_copy';
      var n = 2;
      while (conditions.some(function(x){return x.content_key===dupeKey;})) {
        dupeKey = t.content_key + '_copy' + (n++);
      }
      sel = { kind: 'condition', key: null };
      activeTab = 'conditions';
      var preview = {
        content_key: dupeKey,
        label: (t.label || t.content_key) + ' (copy)',
        category: t.category,
        desc: t.desc || '',
        duration: t.duration || 'scene',
        sort_order: (typeof t.sort_order === 'number' ? t.sort_order : 9999)
      };
      showConditionForm(null);
      document.getElementById('cf-label').value = preview.label;
      document.getElementById('cf-key').value = preview.content_key;
      document.getElementById('cf-cat').value = preview.category;
      document.getElementById('cf-dur').value = preview.duration;
      document.getElementById('cf-desc').value = preview.desc;
      document.getElementById('cf-sort').value = preview.sort_order;
    };
  }

  document.getElementById('cf-new').onclick = function() {
    sel = { kind: 'condition', key: null };
    activeTab = 'conditions';
    showConditionForm(null);
  };
}

// ══════════════════════════════════════════════════
// OUTCOME TEMPLATES (v1.682 — Phase 2 Post-Quest Resolution)
// Admin-only CRUD over outcome templates. An outcome template bundles a
// set of discrete effects (apply condition, grant XP, award trait,
// inflict damage, grant item) that fire when a quest resolves against
// this template. Richer than Terrain/Conditions because the form has
// a repeating Effects list — each row picks a type, target, and value.
// Phase 1 already plumbed `outcomeTemplates` state array + pull-path
// branch + vocabFilter inclusion.
// ══════════════════════════════════════════════════
var OUTCOME_CATEGORIES = [
  {id:'success',      label:'Success',           color:'var(--forest)'},
  {id:'partial',      label:'Partial Success',   color:'var(--teal)'},
  {id:'setback',      label:'Setback',           color:'var(--gold)'},
  {id:'failure',      label:'Failure',           color:'var(--crimson)'},
  {id:'twist',        label:'Twist / Complication', color:'var(--purple)'},
  {id:'bonus',        label:'Bonus / Discovery', color:'var(--teal)'}
];
function outcomeCategoryLabel(id) {
  var c = OUTCOME_CATEGORIES.filter(function(x){return x.id===id;})[0];
  return c ? c.label : (id || 'Other');
}

// Effect types that an outcome row can apply. Stored verbatim in data.effects[].
var OUTCOME_EFFECT_TYPES = [
  {v:'apply_condition', l:'Apply condition'},
  {v:'remove_condition', l:'Remove condition'},
  {v:'grant_xp', l:'Grant XP'},
  {v:'grant_trait', l:'Grant trait'},
  {v:'remove_trait', l:'Remove trait'},
  {v:'damage', l:'Inflict damage'},
  {v:'heal', l:'Heal HP'},
  {v:'grant_item', l:'Grant item'},
  {v:'gold', l:'Gold change'},
  {v:'qp', l:'QP change'},
  {v:'narrative', l:'Narrative note'}
];
// Who the effect targets
var OUTCOME_TARGETS = [
  {v:'party', l:'Entire party'},
  {v:'each_member', l:'Each squad member'},
  {v:'leader', l:'Squad leader'},
  {v:'contact', l:'Assigned contact NPC'},
  {v:'random', l:'Random member'},
  {v:'franchise', l:'Franchise'}
];

function renderOutcomeList() {
  var el = document.getElementById('list-scroll');
  if (!uid()) { el.innerHTML = '<div class="list-empty">Log in to load outcomes.</div>'; return; }
  if (!outcomeTemplates.length) {
    el.innerHTML = '<div class="list-empty">No outcome templates loaded. Click ↓ to pull from Supabase.</div>';
    return;
  }
  var groups = {};
  outcomeTemplates.forEach(function(t) {
    var cat = t.category || 'Other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  });
  Object.keys(groups).forEach(function(cat) {
    groups[cat].sort(function(a,b) {
      var sa = typeof a.sort_order === 'number' ? a.sort_order : 9999;
      var sb = typeof b.sort_order === 'number' ? b.sort_order : 9999;
      if (sa !== sb) return sa - sb;
      return (a.label||'').localeCompare(b.label||'');
    });
  });
  var html = '';
  if (!isAdmin()) {
    html += '<div style="padding:10px 12px;background:rgba(26,107,138,.08);' +
      'border-bottom:1px solid var(--border2);font-size:.78em;color:var(--ink2);' +
      'font-style:italic">👁 Read-only — only the admin can edit outcome templates.</div>';
  }
  var ordered = OUTCOME_CATEGORIES.map(function(c){return c.id;});
  var catKeys = Object.keys(groups).sort(function(a,b) {
    var ia = ordered.indexOf(a); var ib = ordered.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
  catKeys.forEach(function(cat) {
    var label = outcomeCategoryLabel(cat);
    html += '<div style="padding:6px 12px 3px;font-family:\'Cinzel\',serif;font-size:.7em;' +
      'text-transform:uppercase;letter-spacing:.05em;color:var(--gold);' +
      'border-top:1px solid var(--border2);margin-top:4px">' + esc(label) +
      ' <span style="color:var(--ink2);font-weight:normal">(' + groups[cat].length + ')</span></div>';
    groups[cat].forEach(function(t) {
      var isSel = sel && sel.kind === 'outcome' && sel.key === t.content_key;
      var adminOwned = t._ownerUserId === ADMIN_UID;
      var badge = adminOwned
        ? '<span class="qbadge" style="border-color:var(--gold);color:var(--gold)">official</span>'
        : '<span class="qbadge">custom</span>';
      var fxCount = (t.effects && t.effects.length) || 0;
      html += '<div class="quest-row ' + (isSel ? 'sel' : '') +
        '" data-sel-outcome="' + esc(t.content_key) + '">' +
        '<span class="quest-row-title" style="flex:1">' + esc(t.label || t.content_key) + '</span>' +
        '<span style="color:var(--ink2);font-size:.72em;margin-right:6px">' + fxCount + ' fx</span>' +
        badge +
        '</div>';
    });
  });
  el.innerHTML = html;
  el.onclick = function(e) {
    var row = e.target.closest('[data-sel-outcome]');
    if (!row) return;
    var key = row.getAttribute('data-sel-outcome');
    sel = { kind: 'outcome', key: key };
    renderOutcomeList();
    showOutcomeForm(key);
  };
}

// Render a single effect-row editor. Stateful — reads from/writes to the
// shared _outcomeEditingEffects array in showOutcomeForm's closure.
function _renderOutcomeEffectRow(fx, idx, canEdit) {
  var typeOpts = OUTCOME_EFFECT_TYPES.map(function(o){
    return '<option value="'+esc(o.v)+'"'+(fx.type===o.v?' selected':'')+'>'+esc(o.l)+'</option>';
  }).join('');
  var targetOpts = OUTCOME_TARGETS.map(function(o){
    return '<option value="'+esc(o.v)+'"'+(fx.target===o.v?' selected':'')+'>'+esc(o.l)+'</option>';
  }).join('');
  var roAttr = canEdit ? '' : ' disabled';
  return '<div class="outcome-fx-row" data-fx-idx="'+idx+'" style="border:1px solid var(--border2);border-radius:5px;padding:8px;margin-bottom:8px;background:rgba(201,146,42,.03)">' +
    '<div class="fgrid c2" style="margin-bottom:6px">' +
      frow('Effect', '<select class="of-type" data-fx-idx="'+idx+'"'+roAttr+'>'+typeOpts+'</select>') +
      frow('Target', '<select class="of-target" data-fx-idx="'+idx+'"'+roAttr+'>'+targetOpts+'</select>') +
    '</div>' +
    '<div class="fgrid c2">' +
      frow('Reference key', '<input type="text" class="of-ref" data-fx-idx="'+idx+'" value="'+esc(fx.ref||'')+'" placeholder="e.g. blinded, historian_xp, fire"'+roAttr+' style="font-family:monospace">') +
      frow('Value / amount', '<input type="text" class="of-val" data-fx-idx="'+idx+'" value="'+esc(fx.value==null?'':String(fx.value))+'" placeholder="e.g. 1, 10, 50"'+roAttr+'>') +
    '</div>' +
    '<div class="fgrid c1" style="margin-top:6px">' +
      frow('Note (optional)', '<input type="text" class="of-note" data-fx-idx="'+idx+'" value="'+esc(fx.note||'')+'" placeholder="flavor text shown to player"'+roAttr+'>') +
    '</div>' +
    (canEdit ? '<div style="display:flex;justify-content:flex-end;margin-top:6px"><button class="btn btn-del" data-fx-remove="'+idx+'" style="font-size:.7em;padding:3px 8px">\u2715 Remove</button></div>' : '') +
    '</div>';
}

function showOutcomeForm(key) {
  var t = outcomeTemplates.filter(function(x){return x.content_key===key;})[0] || null;
  var isNew = !t;
  var canEdit = isAdmin();
  var fi = document.getElementById('form-inner');

  // Consume any transient prefill from a preceding Duplicate click. Cleared
  // immediately so future New Outcome clicks don't pick up stale prefill.
  var _prefill = (isNew && window._outcomePrefill) ? window._outcomePrefill : null;
  if (window._outcomePrefill) window._outcomePrefill = null;

  // Working copy of effects (so add/remove doesn't mutate the shared array
  // until Save). Clone deep enough for our shape.
  var _effects;
  if (_prefill) {
    _effects = (_prefill.effects||[]).map(function(f){
      return {type:f.type||'narrative', target:f.target||'party', ref:f.ref||'', value:f.value==null?'':f.value, note:f.note||''};
    });
  } else {
    _effects = (t && Array.isArray(t.effects)) ? t.effects.map(function(f){
      return {type:f.type||'narrative', target:f.target||'party', ref:f.ref||'', value:f.value==null?'':f.value, note:f.note||''};
    }) : [];
  }

  // Same for other fields — prefill takes precedence over t (which is null here)
  var _initLabel = _prefill ? _prefill.label : (t ? (t.label||'') : '');
  var _initKey   = _prefill ? _prefill.content_key : (t ? t.content_key : '');
  var _initCat   = _prefill ? _prefill.category : (t ? t.category : null);
  var _initDesc  = _prefill ? _prefill.desc : (t ? (t.desc||'') : '');
  var _initSort  = _prefill ? _prefill.sort_order : (t && typeof t.sort_order === 'number' ? t.sort_order : 9999);

  var catOpts = OUTCOME_CATEGORIES.map(function(c) {
    var selAttr = (_initCat === c.id) ? ' selected' : '';
    return '<option value="' + esc(c.id) + '"' + selAttr + '>' + esc(c.label) + '</option>';
  }).join('');
  if (_initCat && !OUTCOME_CATEGORIES.some(function(c){return c.id===_initCat;})) {
    catOpts = '<option value="' + esc(_initCat) + '" selected>' + esc(_initCat) + ' (custom)</option>' + catOpts;
  }

  function renderEffectsPanel() {
    var panel = document.getElementById('of-fx-panel');
    if (!panel) return;
    if (!_effects.length) {
      panel.innerHTML = '<div style="font-style:italic;color:var(--ink2);padding:8px 0;font-size:.85em">No effects yet. ' + (canEdit ? 'Click "+ Add Effect" to build this outcome.' : '') + '</div>';
      return;
    }
    panel.innerHTML = _effects.map(function(fx,i){return _renderOutcomeEffectRow(fx,i,canEdit);}).join('');
    // Bind change events so edits flow back into _effects
    if (canEdit) {
      panel.querySelectorAll('.of-type').forEach(function(el){
        el.onchange = function(){ var i=+el.getAttribute('data-fx-idx'); _effects[i].type = el.value; };
      });
      panel.querySelectorAll('.of-target').forEach(function(el){
        el.onchange = function(){ var i=+el.getAttribute('data-fx-idx'); _effects[i].target = el.value; };
      });
      panel.querySelectorAll('.of-ref').forEach(function(el){
        el.oninput = function(){ var i=+el.getAttribute('data-fx-idx'); _effects[i].ref = el.value; };
      });
      panel.querySelectorAll('.of-val').forEach(function(el){
        el.oninput = function(){ var i=+el.getAttribute('data-fx-idx'); _effects[i].value = el.value; };
      });
      panel.querySelectorAll('.of-note').forEach(function(el){
        el.oninput = function(){ var i=+el.getAttribute('data-fx-idx'); _effects[i].note = el.value; };
      });
      panel.querySelectorAll('[data-fx-remove]').forEach(function(el){
        el.onclick = function(){
          var i=+el.getAttribute('data-fx-remove');
          _effects.splice(i,1);
          renderEffectsPanel();
        };
      });
    }
  }

  var roAttr = canEdit ? '' : ' readonly disabled';
  fi.innerHTML =
    '<div id="form-title-row">' +
      '<div id="form-heading">🎲 ' + (isNew ? 'New Outcome Template' : esc(t.label || t.content_key)) + '</div>' +
    '</div>' +

    (canEdit ? '' :
      '<div style="padding:10px 12px;background:rgba(26,107,138,.08);border:1px solid var(--border2);' +
      'border-radius:4px;margin-bottom:10px;font-size:.85em;color:var(--ink2);font-style:italic">' +
      'You are viewing this outcome in read-only mode. Only the admin can modify outcome templates.</div>') +

    '<div class="fsec">' +
      '<div class="fsec-title">Identity</div>' +
      '<div class="fgrid c2">' +
        frow('Label *', '<input type="text" id="of-label" value="' + esc(_initLabel) +
          '" placeholder="e.g. Pyrrhic Victory"' + roAttr + '>') +
        frow('ID / Key *', '<input type="text" id="of-key" value="' + esc(_initKey) +
          '" placeholder="e.g. pyrrhic_victory"' +
          (isNew && canEdit ? '' : ' readonly') + ' style="font-family:monospace">') +
      '</div>' +
      '<div class="fgrid c1" style="margin-top:10px">' +
        frow('Category *', '<select id="of-cat"' + roAttr + '>' + catOpts + '</select>') +
        frow('Description', '<textarea id="of-desc" rows="2" placeholder="What narrative does this outcome represent?"' +
          roAttr + '>' + esc(_initDesc) + '</textarea>') +
        frow('Sort Order', '<input type="number" id="of-sort" value="' + _initSort +
          '" min="0" step="1"' + roAttr + '>') +
      '</div>' +
    '</div>' +

    '<div class="fsec">' +
      '<div class="fsec-title">Effects</div>' +
      '<div style="font-size:.78em;color:var(--ink2);margin-bottom:6px">Each effect fires when the outcome resolves. Reference keys link to traits / conditions by content_key; values are numeric amounts or item names as appropriate.</div>' +
      '<div id="of-fx-panel"></div>' +
      (canEdit ? '<button class="btn btn-new" id="of-add-fx" style="margin-top:4px">+ Add Effect</button>' : '') +
    '</div>' +

    (canEdit ? (
      '<div id="action-row">' +
        '<button class="btn btn-save" id="of-save">💾 Save Outcome</button>' +
        (!isNew && t && t._ownerUserId === ADMIN_UID ? '<button class="btn btn-del" id="of-del">🗑 Delete</button>' : '') +
        (!isNew ? '<button class="btn btn-new" id="of-dupe">⧉ Duplicate</button>' : '') +
        '<button class="btn btn-new" id="of-new" style="margin-left:auto">+ New Outcome</button>' +
        '<span id="save-flash"></span>' +
      '</div>'
    ) : '');

  renderEffectsPanel();

  if (!canEdit) return;

  document.getElementById('of-add-fx').onclick = function() {
    _effects.push({type:'narrative', target:'party', ref:'', value:'', note:''});
    renderEffectsPanel();
  };

  document.getElementById('of-save').onclick = function() {
    var label = (document.getElementById('of-label').value || '').trim();
    var rawKey = (document.getElementById('of-key').value || '').trim().toLowerCase();
    var slugKey = rawKey.replace(/[^a-z0-9_]/g,'_').replace(/^_+|_+$/g,'');
    var cat   = document.getElementById('of-cat').value || 'success';
    var desc  = (document.getElementById('of-desc').value || '').trim();
    var srt   = parseInt(document.getElementById('of-sort').value, 10);
    if (isNaN(srt)) srt = 9999;
    if (!label || !slugKey) { alert('Label and ID are required.'); return; }
    if (isNew && outcomeTemplates.some(function(x){return x.content_key===slugKey;})) {
      alert('An outcome template with ID "' + slugKey + '" already exists. Choose a different ID.');
      return;
    }
    // Normalize effect values: coerce purely-numeric strings to numbers so
    // downstream math works. Non-numeric values (e.g. item names) stay strings.
    var cleanFx = _effects.map(function(f){
      var v = f.value;
      if (typeof v === 'string') {
        var trimmed = v.trim();
        if (trimmed !== '' && /^-?\d+(\.\d+)?$/.test(trimmed)) v = Number(trimmed);
        else v = trimmed;
      }
      return {
        type: f.type||'narrative',
        target: f.target||'party',
        ref: (f.ref||'').trim(),
        value: v,
        note: (f.note||'').trim()
      };
    });
    var row = {
      content_type: 'outcome_template',
      content_key:  slugKey,
      title:        label,
      owner_user_id: ADMIN_UID,
      visibility:   'official',
      status:       'published',
      sort_order:   srt,
      data: { category: cat, label: label, desc: desc, effects: cleanFx }
    };
    sbUpsert(row).then(function(){
      flash('✓ Outcome saved');
      return pullData();
    }).then(function(){
      sel = { kind: 'outcome', key: slugKey };
      activeTab = 'outcomes';
      renderList();
      showOutcomeForm(slugKey);
    }).catch(function(err){
      alert('Save failed: ' + (err.message || err));
    });
  };

  if (!isNew && t && t._ownerUserId === ADMIN_UID) {
    document.getElementById('of-del').onclick = function() {
      if (prompt('Type DELETE to confirm removing outcome "' + (t.label||t.content_key) + '". ' +
        'Quests referencing this outcome will retain the dangling reference until re-saved.') !== 'DELETE') {
        alert('Cancelled.'); return;
      }
      var filter = 'content_type=eq.outcome_template' +
        '&content_key=eq.' + encodeURIComponent(t.content_key) +
        '&owner_user_id=eq.' + encodeURIComponent(ADMIN_UID);
      sbDelete(filter).then(function(){
        flash('✓ Outcome deleted');
        return pullData();
      }).then(function(){
        sel = null;
        activeTab = 'outcomes';
        renderList();
        showPlaceholder();
      }).catch(function(err){
        alert('Delete failed: ' + (err.message || err));
      });
    };
  }

  if (!isNew) {
    document.getElementById('of-dupe').onclick = function() {
      var dupeKey = t.content_key + '_copy';
      var n = 2;
      while (outcomeTemplates.some(function(x){return x.content_key===dupeKey;})) {
        dupeKey = t.content_key + '_copy' + (n++);
      }
      // Stash prefill values on a transient global that showOutcomeForm
      // picks up on its next invocation (when key===null). Cleared after
      // consumption to prevent leaking into subsequent New Outcome clicks.
      window._outcomePrefill = {
        label: (t.label || t.content_key) + ' (copy)',
        content_key: dupeKey,
        category: t.category || 'success',
        desc: t.desc || '',
        sort_order: (typeof t.sort_order === 'number' ? t.sort_order : 9999),
        effects: (t.effects||[]).map(function(f){
          return {type:f.type||'narrative', target:f.target||'party', ref:f.ref||'', value:f.value==null?'':f.value, note:f.note||''};
        })
      };
      sel = { kind: 'outcome', key: null };
      activeTab = 'outcomes';
      showOutcomeForm(null);
    };
  }

  document.getElementById('of-new').onclick = function() {
    sel = { kind: 'outcome', key: null };
    activeTab = 'outcomes';
    showOutcomeForm(null);
  };
}

// ══════════════════════════════════════════════════
// MONSTERS (v1.683 — Phase 2 Post-Quest Resolution)
// Any author can create monsters (row stored with owner_user_id = uid()).
// Admin-owned monsters render as "official". Shared/official monsters
// from any owner are visible in the list ("Pull from Workshop"). Editing
// and deletion are gated per-row by ownership: you can only edit your
// own drafts. Richer form than the vocab tabs: HP / AC / speed / CR +
// attack notation + multi-select traits drawn from the existing traits
// vocabulary.
// ══════════════════════════════════════════════════
var MONSTER_CATEGORIES = [
  {id:'humanoid',    label:'Humanoid',       color:'var(--gold)'},
  {id:'beast',       label:'Beast',          color:'var(--forest)'},
  {id:'undead',      label:'Undead',         color:'var(--crimson)'},
  {id:'fiend',       label:'Fiend',          color:'var(--crimson)'},
  {id:'fey',         label:'Fey',            color:'var(--teal)'},
  {id:'construct',   label:'Construct',      color:'var(--ink2)'},
  {id:'elemental',   label:'Elemental',      color:'var(--teal)'},
  {id:'dragon',      label:'Dragon',         color:'var(--gold)'},
  {id:'aberration',  label:'Aberration',     color:'var(--purple)'},
  {id:'plant',       label:'Plant',          color:'var(--forest)'},
  {id:'other',       label:'Other',          color:'var(--ink2)'}
];
function monsterCategoryLabel(id) {
  var c = MONSTER_CATEGORIES.filter(function(x){return x.id===id;})[0];
  return c ? c.label : (id || 'Other');
}

function renderMonsterList() {
  var el = document.getElementById('list-scroll');
  if (!uid()) { el.innerHTML = '<div class="list-empty">Log in to load monsters.</div>'; return; }
  if (!monsters.length) {
    el.innerHTML = '<div class="list-empty">No monsters loaded. Click ↓ to pull from Supabase, or + Monster to create one.</div>';
    return;
  }
  var groups = {};
  monsters.forEach(function(m) {
    var cat = m.category || 'other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(m);
  });
  Object.keys(groups).forEach(function(cat) {
    groups[cat].sort(function(a,b) {
      var sa = typeof a.sort_order === 'number' ? a.sort_order : 9999;
      var sb = typeof b.sort_order === 'number' ? b.sort_order : 9999;
      if (sa !== sb) return sa - sb;
      // Then by CR asc
      var ca = typeof a.cr === 'number' ? a.cr : 999;
      var cb = typeof b.cr === 'number' ? b.cr : 999;
      if (ca !== cb) return ca - cb;
      return (a.label||'').localeCompare(b.label||'');
    });
  });
  var html = '';
  var ordered = MONSTER_CATEGORIES.map(function(c){return c.id;});
  var catKeys = Object.keys(groups).sort(function(a,b) {
    var ia = ordered.indexOf(a); var ib = ordered.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
  catKeys.forEach(function(cat) {
    var label = monsterCategoryLabel(cat);
    html += '<div style="padding:6px 12px 3px;font-family:\'Cinzel\',serif;font-size:.7em;' +
      'text-transform:uppercase;letter-spacing:.05em;color:var(--gold);' +
      'border-top:1px solid var(--border2);margin-top:4px">' + esc(label) +
      ' <span style="color:var(--ink2);font-weight:normal">(' + groups[cat].length + ')</span></div>';
    groups[cat].forEach(function(m) {
      var isSel = sel && sel.kind === 'monster' && sel.key === m.content_key;
      var adminOwned = m._ownerUserId === ADMIN_UID;
      var mine = m._ownerUserId === uid();
      var badge;
      if (adminOwned) {
        badge = '<span class="qbadge" style="border-color:var(--gold);color:var(--gold)">official</span>';
      } else if (mine) {
        badge = '<span class="qbadge" style="border-color:var(--teal);color:var(--teal)">mine</span>';
      } else {
        badge = '<span class="qbadge">shared</span>';
      }
      var crTxt = (typeof m.cr === 'number') ? ('CR '+m.cr) : '';
      var hpTxt = (typeof m.hp === 'number' && m.hp > 0) ? (m.hp+' HP') : '';
      var meta = [crTxt, hpTxt].filter(Boolean).join(' · ');
      html += '<div class="quest-row ' + (isSel ? 'sel' : '') +
        '" data-sel-monster="' + esc(m.content_key) + '">' +
        '<span class="quest-row-title" style="flex:1">' + esc(m.label || m.content_key) + '</span>' +
        '<span style="color:var(--ink2);font-size:.72em;margin-right:6px">' + esc(meta) + '</span>' +
        badge +
        '</div>';
    });
  });
  el.innerHTML = html;
  el.onclick = function(e) {
    var row = e.target.closest('[data-sel-monster]');
    if (!row) return;
    var key = row.getAttribute('data-sel-monster');
    sel = { kind: 'monster', key: key };
    renderMonsterList();
    showMonsterForm(key);
  };
}

function showMonsterForm(key) {
  var m = monsters.filter(function(x){return x.content_key===key;})[0] || null;
  var isNew = !m;
  // Edit gate: owners of the row can edit. Admins can edit admin-owned rows.
  // Shared monsters from other authors are read-only; user can Duplicate them
  // into their own draft to customize.
  var canEdit = isNew || (m && m._ownerUserId === uid());
  var fi = document.getElementById('form-inner');

  // Consume transient prefill from Duplicate (same pattern as Outcomes)
  var _prefill = (isNew && window._monsterPrefill) ? window._monsterPrefill : null;
  if (window._monsterPrefill) window._monsterPrefill = null;

  // Initial field values — prefill wins, then row, then blank
  var src = _prefill || m || {};
  var _initLabel = src.label || '';
  var _initKey   = _prefill ? _prefill.content_key : (m ? m.content_key : '');
  var _initCat   = src.category || 'humanoid';
  var _initSize  = src.size || 'medium';
  var _initCR    = (typeof src.cr === 'number') ? src.cr : 0;
  var _initHP    = (typeof src.hp === 'number') ? src.hp : 1;
  var _initAC    = (typeof src.ac === 'number') ? src.ac : 10;
  var _initSpeed = src.speed || '30 ft';
  var _initAttack = src.attack || '';
  var _initDesc  = src.desc || '';
  var _initNotes = src.notes || '';
  var _initSort  = (typeof src.sort_order === 'number') ? src.sort_order : 9999;
  var _initTraits = Array.isArray(src.traits) ? src.traits.slice() : [];

  var catOpts = MONSTER_CATEGORIES.map(function(c) {
    var selAttr = (_initCat === c.id) ? ' selected' : '';
    return '<option value="' + esc(c.id) + '"' + selAttr + '>' + esc(c.label) + '</option>';
  }).join('');

  var sizeOpts = ['tiny','small','medium','large','huge','gargantuan'].map(function(sz){
    return '<option value="'+sz+'"'+(_initSize===sz?' selected':'')+'>'+esc(sz.charAt(0).toUpperCase()+sz.slice(1))+'</option>';
  }).join('');

  // Traits multi-select: render chips of all known traits; active ones get
  // a .on class. Click toggles membership in _selectedTraits.
  // v1.685: delegated to the shared renderTraitChipPanel helper.
  var _selectedTraits = _initTraits.slice();

  var roAttr = canEdit ? '' : ' readonly disabled';
  var ownerNote = '';
  if (!isNew && !canEdit) {
    ownerNote = '<div style="padding:10px 12px;background:rgba(26,107,138,.08);border:1px solid var(--border2);' +
      'border-radius:4px;margin-bottom:10px;font-size:.85em;color:var(--ink2);font-style:italic">' +
      'This monster was authored by someone else. You can view and Duplicate it into your own draft — editing and deletion require ownership.</div>';
  }

  fi.innerHTML =
    '<div id="form-title-row">' +
      '<div id="form-heading">👹 ' + (isNew ? 'New Monster' : esc(m.label || m.content_key)) + '</div>' +
    '</div>' +
    ownerNote +

    '<div class="fsec">' +
      '<div class="fsec-title">Identity</div>' +
      '<div class="fgrid c2">' +
        frow('Label *', '<input type="text" id="mf-label" value="' + esc(_initLabel) +
          '" placeholder="e.g. Goblin Scout"' + roAttr + '>') +
        frow('ID / Key *', '<input type="text" id="mf-key" value="' + esc(_initKey) +
          '" placeholder="e.g. goblin_scout"' +
          (isNew && canEdit ? '' : ' readonly') + ' style="font-family:monospace">') +
      '</div>' +
      '<div class="fgrid c2" style="margin-top:10px">' +
        frow('Category *', '<select id="mf-cat"' + roAttr + '>' + catOpts + '</select>') +
        frow('Size', '<select id="mf-size"' + roAttr + '>' + sizeOpts + '</select>') +
      '</div>' +
    '</div>' +

    '<div class="fsec">' +
      '<div class="fsec-title">Combat Stats</div>' +
      '<div class="fgrid c2">' +
        frow('Challenge Rating', '<input type="number" id="mf-cr" value="' + _initCR +
          '" min="0" step="0.125"' + roAttr + '>') +
        frow('Hit Points', '<input type="number" id="mf-hp" value="' + _initHP +
          '" min="1" step="1"' + roAttr + '>') +
      '</div>' +
      '<div class="fgrid c2" style="margin-top:10px">' +
        frow('Armor Class', '<input type="number" id="mf-ac" value="' + _initAC +
          '" min="0" step="1"' + roAttr + '>') +
        frow('Speed', '<input type="text" id="mf-speed" value="' + esc(_initSpeed) +
          '" placeholder="e.g. 30 ft, fly 60 ft"' + roAttr + '>') +
      '</div>' +
      '<div class="fgrid c1" style="margin-top:10px">' +
        frow('Attack', '<input type="text" id="mf-attack" value="' + esc(_initAttack) +
          '" placeholder="e.g. +4 to hit, 1d6+2 slashing"' + roAttr + '>') +
      '</div>' +
    '</div>' +

    '<div class="fsec">' +
      '<div class="fsec-title">Traits</div>' +
      '<div style="font-size:.78em;color:var(--ink2);margin-bottom:6px">' +
        (canEdit ? 'Click a trait to toggle.' : 'Traits associated with this monster.') +
      '</div>' +
      '<div id="mf-traits" style="margin-bottom:4px"></div>' +
    '</div>' +

    '<div class="fsec">' +
      '<div class="fsec-title">Notes</div>' +
      '<div class="fgrid c1">' +
        frow('Description', '<textarea id="mf-desc" rows="2" placeholder="One-line summary shown in encounter lists"' +
          roAttr + '>' + esc(_initDesc) + '</textarea>') +
        frow('GM Notes', '<textarea id="mf-notes" rows="3" placeholder="Tactics, lore, special rules"' +
          roAttr + '>' + esc(_initNotes) + '</textarea>') +
        frow('Sort Order', '<input type="number" id="mf-sort" value="' + _initSort +
          '" min="0" step="1"' + roAttr + '>') +
      '</div>' +
    '</div>' +

    '<div id="action-row">' +
      (canEdit ? '<button class="btn btn-save" id="mf-save">💾 Save Monster</button>' : '') +
      (canEdit && !isNew ? '<button class="btn btn-del" id="mf-del">🗑 Delete</button>' : '') +
      (!isNew ? '<button class="btn btn-new" id="mf-dupe">⧉ Duplicate</button>' : '') +
      (!!uid() ? '<button class="btn btn-new" id="mf-new" style="margin-left:auto">+ New Monster</button>' : '') +
      '<span id="save-flash"></span>' +
    '</div>';

  renderTraitChipPanel('mf-traits', _selectedTraits, canEdit);

  if (canEdit) {
    document.getElementById('mf-save').onclick = function() {
      var label = (document.getElementById('mf-label').value || '').trim();
      var rawKey = (document.getElementById('mf-key').value || '').trim().toLowerCase();
      var slugKey = rawKey.replace(/[^a-z0-9_]/g,'_').replace(/^_+|_+$/g,'');
      if (!label || !slugKey) { alert('Label and ID are required.'); return; }
      if (isNew && monsters.some(function(x){return x.content_key===slugKey;})) {
        alert('A monster with ID "' + slugKey + '" already exists. Choose a different ID.');
        return;
      }
      var cat  = document.getElementById('mf-cat').value || 'humanoid';
      var size = document.getElementById('mf-size').value || 'medium';
      var cr   = parseFloat(document.getElementById('mf-cr').value);
      var hp   = parseInt(document.getElementById('mf-hp').value, 10);
      var ac   = parseInt(document.getElementById('mf-ac').value, 10);
      var speed = (document.getElementById('mf-speed').value || '').trim();
      var attack = (document.getElementById('mf-attack').value || '').trim();
      var desc = (document.getElementById('mf-desc').value || '').trim();
      var notes = (document.getElementById('mf-notes').value || '').trim();
      var srt   = parseInt(document.getElementById('mf-sort').value, 10);
      if (isNaN(cr)) cr = 0;
      if (isNaN(hp) || hp < 1) hp = 1;
      if (isNaN(ac)) ac = 10;
      if (isNaN(srt)) srt = 9999;
      var row = {
        content_type: 'monster',
        content_key:  slugKey,
        title:        label,
        owner_user_id: uid(),         // monsters belong to their author
        visibility:   'private',       // default; admin can later promote to shared/official
        status:       'published',
        sort_order:   srt,
        data: {
          category: cat, label: label, size: size,
          cr: cr, hp: hp, ac: ac,
          speed: speed, attack: attack,
          traits: _selectedTraits.slice(),
          desc: desc, notes: notes
        }
      };
      sbUpsert(row).then(function(){
        flash('✓ Monster saved');
        return pullData();
      }).then(function(){
        sel = { kind: 'monster', key: slugKey };
        activeTab = 'monsters';
        renderList();
        showMonsterForm(slugKey);
      }).catch(function(err){
        alert('Save failed: ' + (err.message || err));
      });
    };

    if (!isNew) {
      document.getElementById('mf-del').onclick = function() {
        if (prompt('Type DELETE to confirm removing monster "' + (m.label||m.content_key) + '". ' +
          'Quests referencing this monster will retain the dangling reference until re-saved.') !== 'DELETE') {
          alert('Cancelled.'); return;
        }
        var filter = 'content_type=eq.monster' +
          '&content_key=eq.' + encodeURIComponent(m.content_key) +
          '&owner_user_id=eq.' + encodeURIComponent(uid());
        sbDelete(filter).then(function(){
          flash('✓ Monster deleted');
          return pullData();
        }).then(function(){
          sel = null;
          activeTab = 'monsters';
          renderList();
          showPlaceholder();
        }).catch(function(err){
          alert('Delete failed: ' + (err.message || err));
        });
      };
    }
  }

  if (!isNew) {
    document.getElementById('mf-dupe').onclick = function() {
      var dupeKey = m.content_key + '_copy';
      var n = 2;
      while (monsters.some(function(x){return x.content_key===dupeKey;})) {
        dupeKey = m.content_key + '_copy' + (n++);
      }
      window._monsterPrefill = {
        label: (m.label || m.content_key) + ' (copy)',
        content_key: dupeKey,
        category: m.category || 'humanoid',
        size: m.size || 'medium',
        cr: typeof m.cr === 'number' ? m.cr : 0,
        hp: typeof m.hp === 'number' ? m.hp : 1,
        ac: typeof m.ac === 'number' ? m.ac : 10,
        speed: m.speed || '',
        attack: m.attack || '',
        traits: Array.isArray(m.traits) ? m.traits.slice() : [],
        desc: m.desc || '',
        notes: m.notes || '',
        sort_order: typeof m.sort_order === 'number' ? m.sort_order : 9999
      };
      sel = { kind: 'monster', key: null };
      activeTab = 'monsters';
      showMonsterForm(null);
    };
  }

  if (!!uid()) {
    document.getElementById('mf-new').onclick = function() {
      sel = { kind: 'monster', key: null };
      activeTab = 'monsters';
      showMonsterForm(null);
    };
  }
}

// ══════════════════════════════════════════════════
// DIFFICULTY REFERENCE TAB (v1.686)
// Read-only display of DIFFICULTY_PROFILES. A quest author can scan the
// full 4×4 matrix at a glance to see what targets their quest should
// hit. The matrix itself lives at the top of the file; any tuning edits
// should happen there and this view will update on next render.
// ══════════════════════════════════════════════════
// ══════════════════════════════════════════════════
// TERRITORIES TAB (v1.7117) — Per-territory species weights for the recruit
// randomizer. The main game's pickSpeciesForTerritory(territory) consults
// S.territoryWeights[territory].species to bias hireling/adventurer/
// mercenary species selection. Authors can shape regional demographics
// (e.g. lots of Dragonborn in Minsaka, Spezzakian Gnomes dominant in
// Spezzak) by tuning multipliers per species per territory.
//
// Data model:
//   content_type='territory_weights'
//   content_key=territory name (e.g. 'Minsaka', 'Gojimura', 'Spezzak')
//   title=territory name (mirrors content_key for list display)
//   data={species:{speciesName:multiplier, ...}}
//
// Multipliers: 1.0 = baseline (uniform random share), 2.0 = double, 0.5 =
// half, 0 = excluded entirely. Missing entries default to 1.0 in the main
// game, so authors only need to specify species they want to deviate from
// the baseline. Empty bucket = uniform random for that territory.
//
// Visibility scope: defaults to private at save time. Admin can save as
// official to ship demographics with the published canon. Sharing widens
// at save time; the form does not currently surface a scope picker —
// matches the trait/terrain/condition pattern.
//
// Authoring affordance: list view shows all territories from CONTENT_LIB
// (territoryWeights array) plus territories referenced by cycles that
// don't yet have a weights row (so authors can spot them and click "+ New
// Territory" to start tuning).
// ══════════════════════════════════════════════════

function renderTerritoryList() {
  var el = document.getElementById('list-scroll');
  if (!uid()) { el.innerHTML = '<div class="list-empty">Log in to load territories.</div>'; return; }
  // Union: territories with weights authored, plus territories referenced
  // by cycles (so authors can see "Gojimura is used by 2 cycles but has
  // no weights yet — click + Territory to start").
  var withWeights = {};
  territoryWeights.forEach(function(tw){
    if (tw && tw.content_key) withWeights[tw.content_key] = tw;
  });
  var fromCycles = {};
  cycles.forEach(function(c){
    var t = (c && c.territory || '').trim();
    if (t && !fromCycles[t]) fromCycles[t] = 0;
    if (t) fromCycles[t]++;
  });
  // Combined list with both sources noted
  var allKeys = {};
  Object.keys(withWeights).forEach(function(k){ allKeys[k] = true; });
  Object.keys(fromCycles).forEach(function(k){ allKeys[k] = true; });
  var keys = Object.keys(allKeys).sort();

  if (!keys.length) {
    el.innerHTML = '<div class="list-empty">No territories yet.<br>' +
      'Either tag a cycle with a territory in the Quests tab, or click "+ Territory" above to author weights for a new territory directly.</div>';
    return;
  }

  var html = '<div style="padding:10px 12px;background:rgba(26,107,138,.08);' +
    'border-bottom:1px solid var(--border2);font-size:.78em;color:var(--ink2);line-height:1.5">' +
    'Per-territory species weights bias the recruit randomizer (hirelings, adventurers, ' +
    'mercenaries with Random species). Multiplier 1.0 = baseline; 2.0 = double the chance; ' +
    '0 = excluded. Missing entries default to 1.0.</div>';
  keys.forEach(function(name) {
    var tw = withWeights[name] || null;
    var cycleCount = fromCycles[name] || 0;
    var isSel = sel && sel.kind === 'territory' && sel.key === name;
    var hasWeights = !!tw;
    var weightCount = hasWeights && tw.species ? Object.keys(tw.species).filter(function(k){
      var v = tw.species[k];
      return typeof v === 'number' && v !== 1.0;
    }).length : 0;
    var badge;
    if (hasWeights) {
      badge = '<span class="qbadge" style="border-color:var(--gold);color:var(--gold)">' +
        weightCount + ' tuned</span>';
    } else {
      badge = '<span class="qbadge">no weights</span>';
    }
    var cycleNote = cycleCount ? ('<span style="color:var(--ink2);font-size:.75em;margin-right:6px">' +
      cycleCount + ' cycle' + (cycleCount === 1 ? '' : 's') + '</span>') : '';
    html += '<div class="quest-row ' + (isSel ? 'sel' : '') +
      '" data-sel-territory="' + esc(name) + '">' +
      '<span class="quest-row-title" style="flex:1">' + esc(name) + '</span>' +
      cycleNote + badge + '</div>';
  });
  el.innerHTML = html;
  el.onclick = function(e) {
    var row = e.target.closest('[data-sel-territory]');
    if (!row) return;
    var key = row.getAttribute('data-sel-territory');
    sel = { kind: 'territory', key: key };
    renderTerritoryList();
    showTerritoryForm(key);
  };
}

function showTerritoryForm(key) {
  var tw = territoryWeights.filter(function(x){return x.content_key===key;})[0] || null;
  // territoryWeights from CONTENT_LIB carries _editable; we mirror that
  // here. If the row exists and is owned by the current user, they can edit;
  // admins can edit anything. New rows (no tw yet) are always editable.
  var ownedByUser = !tw || (tw._ownerUserId === uid());
  var canEdit = isAdmin() || ownedByUser || !tw;
  var fi = document.getElementById('form-inner');

  // Build inputs for every species in DND_SPECIES. The bucket may have
  // entries for species not in DND_SPECIES (data drift); we render those
  // at the bottom in a "stale" group so the author can see and clean up.
  var bucket = (tw && tw.species && typeof tw.species === 'object') ? tw.species : {};
  var bucketKeys = Object.keys(bucket);
  var staleKeys = bucketKeys.filter(function(k){ return DND_SPECIES.indexOf(k) === -1; });

  function speciesRowHtml(sp, isStale) {
    var raw = bucket[sp];
    var val = (typeof raw === 'number') ? raw : (typeof raw === 'string' ? parseFloat(raw) : 1.0);
    if (isNaN(val)) val = 1.0;
    var isCustom = (val !== 1.0) && !isStale;
    var labelStyle = isStale
      ? 'color:var(--ink2);font-style:italic;text-decoration:line-through'
      : (isCustom ? 'color:var(--gold);font-weight:600' : 'color:var(--ink)');
    return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border2)">' +
      '<span style="flex:1;font-size:.88em;' + labelStyle + '">' + esc(sp) + (isStale ? ' (not in current species list)' : '') + '</span>' +
      (canEdit
        ? ('<input type="number" step="0.1" min="0" id="tw-sp-' + sp.replace(/[^a-zA-Z0-9]/g, '_') +
            '" data-species="' + esc(sp) + '" value="' + val.toFixed(2) +
            '" style="width:64px;padding:3px 5px;font-family:monospace;text-align:right" placeholder="1.00">' +
          '<button class="btn btn-xs" type="button" data-tw-reset="' + esc(sp) + '" title="Reset to baseline (1.0)" style="padding:2px 6px;font-size:.72em">↺</button>')
        : ('<span style="font-family:monospace;color:var(--ink2);font-size:.85em">' + val.toFixed(2) + '</span>')
      ) +
      '</div>';
  }

  var speciesRowsHtml = DND_SPECIES.map(function(sp){ return speciesRowHtml(sp, false); }).join('');
  var staleRowsHtml = staleKeys.length
    ? '<div style="margin-top:14px;padding-top:8px;border-top:1px dashed var(--border2);font-size:.78em;color:var(--ink2)">' +
      'Stale entries (species not in the current DND.species list — likely from a pre-rename save). ' +
      'Their values will not affect recruitment until the species reappears in the list.</div>' +
      staleKeys.map(function(sp){ return speciesRowHtml(sp, true); }).join('')
    : '';

  // ── v1.7158 — Real Estate Options ─────────────────────────────────
  // Authors deny specific buildings (or the whole catalog) per territory.
  // Persisted to data.realEstateDeny = {all:bool, buildings:{name:true,...}}
  // — same shape as the v1.678 cycle-bound version it replaces. The main
  // game's store flow consults this when a player picks a territory at
  // building purchase time.
  var REAL_ESTATE_CATALOG = [
    {name:'Storage Shed',            price:200},
    {name:'Stables',                 price:500},
    {name:'Market Stall',            price:800},
    {name:'Barracks',                price:1000},
    {name:'Smithy',                  price:1200},
    {name:'Tavern (Common Room)',    price:1500},
    {name:'Greenhouse',              price:1800},
    {name:"Alchemist's Lab",         price:2000},
    {name:'Library & Scriptorium',   price:2500},
    {name:'Safe House',              price:3000}
  ];
  var reSettings = (tw && tw.realEstateDeny) ? tw.realEstateDeny : {};
  var reDenyAllInit = !!reSettings.all;
  var reDeniedMap = (reSettings.buildings && typeof reSettings.buildings === 'object') ? reSettings.buildings : {};
  var reRowsHtml = REAL_ESTATE_CATALOG.map(function(b) {
    var denied = !!reDeniedMap[b.name];
    var rowDisabled = !canEdit || reDenyAllInit;
    return '<label class="cf-re-row" style="display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--parchment-deep);border-radius:4px;background:var(--parchment);cursor:'+(rowDisabled?'default':'pointer')+';font-size:.88em;'+(rowDisabled?'opacity:.4;pointer-events:none;':'')+'">' +
      '<input type="checkbox" class="cf-re-deny" data-bname="'+esc(b.name)+'"'+(denied?' checked':'')+(canEdit?'':' disabled')+'>' +
      '<span style="flex:1;color:var(--ink)">'+esc(b.name)+'</span>' +
      '<span style="color:var(--ink2);font-size:.82em">'+b.price.toLocaleString()+' gp</span>' +
      '</label>';
  }).join('');
  var reSectionHtml =
    '<div class="frow">' +
      '<label>Real Estate Options <span class="select-hint">— deny specific buildings (or all) from being purchasable in this territory</span></label>' +
      '<div style="background:var(--parchment);padding:8px 12px;border:1px solid var(--border2);border-radius:4px">' +
        '<label style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(201,146,42,.08);border:1px solid rgba(201,146,42,.3);border-radius:5px;margin-bottom:10px;cursor:'+(canEdit?'pointer':'default')+';font-size:.92em;font-weight:600;color:var(--ink)">' +
          '<input type="checkbox" id="tw-re-deny-all"'+(reDenyAllInit?' checked':'')+(canEdit?'':' disabled')+'>' +
          '<span>🚫 Deny all real estate in this territory</span>' +
        '</label>' +
        '<div style="font-size:.78em;color:var(--ink2);margin-bottom:8px">Check a building below to block its purchase when this territory is selected. Unchecked = available.</div>' +
        '<div id="tw-re-list" class="fgrid c2" style="gap:6px">' + reRowsHtml + '</div>' +
      '</div>' +
    '</div>';
  // ────────────────────────────────────────────────────────────────────

  var ownerNote = (tw && tw._ownerUserId)
    ? ('<div style="font-size:.75em;color:var(--ink2);margin-bottom:8px">' +
        'Owner: ' + esc(tw._ownerUserId === uid() ? 'you' : tw._ownerUserId) +
        ' · visibility: ' + esc(tw._visibility || 'private') + '</div>')
    : '';

  fi.innerHTML =
    '<h2 style="margin:0 0 6px">' + (tw ? '🌍 ' + esc(key) : '🌍 New Territory') + '</h2>' +
    ownerNote +
    '<div class="frow">' +
      '<label>Territory name <span class="select-hint">(must match the territory string used on quest cycles)</span></label>' +
      '<input type="text" id="tw-name" value="' + esc(key || '') + '"' + (tw ? ' disabled' : '') + ' placeholder="e.g. Minsaka">' +
    '</div>' +
    '<div class="frow">' +
      '<label>Species multipliers</label>' +
      '<div style="background:var(--parchment);padding:8px 12px;border:1px solid var(--border2);border-radius:4px">' +
        '<div style="font-size:.78em;color:var(--ink2);margin-bottom:6px;line-height:1.4">' +
          'Tune any species&apos;s appearance rate in this territory. Leave at <code>1.00</code> for baseline (uniform random share). ' +
          'Set to <code>0</code> to exclude entirely. Higher values dominate; lower values become rare.' +
        '</div>' +
        speciesRowsHtml +
        staleRowsHtml +
      '</div>' +
    '</div>' +
    reSectionHtml +
    (canEdit ? (
      '<div style="display:flex;align-items:center;gap:8px;margin-top:14px">' +
        '<button class="btn btn-save" id="tw-save">Save Territory</button>' +
        (tw && (isAdmin() || ownedByUser) ? '<button class="btn btn-del" id="tw-del">Delete</button>' : '') +
        '<button class="btn btn-new" id="tw-reset-all" style="margin-left:auto">↺ Reset all to 1.0</button>' +
        '<span id="save-flash"></span>' +
      '</div>'
    ) : '');

  if (!canEdit) return;

  // Per-species reset buttons
  fi.querySelectorAll('[data-tw-reset]').forEach(function(btn){
    btn.onclick = function() {
      var sp = btn.getAttribute('data-tw-reset');
      var inpId = 'tw-sp-' + sp.replace(/[^a-zA-Z0-9]/g, '_');
      var inp = document.getElementById(inpId);
      if (inp) inp.value = '1.00';
    };
  });

  // Reset-all button
  var resetAll = document.getElementById('tw-reset-all');
  if (resetAll) {
    resetAll.onclick = function() {
      DND_SPECIES.forEach(function(sp){
        var inpId = 'tw-sp-' + sp.replace(/[^a-zA-Z0-9]/g, '_');
        var inp = document.getElementById(inpId);
        if (inp) inp.value = '1.00';
      });
    };
  }

  // ── v1.7158 — Real Estate "Deny all" toggle greys out per-building rows
  // (mirrors the v1.678 cycle-form behavior; same UX, scoped per-territory).
  (function() {
    var denyAllEl = document.getElementById('tw-re-deny-all');
    if (!denyAllEl) return;
    denyAllEl.addEventListener('change', function() {
      var on = denyAllEl.checked;
      document.querySelectorAll('#tw-re-list .cf-re-row').forEach(function(row) {
        if (on) {
          row.style.opacity = '.4';
          row.style.pointerEvents = 'none';
        } else {
          row.style.opacity = '';
          row.style.pointerEvents = '';
        }
      });
    });
  })();

  // Save handler — collect all multipliers, omit values that equal 1.0
  // (since 1.0 is the implicit default; storing it would just bloat rows).
  // Stale species values are preserved as-is so admins can clean them up
  // explicitly if desired.
  document.getElementById('tw-save').onclick = function() {
    var name = (document.getElementById('tw-name').value || '').trim();
    if (!name) { alert('Territory name is required.'); return; }
    if (!tw && territoryWeights.some(function(x){return x.content_key===name;})) {
      alert('A territory weights entry for "' + name + '" already exists. Edit it instead.');
      return;
    }
    var newSpecies = {};
    DND_SPECIES.forEach(function(sp){
      var inpId = 'tw-sp-' + sp.replace(/[^a-zA-Z0-9]/g, '_');
      var inp = document.getElementById(inpId);
      if (!inp) return;
      var v = parseFloat(inp.value);
      if (isNaN(v) || v < 0) v = 1.0;
      // Only persist non-default values to keep rows compact
      if (v !== 1.0) newSpecies[sp] = v;
    });
    // Preserve existing stale entries verbatim
    staleKeys.forEach(function(sp){
      newSpecies[sp] = bucket[sp];
    });

    // ── v1.7158 — Collect Real Estate deny state ──
    // Same shape as the legacy cycle.realEstateDeny: {all:bool, buildings:{name:true,...}}
    // Persisted to data.realEstateDeny on the territory_weights row. If
    // nothing is denied, the field is omitted from the saved blob.
    var reDenyOut = {};
    var reDenyAllOut = false;
    var reDenyAllEl = document.getElementById('tw-re-deny-all');
    if (reDenyAllEl && reDenyAllEl.checked) reDenyAllOut = true;
    var reBuildingsOut = {};
    document.querySelectorAll('#tw-re-list .cf-re-deny').forEach(function(cb) {
      if (cb.checked) {
        var bn = cb.getAttribute('data-bname');
        if (bn) reBuildingsOut[bn] = true;
      }
    });
    if (reDenyAllOut) reDenyOut.all = true;
    if (Object.keys(reBuildingsOut).length) reDenyOut.buildings = reBuildingsOut;

    // Determine ownership/visibility. Existing rows keep their owner +
    // visibility unless admin is editing an admin-owned row (admin-owned
    // is the closest thing this editor has to "official" for territories).
    // New rows: admin saves as official; non-admin saves as private.
    var ownerToWrite = tw ? tw._ownerUserId : (isAdmin() ? ADMIN_UID : uid());
    var visToWrite = tw ? (tw._visibility || 'private') : (isAdmin() ? 'official' : 'private');
    // v1.7158 — Compose data with optional realEstateDeny.
    var dataOut = { species: newSpecies };
    if (Object.keys(reDenyOut).length) dataOut.realEstateDeny = reDenyOut;
    var row = {
      content_type: 'territory_weights',
      content_key:  name,
      title:        name,
      owner_user_id: ownerToWrite,
      visibility:   visToWrite,
      status:       'published',
      sort_order:   0,
      data: dataOut
    };
    sbUpsert(row).then(function(){
      flash('✓ Territory saved');
      return pullData();
    }).then(function(){
      sel = { kind: 'territory', key: name };
      activeTab = 'territories';
      renderList();
      showTerritoryForm(name);
    }).catch(function(err){
      alert('Save failed: ' + (err.message || err));
    });
  };

  // Delete handler — only available on existing rows owned by the user (or admin).
  if (tw && (isAdmin() || ownedByUser)) {
    var delBtn = document.getElementById('tw-del');
    if (delBtn) {
      delBtn.onclick = function() {
        if (prompt('Type DELETE to confirm removing the species weights for "' + key + '". ' +
          'The territory will fall back to uniform random recruitment after the next pull.') !== 'DELETE') {
          alert('Cancelled.'); return;
        }
        var filter = 'content_type=eq.territory_weights' +
          '&content_key=eq.' + encodeURIComponent(key) +
          '&owner_user_id=eq.' + encodeURIComponent(tw._ownerUserId || uid());
        sbDelete(filter).then(function(){
          flash('✓ Territory weights deleted');
          return pullData();
        }).then(function(){
          sel = null;
          activeTab = 'territories';
          renderList();
          showPlaceholder();
        }).catch(function(err){
          alert('Delete failed: ' + (err.message || err));
        });
      };
    }
  }
}

// ══════════════════════════════════════════════════
// GAME RULES (v1.7167)
// ══════════════════════════════════════════════════
// Single franchise-wide config record holding every tunable the
// Phase 3 resolution engine consults: DC ladder, level-mismatch
// modifiers, roll thresholds, outcome weights, trait bonus cap,
// XP/reward math, counter-consumable mapping, death rules,
// condition recovery, quest duration overrides, engine toggles.
//
// Editor pattern: explainer in list-scroll (left), editable form
// in form-panel (right) — same shape as the Difficulty tab.
// Admin-only edit; non-admins see a read-only view.
// One row per franchise; identified by content_key='franchise_rules'.
// ══════════════════════════════════════════════════

var GR_DEFAULTS = {
  dcLadder: { trivial:8, easy:10, medium:13, hard:16, deadly:20 },
  levelMismatchMods: { under2:3, under1:1, atTier:0, over1:-1, over2:-2 },
  rollThresholds: { critSuccessNat:20, critFailNat:1, autoSuccessMargin:10, autoFailMargin:10 },
  outcomeWeights: { setback:15, mixed:30, success:40, bonus:15 },
  traitBonusCap: { maxBonus:10, maxPenalty:-10 },
  xpAndRewards: {
    baseXpPerTier: { tier1:5, tier2:10, tier3:20, tier4:40 },
    trackMatchBonusXp: 2,
    outcomeXpMult: { setback:0.25, mixed:0.6, success:1.0, bonus:1.5 },
    franchiseCutPct: 0.4,
    adventurerSharePct: 0.6
  },
  counterMap: [
    { trait:'anti_poison',     counters:'Poisoned'  },
    { trait:'anti_disease',    counters:'Diseased'  },
    { trait:'anti_exhaustion', counters:'Exhausted' },
    { trait:'anti_death',      counters:'Death'     },
    { trait:'anti_petrified',  counters:'Petrified' }
  ],
  allowDoubleSub: true,
  doubleSubMap: { anti_death: ['anti_poison','anti_poison'] },
  deathRules: {
    permadeath:false, autoReviveAtSessionEnd:false,
    petrifiedRecoveryGp:500, petrifiedRecoveryDowntimes:2,
    deathSavingThrowDC:10
  },
  conditionRecovery: { minor:1, moderate:2, severe:3, extreme:5 },
  conditionsStack: false,
  questDuration: { firstQuestDurationMin:3, defaultQuestDurationMin:60, testModeDurationMin:1 },
  engineToggles: {
    showRollBreakdownInLog:true, autoCollectOnSuccess:false,
    narrativeFromTemplates:true, confirmBeforeApplyingDeath:true
  }
};

// Working copy held while editor is open. Hydrated from the
// Supabase row on entry; flushed back via Save All.
var _grWork = null;

function _grPickRow() {
  // Find the franchise rules row from the loaded gameRules array.
  // gameRules is a top-level var populated by pullData().
  // Strict match on content_key — never fall back to gameRules[0]
  // because Supabase may contain legacy game_rules rows under other
  // content_keys (e.g. 'default') with completely different schemas.
  if (!Array.isArray(gameRules)) return null;
  for (var i=0; i<gameRules.length; i++) {
    if (gameRules[i] && gameRules[i].content_key === 'franchise_rules') return gameRules[i];
  }
  return null;
}

function _grHydrate() {
  // Build _grWork by deep-cloning defaults then overlaying the row's fields.
  //
  // IMPORTANT: pullData() spreads each row's `data` JSONB blob into the
  // top-level entry, alongside metadata like _dbId / _ownerUserId /
  // content_key / published / _visibility. So `row.dcLadder` exists
  // directly — there is NO `row.data.dcLadder`.
  var def = JSON.parse(JSON.stringify(GR_DEFAULTS));
  var row = _grPickRow();
  if (row && typeof row === 'object') {
    // Merge each top-level schema key, preserving defaults for missing fields.
    Object.keys(def).forEach(function(k){
      if (row[k] !== undefined && row[k] !== null) {
        def[k] = JSON.parse(JSON.stringify(row[k]));
      }
    });
  }
  _grWork = def;
}

function renderGameRules() {
  _grHydrate();
  var canEdit = isAdmin();

  // Left panel: explainer
  var lp = document.getElementById('list-scroll');
  lp.innerHTML = '<div style="padding:14px 12px;font-size:.82em;color:var(--ink2);line-height:1.5">' +
    '<strong style="color:var(--gold)">Game Rules</strong><br><br>' +
    'A single franchise-wide record of every tunable the resolution engine consults: DC ladder, outcome weights, XP math, counter-consumables, death rules, and more.<br><br>' +
    (canEdit
      ? 'Edit values on the right and click <strong>Save All</strong> to push to Supabase. Changes apply immediately for all players on next pull.'
      : '<em>Read-only — only the franchise admin can edit these values.</em>') +
    '<br><br>If a field is missing from the saved row, the engine uses the documented default shown in parentheses.' +
    '</div>';

  // Right panel: form
  var fi = document.getElementById('form-inner');
  fi.innerHTML =
    '<div id="form-title-row">' +
      '<div id="form-heading">🎲 Game Rules</div>' +
      (canEdit ? '<button id="gr-save" class="primary-btn">Save All</button>' : '') +
    '</div>' +
    (canEdit ? '' : '<div style="padding:10px 12px;background:rgba(201,146,42,.08);border:1px solid var(--border2);border-radius:4px;margin-bottom:12px;font-size:.8em;color:var(--ink2)">Read-only. Admin-only tab.</div>') +
    '<div id="gr-body" style="padding:0 4px"></div>';

  _grRenderBody(canEdit);

  if (canEdit) {
    var saveBtn = document.getElementById('gr-save');
    if (saveBtn) {
      saveBtn.onclick = _grSave;
      console.log('[GameRules] Save All button wired');
    } else {
      console.warn('[GameRules] gr-save button not found in DOM');
    }
  }
}

function _grSection(title, html) {
  return '<details open style="margin:10px 0;border:1px solid var(--border2);border-radius:4px;background:rgba(255,255,255,0.02)">' +
    '<summary style="padding:8px 10px;font-family:\'Cinzel\',serif;font-size:.8em;color:var(--gold);cursor:pointer;text-transform:uppercase;letter-spacing:.04em">'+title+'</summary>' +
    '<div style="padding:10px 12px">'+html+'</div>' +
  '</details>';
}

function _grNumInput(path, def, opts) {
  // path: dot-separated key path into _grWork (e.g. 'dcLadder.medium')
  // def: default for placeholder hint
  // opts: {step, min, max}
  opts = opts || {};
  var parts = path.split('.');
  var v = _grWork;
  for (var i=0; i<parts.length; i++) {
    if (v == null) { v = ''; break; }
    v = v[parts[i]];
  }
  if (v === undefined || v === null) v = '';
  var attrs = 'data-grpath="'+esc(path)+'" type="number"';
  if (opts.step !== undefined) attrs += ' step="'+opts.step+'"';
  if (opts.min !== undefined)  attrs += ' min="'+opts.min+'"';
  if (opts.max !== undefined)  attrs += ' max="'+opts.max+'"';
  return '<input class="gr-num" '+attrs+' value="'+esc(String(v))+'" placeholder="'+esc(String(def))+'" style="width:80px;padding:3px 6px;font-size:.85em;background:var(--bg);border:1px solid var(--border2);border-radius:3px;color:var(--ink)">';
}

function _grBoolInput(path) {
  var parts = path.split('.');
  var v = _grWork;
  for (var i=0; i<parts.length; i++) {
    if (v == null) { v = false; break; }
    v = v[parts[i]];
  }
  return '<input class="gr-bool" data-grpath="'+esc(path)+'" type="checkbox"'+(v?' checked':'')+'>';
}

function _grSetByPath(obj, path, value) {
  var parts = path.split('.');
  var ref = obj;
  for (var i=0; i<parts.length-1; i++) {
    if (ref[parts[i]] == null || typeof ref[parts[i]] !== 'object') ref[parts[i]] = {};
    ref = ref[parts[i]];
  }
  ref[parts[parts.length-1]] = value;
}

function _grCollect() {
  // Pull all input values back into _grWork.
  document.querySelectorAll('#gr-body .gr-num').forEach(function(el){
    var path = el.getAttribute('data-grpath');
    var raw = el.value;
    var num = (raw === '' || raw == null) ? null : Number(raw);
    if (num !== null && !isNaN(num)) _grSetByPath(_grWork, path, num);
  });
  document.querySelectorAll('#gr-body .gr-bool').forEach(function(el){
    var path = el.getAttribute('data-grpath');
    _grSetByPath(_grWork, path, !!el.checked);
  });
  // Counter-map rows
  var cmHost = document.getElementById('gr-cm-rows');
  if (cmHost) {
    var newMap = [];
    var rows = cmHost.querySelectorAll('[data-grcm-trait]');
    rows.forEach(function(el){
      var i = el.getAttribute('data-grcm-trait');
      var trait = el.value.trim();
      var ctrEl = cmHost.querySelector('[data-grcm-counters="'+i+'"]');
      var counters = ctrEl ? ctrEl.value.trim() : '';
      if (trait || counters) newMap.push({ trait: trait, counters: counters });
    });
    _grWork.counterMap = newMap;
  }
  // Double-sub rows
  var dsHost = document.getElementById('gr-ds-rows');
  if (dsHost) {
    var newDs = {};
    var seen = {};
    dsHost.querySelectorAll('[data-grds-key]').forEach(function(el){
      var k = el.getAttribute('data-grds-key');
      if (seen[k]) return;
      seen[k] = true;
      var v0 = (dsHost.querySelector('[data-grds-key="'+k.replace(/"/g,'\\"')+'"][data-grds-i="0"]')||{}).value || '';
      var v1 = (dsHost.querySelector('[data-grds-key="'+k.replace(/"/g,'\\"')+'"][data-grds-i="1"]')||{}).value || '';
      newDs[k] = [v0.trim(), v1.trim()];
    });
    _grWork.doubleSubMap = newDs;
  }
}

function _grSave() {
  console.log('[GameRules] _grSave invoked');
  if (!isAdmin()) {
    console.warn('[GameRules] save blocked — not admin. uid=', uid(), 'ADMIN_UID=', ADMIN_UID);
    alert('Only the franchise admin can save Game Rules.\n\nYour user id: ' + (uid()||'(none)') + '\nAdmin id: ' + ADMIN_UID);
    return;
  }
  try {
    _grCollect();
  } catch (err) {
    console.error('[GameRules] _grCollect threw:', err);
    alert('Could not collect form values: ' + (err && err.message || err));
    return;
  }
  console.log('[GameRules] collected _grWork:', _grWork);
  // Build the upsert row.
  var row = {
    content_type:  'game_rules',
    content_key:   'franchise_rules',
    title:         'Franchise Game Rules',
    owner_user_id: ADMIN_UID,
    visibility:    'official',
    status:        'published',
    sort_order:    0,
    data:          JSON.parse(JSON.stringify(_grWork))
  };
  var btn = document.getElementById('gr-save');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  console.log('[GameRules] sbUpsert sending:', row);
  sbUpsert(row).then(function(resp){
    console.log('[GameRules] sbUpsert resolved:', resp);
    flash('✓ Game Rules saved');
    return pullData();
  }).then(function(){
    console.log('[GameRules] pullData complete, re-rendering');
    activeTab = 'rules';
    renderList();
  }).catch(function(err){
    console.error('[GameRules] save failed:', err);
    alert('Save failed: ' + (err && err.message || err));
    if (btn) { btn.disabled = false; btn.textContent = 'Save All'; }
  });
}

// ══════════════════════════════════════════════════
// QUEST WIZARD (v1.687)
// ══════════════════════════════════════════════════
// Step-by-step modal that gathers tier/difficulty/terrain from the
// author, previews the target values from DIFFICULTY_PROFILES, asks
// about squad-size overwrite, and applies sane defaults to the quest
// form on Finish. Ownership of fields on apply:
//
//   Title / Description  — NEVER overwritten (author's creative work)
//   Skills / Tools / Langs — appended (dedup against existing)
//   Squad Min / Max      — ask before overwrite if current differs
//   Base GP              — overwrite (midpoint of profile range)
//   Terrain              — overwrite only if user picked one; skip leaves blank
//   Encounters           — appended (no dedup; author may want duplicates)
//   D&D Tier / Difficulty — overwrite (these are the wizard's selections)
//
// The wizard does NOT save the quest — it only mutates the form fields
// and the in-closure working copies of encounters / prereq rows. The
// author reviews and clicks Save Quest as normal.
// ══════════════════════════════════════════════════

// Wizard state. Held module-scoped so step handlers can share it without
// closure gymnastics. Reset on every showQuestWizard() call.
var _qw = null;

// Entry point. Called by the ✨ Quest Wizard button on the quest form.
// formContext packs everything the wizard needs to mutate on Finish:
//   - encListRef: the quest form's _encList working copy (same closure
//     array rendered by _renderEncPanel)
//   - renderEncPanel: callback that re-renders the encounter UI
//   - refreshDiffPanel: callback to re-render the live reference panel
// Passed by the caller to avoid global leaks.
function showQuestWizard(formContext) {
  if (!formContext) return;
  _qw = {
    step: 1,
    tier: null,              // 1–4
    difficulty: null,         // 'easy' | 'standard' | 'hard' | 'deadly'
    terrain: '',              // '' means skip (wizard leaves terrain untouched)
    squadOverwrite: null,     // true/false decided at step 5
    ctx: formContext
  };
  document.getElementById('qw-overlay').classList.add('on');
  _qwRenderStep();
}

function _qwClose() {
  document.getElementById('qw-overlay').classList.remove('on');
  _qw = null;
}

function _qwRenderStep() {
  if (!_qw) return;
  var body = document.getElementById('qw-step-body');
  var label = document.getElementById('qw-steplabel');
  var backBtn = document.getElementById('qw-back');
  var nextBtn = document.getElementById('qw-next');
  label.textContent = 'Step ' + _qw.step + ' of 5';
  backBtn.style.visibility = (_qw.step > 1) ? '' : 'hidden';
  // Final step's Next button doubles as Finish
  nextBtn.textContent = (_qw.step === 5) ? '\u2728 Finish & Apply' : 'Next \u2192';

  if (_qw.step === 1)      body.innerHTML = _qwStep1Html();
  else if (_qw.step === 2) body.innerHTML = _qwStep2Html();
  else if (_qw.step === 3) body.innerHTML = _qwStep3Html();
  else if (_qw.step === 4) body.innerHTML = _qwStep4Html();
  else if (_qw.step === 5) body.innerHTML = _qwStep5Html();

  // Wire up selection clicks for steps that use .qw-option rows.
  body.querySelectorAll('.qw-option').forEach(function(btn){
    btn.onclick = function(){
      var field = btn.getAttribute('data-qw-field');
      var value = btn.getAttribute('data-qw-value');
      if (field === 'tier')        _qw.tier = parseInt(value,10);
      else if (field === 'diff')   _qw.difficulty = value;
      else if (field === 'terrain') _qw.terrain = value;
      else if (field === 'squad')  _qw.squadOverwrite = (value === 'yes');
      // Re-render to paint the .sel state
      _qwRenderStep();
    };
  });
  // Disable Next until the current step has a selection (steps that need one)
  var needsPick = {
    1: (_qw.tier == null),
    2: (_qw.difficulty == null),
    3: false,  // terrain is skippable
    4: false,  // preview only
    5: (_qwNeedsSquadQuestion() && _qw.squadOverwrite === null)
  }[_qw.step];
  nextBtn.disabled = !!needsPick;
  nextBtn.style.opacity = nextBtn.disabled ? '.5' : '1';
  nextBtn.style.cursor = nextBtn.disabled ? 'not-allowed' : 'pointer';
}

function _qwStep1Html() {
  return '<div style="margin-bottom:10px;font-size:.88em;color:var(--ink2);line-height:1.5">' +
    'Pick the <strong>D&amp;D tier</strong> — the level band this quest is designed for. This is independent of difficulty.' +
    '</div>' +
    DND_TIER_LIST.map(function(t){
      var on = (_qw.tier === t.num);
      return '<button type="button" class="qw-option'+(on?' sel':'')+'" data-qw-field="tier" data-qw-value="'+t.num+'">' +
        '<div class="qw-option-label">Tier '+t.num+'</div>' +
        '<div class="qw-option-sub">' + esc(t.label.replace(/^Tier \d \u00b7 /, '')) + '</div>' +
      '</button>';
    }).join('');
}

function _qwStep2Html() {
  return '<div style="margin-bottom:10px;font-size:.88em;color:var(--ink2);line-height:1.5">' +
    'How <strong>dangerous</strong> should this quest feel for a T' + _qw.tier + ' party? This stacks with tier to scale reward and prereq counts.' +
    '</div>' +
    DIFFICULTY_LIST.map(function(d){
      var on = (_qw.difficulty === d.key);
      var p = getDifficultyProfile(_qw.tier, d.key);
      var previewTxt = p ? (p.baseGpMin + '\u2013' + p.baseGpMax + ' gp \u00b7 Squad ' + p.squadMin + '\u2013' + p.squadMax + ' \u00b7 CR ' + p.crMin + '\u2013' + p.crMax) : '';
      return '<button type="button" class="qw-option'+(on?' sel':'')+'" data-qw-field="diff" data-qw-value="'+esc(d.key)+'" style="border-left:3px solid '+d.color+'">' +

// Apply wizard selections to the quest form. Mutates the form fields
// directly (so the user can still edit before hitting Save Quest), and
// mutates the encounter/prereq working copies through ctx callbacks.
function _qwApply() {
  if (!_qw) return;
  var p = getDifficultyProfile(_qw.tier, _qw.difficulty);
  if (!p) { _qwClose(); return; }

  // Tier + difficulty dropdowns
  var tierEl = document.getElementById('qf-dnd-tier');
  if (tierEl) tierEl.value = String(_qw.tier);
  var diffEl = document.getElementById('qf-diff');
  if (diffEl) diffEl.value = _qw.difficulty;

  // Base GP — midpoint of range (overwrite)
  var gpEl = document.getElementById('qf-gp');
  if (gpEl) gpEl.value = Math.round((p.baseGpMin + p.baseGpMax) / 2);

  // Squad min/max — conditional on user's Step 5 answer
  if (_qw.squadOverwrite === true) {
    var sminEl = document.getElementById('qf-squad');
    var smaxEl = document.getElementById('qf-squadmax');
    if (sminEl) sminEl.value = p.squadMin;
    if (smaxEl) smaxEl.value = p.squadMax;
  }

  // Terrain — only if user picked one at step 3
  if (_qw.terrain) {
    var terrEl = document.getElementById('qf-terrain');
    if (terrEl) terrEl.value = _qw.terrain;
  }

  // Prereq count gap — we don't auto-append because the prereq form uses
  // <select multiple> elements tied to real skill/tool/language names.
  // Appending blank entries has no meaning there. Instead, we compute the
  // gap and surface it in the post-apply status message so the author
  // knows to add more prereqs manually. The save-time advisory warning
  // will also flag the deviation on the next Save.
  var gapNote = '';
  (function(){
    var ctx = _qw.ctx || {};
    if (!ctx.currentPrereqCount) return;
    var curS = ctx.currentPrereqCount('skill') || 0;
    var curT = ctx.currentPrereqCount('tool') || 0;
    var curL = ctx.currentPrereqCount('lang') || 0;
    var bits = [];
    if (curS < p.skillCount) bits.push('+' + (p.skillCount - curS) + ' skill' + ((p.skillCount - curS)===1?'':'s'));
    if (curT < p.toolCount) bits.push('+' + (p.toolCount - curT) + ' tool' + ((p.toolCount - curT)===1?'':'s'));
    if (curL < p.langCount) bits.push('+' + (p.langCount - curL) + ' lang');
    if (bits.length) gapNote = ' (consider adding ' + bits.join(', ') + ')';
  }());

  // Encounters — pick monsters in the profile's CR range and append one
  // standard-role row per (up to 3 candidates). If no monsters are in
  // range, skip silently — author can add them manually.
  (function(){
    var ctx = _qw.ctx || {};
    if (!ctx.appendEncounters) return;
    var candidates = (monsters || []).filter(function(m){
      var cr = (typeof m.cr === 'number') ? m.cr : null;
      if (cr === null) return false;
      return cr >= p.crMin && cr <= p.crMax;
    });
    // Sort deterministically by CR then label so re-runs are stable
    candidates.sort(function(a,b){
      if (a.cr !== b.cr) return a.cr - b.cr;
      return (a.label||a.content_key||'').localeCompare(b.label||b.content_key||'');
    });
    // Take up to 3 across the range
    var picks = [];
    if (candidates.length > 0) picks.push(candidates[0]);
    if (candidates.length > 2) picks.push(candidates[Math.floor(candidates.length/2)]);
    if (candidates.length > 1) picks.push(candidates[candidates.length-1]);
    // Dedup in case length==2 picked same idx twice
    var seen = {};
    picks = picks.filter(function(m){
      if (seen[m.content_key]) return false;
      seen[m.content_key] = true;
      return true;
    });
    if (picks.length) {
      ctx.appendEncounters(picks.map(function(m){
        return {monsterKey: m.content_key, count: 1, role: 'standard', note: '(wizard)'};
      }));
    }
  }());

  // Refresh the live reference panel since tier/difficulty may have changed
  if (_qw.ctx && _qw.ctx.refreshDiffPanel) _qw.ctx.refreshDiffPanel();
  flash('\u2728 Wizard applied' + gapNote);
  if (gapNote) setStatus('Wizard applied. Prereqs' + gapNote + '.');
  _qwClose();
}

// Wire the modal's nav buttons once at page load. Handlers stay bound
// across multiple wizard invocations.
(function(){
  var cancel = document.getElementById('qw-cancel');
  var back = document.getElementById('qw-back');
  var next = document.getElementById('qw-next');
  if (cancel) cancel.onclick = function(){ _qwClose(); };
  if (back) back.onclick = function(){
    if (!_qw || _qw.step <= 1) return;
    _qw.step--;
    _qwRenderStep();
  };
  if (next) next.onclick = function(){
    if (!_qw) return;
    if (_qw.step === 5) { _qwApply(); return; }
    _qw.step++;
    _qwRenderStep();
  };
})();

    frow('Required Mount / Vehicle Count',
      '<input type="number" id="cf-mount-count" min="0" value="' + (parseInt(g.requiredMountCount, 10) || 0) + '">') +
