<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quest Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1d1209; --ink2:#4a3020; --parch:#f4e8c1; --parch2:#e8d5a0;
  --gold:#c9922a; --gold2:#f0b429; --crimson:#8b1a1a; --forest:#2d5016;
  --purple:#6655aa; --teal:#1a6b8a;
  --border:rgba(201,146,42,.3); --border2:rgba(201,146,42,.15);
  --shadow:rgba(44,26,14,.25);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Text',Georgia,serif;background:#1a0d04;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(201,146,42,.08),transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(139,26,26,.06),transparent 60%),#f4e8c1;
  z-index:0;pointer-events:none;}

/* ── Layout ── */
#app{position:relative;z-index:1;width:100%;max-width:1800px;min-height:100vh;
  display:grid;grid-template-rows:auto 1fr;padding:0;}

/* ── Header ── */
#hdr{background:linear-gradient(135deg,#1a0d04,#2c1a0e);color:var(--gold2);
  padding:10px 20px;display:flex;align-items:center;gap:16px;
  border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100;}
#hdr h1{font-family:'Cinzel',serif;font-size:1em;letter-spacing:.08em;flex:1;
  text-transform:uppercase;}
#login-area{display:flex;align-items:center;gap:8px;font-size:.82em;}
#user-email{color:rgba(240,180,41,.7);font-size:.78em;}
.hbtn{background:rgba(255,255,255,.1);border:1px solid rgba(201,146,42,.4);
  border-radius:4px;padding:4px 12px;color:var(--gold2);font-size:.78em;
  cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.03em;
  transition:background .12s;}
.hbtn:hover{background:rgba(255,255,255,.2);}
.hbtn.danger{border-color:rgba(255,100,100,.4);color:#ffaaaa;}

/* ── Main split ── */
#main{display:grid;grid-template-columns:clamp(240px,18vw,320px) 1fr;height:calc(100vh - 46px);}

/* ── Sidebar (list) ── */
#sidebar{border-right:1px solid var(--border);background:rgba(244,232,193,.6);
  display:flex;flex-direction:column;overflow:hidden;}
#sidebar-hdr{padding:10px 12px 8px;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:6px;flex-shrink:0;}
#sidebar-hdr h2{font-family:'Cinzel',serif;font-size:.72em;text-transform:uppercase;
  letter-spacing:.06em;color:var(--ink2);flex:1;}
.icon-btn{background:none;border:1px solid var(--border);border-radius:4px;
  width:26px;height:26px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:.85em;color:var(--ink2);
  transition:background .12s,border-color .12s;}
.icon-btn:hover{background:rgba(201,146,42,.15);border-color:var(--gold);}
#list-scroll{flex:1;overflow-y:auto;}

/* Cycle groups */
.cycle-group{border-bottom:1px solid var(--border2);}
.cycle-hdr{display:flex;align-items:center;gap:6px;padding:7px 10px 6px;
  background:rgba(201,146,42,.08);cursor:pointer;user-select:none;
  transition:background .1s;}
.cycle-hdr:hover{background:rgba(201,146,42,.15);}
.cycle-toggle{font-size:.65em;color:var(--gold);width:14px;text-align:center;
  flex-shrink:0;transition:transform .15s;}
.cycle-toggle.open{transform:rotate(90deg);}
.cycle-name{font-family:'Cinzel',serif;font-size:.72em;text-transform:uppercase;
  letter-spacing:.04em;color:var(--ink2);flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cycle-count{font-size:.65em;color:var(--ink2);opacity:.5;}
.cycle-pub{font-size:.6em;padding:1px 5px;border-radius:3px;flex-shrink:0;}
.cycle-pub.pub{background:rgba(45,80,22,.15);color:var(--forest);
  border:1px solid rgba(45,80,22,.3);}
.cycle-pub.unpub{background:rgba(74,48,32,.12);color:var(--ink2);
  border:1px solid var(--border2);}

/* Quest rows */
.quest-rows{display:none;}
.quest-rows.open{display:block;}
.quest-row{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 22px;
  cursor:pointer;border-left:3px solid transparent;transition:background .1s;}
.quest-row:hover{background:rgba(201,146,42,.08);}
.quest-row.sel{background:rgba(139,26,26,.07);border-left-color:var(--crimson);}
.quest-row-title{flex:1;font-size:.86em;color:var(--ink);min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.quest-row.sel .quest-row-title{color:var(--crimson);font-weight:600;}
.qbadge{font-size:.58em;padding:1px 4px;border-radius:3px;flex-shrink:0;
  border:1px solid var(--border2);color:var(--ink2);}
.qbadge.custom{border-color:var(--crimson);color:var(--crimson);}
.qbadge.cap{border-color:var(--gold);color:var(--gold);}

/* Empty state */
.tab-btn.active{border-bottom-color:var(--gold)!important;background:rgba(201,146,42,.1)!important;color:var(--gold)!important;}
.tab-btn:hover:not(.active){background:rgba(201,146,42,.06)!important;}
.list-empty{padding:20px 14px;font-size:.85em;color:var(--ink2);
  font-style:italic;text-align:center;}

/* ── Form panel ── */
#form-panel{overflow-y:auto;background:var(--parch);}
#form-inner{padding:20px 28px 40px;max-width:none;}
/* Narrow inner wrapper for forms that read better at prose-width; matrix breaks out of this */
.form-narrow{max-width:780px;}

/* Placeholder */
#placeholder{display:flex;align-items:center;justify-content:center;
  height:100%;color:var(--ink2);font-style:italic;font-size:.95em;
  flex-direction:column;gap:12px;text-align:center;padding:40px;}
#placeholder svg{opacity:.3;}

/* Form sections */
.fsec{margin-bottom:20px;}
.fsec-title{font-family:'Cinzel',serif;font-size:.68em;text-transform:uppercase;
  letter-spacing:.06em;color:var(--gold);border-bottom:1px solid var(--border2);
  padding-bottom:4px;margin-bottom:12px;}
.fgrid{display:grid;gap:12px;}
.fgrid.c2{grid-template-columns:1fr 1fr;}
.fgrid.c3{grid-template-columns:1fr 1fr 1fr;}
.frow{display:flex;flex-direction:column;gap:4px;}
.flbl{font-family:'Cinzel',serif;font-size:.65em;text-transform:uppercase;
  letter-spacing:.04em;color:var(--ink2);}
input[type=text],input[type=number],select,textarea{
  width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:5px;
  background:rgba(255,255,255,.6);color:var(--ink);font-family:'Crimson Text',serif;
  font-size:.95em;transition:border-color .12s,box-shadow .12s;}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,146,42,.15);}
textarea{resize:vertical;min-height:70px;line-height:1.5;}
select{cursor:pointer;}

/* Multi-select */
select[multiple]{height:90px;padding:4px 6px;}
select[multiple] option{padding:3px 6px;border-radius:3px;}
.select-hint{font-size:.72em;color:var(--ink2);margin-top:2px;}

/* Checkbox row */
.chk-row{display:flex;align-items:center;gap:8px;cursor:pointer;}
.chk-row input[type=checkbox]{width:1.2em;height:1.2em;accent-color:var(--forest);
  cursor:pointer;flex-shrink:0;}
.chk-label{font-size:.9em;color:var(--ink);}

/* Publish toggle */
#pub-row{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(201,146,42,.07);border:1px solid var(--border);
  border-radius:6px;margin-bottom:16px;}
#pub-chk{width:1.3em;height:1.3em;accent-color:var(--forest);cursor:pointer;}
#pub-label{font-size:.9em;cursor:pointer;flex:1;}
#pub-label span{font-family:'Cinzel',serif;font-size:.8em;text-transform:uppercase;
  letter-spacing:.03em;}

/* Action row */
#action-row{display:flex;gap:10px;align-items:center;padding-top:8px;flex-wrap:wrap;}
.btn{padding:8px 20px;border:none;border-radius:5px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:.82em;letter-spacing:.04em;
  transition:opacity .12s,transform .06s;}
.btn:active{transform:scale(.97);}
.btn-save{background:var(--forest);color:#fff;}
.btn-save:hover{opacity:.88;}
.btn-del{background:var(--crimson);color:#fff;}
.btn-del:hover{opacity:.88;}
.btn-new{background:rgba(201,146,42,.2);color:var(--ink);
  border:1px solid var(--gold);}
.btn-new:hover{background:rgba(201,146,42,.35);}
#save-flash{font-size:.82em;color:var(--forest);font-weight:700;
  opacity:0;transition:opacity .4s;}

/* Form header */
#form-title-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
#form-heading{font-family:'Cinzel',serif;font-size:1.05em;color:var(--crimson);flex:1;}
.builtin-badge{font-size:.7em;background:rgba(201,146,42,.12);
  border:1px solid var(--gold);border-radius:4px;padding:2px 8px;color:var(--gold);}

/* Status bar */
#status-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:1800px;background:rgba(26,13,4,.9);
  border-top:1px solid var(--border2);padding:4px 16px;
  font-size:.75em;color:rgba(240,180,41,.6);z-index:50;
  display:flex;align-items:center;gap:8px;}
#status-msg{flex:1;}


.login-field{margin-bottom:12px;}
.login-field label{display:block;font-family:'Cinzel',serif;font-size:.7em;
  text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);margin-bottom:4px;}
.login-btns{display:flex;gap:8px;margin-top:16px;}
#login-status{margin-top:8px;font-size:.82em;min-height:1.2em;}
.test-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.test-pill{padding:3px 8px;background:rgba(201,146,42,.15);border:1px solid var(--border);
  border-radius:3px;font-size:.72em;cursor:pointer;color:var(--ink2);
  transition:background .1s;}
.test-pill:hover{background:rgba(201,146,42,.3);}

/* Dupe quest list */
.dupe-row{display:flex;align-items:center;gap:10px;padding:9px 14px;
  border-bottom:1px solid var(--border2);}
.dupe-row:last-child{border-bottom:none;}
.dupe-row:nth-child(odd){background:rgba(44,26,14,.03);}
.dupe-pos{font-size:.75em;color:var(--ink2);min-width:22px;text-align:right;}
.dupe-title{flex:1;font-size:.9em;}
.dupe-type{font-size:.82em;color:var(--ink2);}
.dupe-mvs{display:flex;flex-direction:column;gap:2px;}
.dupe-mv{background:none;border:1px solid var(--border);border-radius:3px;
  padding:1px 6px;cursor:pointer;font-size:.72em;color:var(--ink2);
  transition:background .1s;}
.dupe-mv:hover:not(:disabled){background:rgba(201,146,42,.2);}
.dupe-mv:disabled{opacity:.25;cursor:default;}
.dupe-list-wrap{border:1px solid var(--border);border-radius:6px;
  overflow:hidden;margin-bottom:16px;max-height:320px;overflow-y:auto;}

/* Responsive */

@media(max-width:600px){
  #main{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  #sidebar{max-height:40vh;border-right:none;border-bottom:1px solid var(--border);}
  #form-inner{padding:16px 16px 80px;}
}

.quest-row {
  display: flex;
  align-items: center;
  gap: 4px;
}
.quest-row .quest-row-title {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ══════════════════════════════════════════════════
   QUEST MATRIX (cycle-settings inline quest editor)
   ══════════════════════════════════════════════════ */
.qmx-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:6px;
  background:rgba(255,253,232,.5);margin-top:8px;}
.qmx{border-collapse:separate;border-spacing:0;width:100%;min-width:1400px;
  font-size:.82em;}
.qmx thead th{position:sticky;top:0;background:linear-gradient(180deg,#f4e8c1,#e8d5a0);
  font-family:'Cinzel',serif;font-size:.68em;text-transform:uppercase;
  letter-spacing:.05em;color:#6b4a1e;padding:7px 6px;text-align:left;
  border-bottom:1px solid var(--gold);white-space:nowrap;z-index:2;}
.qmx thead th.num{text-align:center;}
.qmx tbody td{padding:4px 5px;border-bottom:1px solid rgba(201,146,42,.15);
  vertical-align:top;}
.qmx tbody tr:hover{background:rgba(201,146,42,.04);}
.qmx tbody tr.capstone{background:rgba(201,146,42,.06);}
.qmx tbody tr.capstone:hover{background:rgba(201,146,42,.1);}
.qmx .qmx-pos{font-family:'Cinzel',serif;font-size:.78em;color:#a08030;
  text-align:center;width:30px;}
.qmx .qmx-reord{width:54px;white-space:nowrap;text-align:center;}
.qmx .qmx-reord button{border:1px solid #d4b87a;background:#fffde8;color:#8b6914;
  font-size:.8em;padding:0 5px;line-height:1.5;cursor:pointer;border-radius:3px;
  margin:0 1px;}
.qmx .qmx-reord button[disabled]{opacity:.25;cursor:default;}
.qmx input[type="text"],.qmx input[type="number"],.qmx textarea,.qmx select{
  width:100%;padding:3px 5px;font-size:.95em;font-family:'Crimson Text',Georgia,serif;
  border:1px solid transparent;background:transparent;border-radius:3px;
  box-sizing:border-box;color:var(--ink);}
.qmx input[type="text"]:hover,.qmx input[type="number"]:hover,
.qmx textarea:hover,.qmx select:hover{border-color:rgba(201,146,42,.3);
  background:rgba(255,253,232,.6);}
.qmx input[type="text"]:focus,.qmx input[type="number"]:focus,
.qmx textarea:focus,.qmx select:focus{border-color:var(--gold);outline:none;
  background:#fffde8;}
.qmx textarea{resize:vertical;min-height:28px;max-height:300px;line-height:1.3;
  overflow-y:hidden;}
.qmx textarea[data-qmx-autogrow]{overflow-y:auto;}
.qmx select{cursor:pointer;appearance:none;-webkit-appearance:none;
  padding-right:18px;background-image:linear-gradient(45deg,transparent 50%,#8b6914 50%),
  linear-gradient(135deg,#8b6914 50%,transparent 50%);
  background-position:calc(100% - 10px) 55%,calc(100% - 6px) 55%;
  background-size:4px 4px;background-repeat:no-repeat;}
.qmx .qmx-title{min-width:140px;max-width:200px;}
.qmx .qmx-desc{min-width:180px;max-width:260px;}
.qmx .qmx-type{min-width:90px;}
.qmx .qmx-num{width:58px;}
.qmx .qmx-chips{min-width:120px;max-width:180px;}
.qmx .qmx-more{width:54px;text-align:center;}
.qmx .qmx-more button{border:1px solid #d4b87a;background:#fffde8;color:#8b6914;
  font-size:.85em;padding:2px 9px;cursor:pointer;border-radius:4px;
  font-family:'Cinzel',serif;letter-spacing:.04em;}
.qmx .qmx-more button:hover{background:#f0b429;color:#1d1209;border-color:var(--gold);}
.qmx .qmx-badge-cell{width:26px;text-align:center;font-size:.9em;}

/* Header action buttons (column clear, gradient interpolate) */
.qmx thead .qmx-hdr-btn{border:1px solid rgba(139,26,26,.4);background:rgba(255,253,232,.6);
  color:#8b1a1a;font-size:.7em;line-height:1;padding:1px 6px;cursor:pointer;
  border-radius:3px;font-family:'Cinzel',serif;}
.qmx thead .qmx-hdr-btn:hover{background:#8b1a1a;color:#fff;border-color:#8b1a1a;}
.qmx thead .qmx-hdr-btn.qmx-hdr-grad{border-color:rgba(45,80,22,.5);color:#2d5016;}
.qmx thead .qmx-hdr-btn.qmx-hdr-grad:hover{background:#2d5016;color:#fff;border-color:#2d5016;}

/* Chip multi-picker (used inline in matrix for skills/langs/tools/etc.) */
.qmx-chipbox{display:flex;flex-wrap:wrap;gap:3px;padding:3px 4px;min-height:28px;
  border:1px solid transparent;border-radius:3px;cursor:pointer;align-items:flex-start;
  align-content:flex-start;}
.qmx-chipbox:hover{border-color:rgba(201,146,42,.3);background:rgba(255,253,232,.6);}
.qmx-chipbox:empty::before{content:'— none —';font-size:.88em;color:#aaa;
  font-style:italic;padding:2px 4px;}
.qmx-chip{display:inline-flex;align-items:center;background:rgba(26,95,160,.12);
  color:#1a5fa0;border:1px solid rgba(26,95,160,.25);border-radius:10px;
  padding:0 7px;font-size:.85em;line-height:1.5;white-space:nowrap;max-width:100%;
  overflow:hidden;text-overflow:ellipsis;}
.qmx-chip.tool{background:rgba(80,120,60,.12);color:#4a6b30;
  border-color:rgba(80,120,60,.3);}
.qmx-chip.lang{background:rgba(130,70,160,.12);color:#6b3a8a;
  border-color:rgba(130,70,160,.3);}
.qmx-chip.rel{background:rgba(180,100,20,.12);color:#8b5a14;
  border-color:rgba(180,100,20,.3);}
.qmx-chip.item{background:rgba(100,100,100,.12);color:#555;
  border-color:rgba(100,100,100,.3);}

/* ══════════════════════════════════════════════════
   GENERIC MODAL (used by "More" row button and chip picker)
   ══════════════════════════════════════════════════ */
.qe-modal-backdrop{position:fixed;inset:0;background:rgba(26,13,4,.55);
  backdrop-filter:blur(2px);z-index:1000;display:flex;align-items:center;
  justify-content:center;padding:20px;animation:qeFade .12s ease-out;}
@keyframes qeFade{from{opacity:0}to{opacity:1}}
.qe-modal{background:var(--parch);border:2px solid var(--gold);border-radius:10px;
  box-shadow:0 12px 40px rgba(0,0,0,.5);max-width:720px;width:100%;
  max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.qe-modal-hdr{padding:14px 20px;background:linear-gradient(135deg,#1a0d04,#2c1a0e);
  color:var(--gold2);display:flex;align-items:center;gap:12px;}
.qe-modal-hdr h3{font-family:'Cinzel',serif;font-size:.95em;letter-spacing:.06em;
  text-transform:uppercase;flex:1;margin:0;}
.qe-modal-hdr .qe-close{background:transparent;border:1px solid rgba(201,146,42,.4);
  color:var(--gold2);border-radius:4px;padding:2px 10px;cursor:pointer;font-size:1em;
  line-height:1;}
.qe-modal-hdr .qe-close:hover{background:rgba(255,255,255,.15);}
.qe-modal-body{padding:18px 20px;overflow-y:auto;flex:1;}
.qe-modal-ftr{padding:12px 20px;background:rgba(201,146,42,.06);
  border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.qe-modal-ftr .btn{font-family:'Cinzel',serif;font-size:.78em;text-transform:uppercase;
  letter-spacing:.05em;padding:7px 16px;border-radius:4px;cursor:pointer;
  border:1px solid var(--gold);}
.qe-modal-ftr .btn-primary{background:var(--gold2);color:#1a0d04;}
.qe-modal-ftr .btn-primary:hover{background:var(--gold);}
.qe-modal-ftr .btn-ghost{background:transparent;color:var(--ink2);border-color:var(--border);}
.qe-modal-ftr .btn-ghost:hover{background:rgba(255,255,255,.3);}

/* Chip picker modal: searchable grid of options */
.qe-picker-search{width:100%;padding:8px 10px;border:1px solid var(--border);
  border-radius:5px;font-family:'Crimson Text',Georgia,serif;font-size:.95em;
  background:#fffde8;margin-bottom:12px;}
.qe-picker-grid{display:flex;flex-wrap:wrap;gap:6px;}
.qe-picker-opt{border:1px solid var(--border);background:rgba(255,253,232,.6);
  border-radius:14px;padding:4px 12px;font-size:.9em;cursor:pointer;
  transition:all .08s;user-select:none;}
.qe-picker-opt:hover{border-color:var(--gold);background:rgba(201,146,42,.1);}
.qe-picker-opt.on{background:var(--gold2);color:#1a0d04;border-color:var(--gold);
  font-weight:600;}

/* Responsive: on very narrow viewports, let the form panel show matrix via horizontal scroll */
@media(max-width:900px){
  .qmx{min-width:1100px;}
}
</style>
</head>
<body>
<div id="login-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--parch);border:2px solid var(--gold);border-radius:10px;padding:24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.5)">
    <h2 style="font-family:'Cinzel',serif;color:var(--crimson);margin-bottom:16px;font-size:1.1em">⚔ Quest Editor Login</h2>
    <div style="margin-bottom:12px">
      <label style="display:block;font-size:.8em;color:var(--ink2);margin-bottom:4px">Email</label>
      <input type="text" id="email" autocomplete="email" style="width:100%;padding:8px;border:1px solid var(--gold);border-radius:5px;background:var(--parch);font-size:.9em;box-sizing:border-box">
    </div>
    <div style="margin-bottom:12px">
      <label style="display:block;font-size:.8em;color:var(--ink2);margin-bottom:4px">Password</label>
      <input type="password" id="password" autocomplete="current-password" style="width:100%;padding:8px;border:1px solid var(--gold);border-radius:5px;background:var(--parch);font-size:.9em;box-sizing:border-box">
    </div>
    <div id="login-status" style="font-size:.82em;color:#c00;min-height:1.2em;margin-bottom:8px"></div>

function uid() {

// game_rules, outcome_template). Only this UUID can edit/create/delete those

function isSessionExpiringSoon() {
  if (!currentUser || !currentUser.expires_at) return false;
  return (Date.now() + 60000) >= (currentUser.expires_at * 1000);
}
function persistSession() {
  try {
    if (currentUser) localStorage.setItem('qed_auth', JSON.stringify(currentUser));
    else localStorage.removeItem('qed_auth');
  } catch(e) {}
}
function restoreSession() {
  try {
    var raw = localStorage.getItem('qed_auth');
    if (raw) currentUser = JSON.parse(raw);
  } catch(e) {}
}
function sbHeaders() {
  var h = { 'Content-Type': 'application/json', 'apikey': SB_KEY };
  if (currentUser && currentUser.access_token)
    h.Authorization = 'Bearer ' + currentUser.access_token;
  else
    h.Authorization = 'Bearer ' + SB_KEY;
  return h;
}
function refreshSession(force) {
  if (!currentUser || !currentUser.refresh_token) return Promise.resolve(currentUser);
  if (!force && !isSessionExpiringSoon()) return Promise.resolve(currentUser);
  return fetch(SB_URL + '/auth/v1/token?grant_type=refresh_token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
    body: JSON.stringify({ refresh_token: currentUser.refresh_token })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.access_token) { currentUser = d; persistSession(); }
    return currentUser;
  }).catch(function() { return currentUser; });
}
function sbFetch(url, opts) {
  opts = opts || {};
  return refreshSession(false).catch(function() { return currentUser; }).then(function() {
    var req = Object.assign({}, opts);
    req.headers = Object.assign({}, sbHeaders(), opts.headers || {});
    return fetch(url, req);
  });
}
function sbGet(params) {
  return sbFetch(SB_URL + '/rest/v1/content_items?' + params, { method: 'GET' })
    .then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error('GET ' + r.status + ': ' + t); });
      return r.json();
    });
}
function sbUpsert(rows) {
  return sbFetch(
    SB_URL + '/rest/v1/content_items?on_conflict=content_key,owner_user_id,content_type',
    {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(Array.isArray(rows) ? rows : [rows])
    }
  ).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error('UPSERT ' + r.status + ': ' + t); });
    return true;
  });
}
function sbDelete(filter) {
  return sbFetch(SB_URL + '/rest/v1/content_items?' + filter, { method: 'DELETE' })
    .then(function(r) {
      if (!r.ok && r.status !== 404)
        return r.text().then(function(t) { throw new Error('DEL ' + r.status + ': ' + t); });
      return true;
    });
}

function sbPrereqFetch(questKey) {
  var url = SB_URL + '/rest/v1/quest_prereqs?quest_key=eq.' + encodeURIComponent(questKey) +
    '&order=sort_order.asc';
  return sbFetch(url, { method: 'GET' }).then(function(r) {
    if (!r.ok) return [];
    return r.json();
  }).catch(function() { return []; });
}

function sbPrereqSave(questKey, prereqRows) {
  // Delete existing rows for this quest_key, then bulk insert fresh ones
  var delUrl = SB_URL + '/rest/v1/quest_prereqs?quest_key=eq.' + encodeURIComponent(questKey) +
    '&owner_user_id=eq.' + encodeURIComponent(uid());
  return sbFetch(delUrl, { method: 'DELETE' }).then(function() {
    if (!prereqRows.length) return;
    return sbFetch(SB_URL + '/rest/v1/quest_prereqs', {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify(prereqRows)
    });
  });
}

function prereqRowsFromForm(questKey) {
  var rows = [];
  var order = 0;
  var userId = uid();
  function row(type, value, qty, minLv, bonusOnly, bonusNote, ic) {
    return { quest_key: questKey, owner_user_id: userId,
      prereq_type: type, value: value || null,
      quantity: qty || 1, min_level: minLv || null,
      bonus_only: !!bonusOnly, bonus_note: bonusNote || null,
      ic: ic || null, sort_order: order++ };
  }
  selValues('qf-skills').forEach(function(s) { rows.push(row('skill', s)); });
  selValues('qf-tools').forEach(function(t) { rows.push(row('tool', t)); });
  selValues('qf-lang').forEach(function(l) { rows.push(row('lang', l)); });
  selValues('qf-rel').forEach(function(r) { rows.push(row('rel', r)); });
  selValues('qf-pets').forEach(function(p) { rows.push(row('pet', p)); });
  var gold = parseInt(document.getElementById('qf-gold').value) || 0;
  if (gold > 0) rows.push(row('gold', null, gold));
  var minLv = parseInt(document.getElementById('qf-min-level').value) || 0;
  if (minLv > 0) rows.push(row('level', null, 1, minLv));
  selValues('qf-items').forEach(function(item) { rows.push(row('item', item)); });
  var vrName = (document.getElementById('qf-vrq-name').value || '').trim();
  var vrDesc = (document.getElementById('qf-vrq-desc').value || '').trim();
  if (vrName) rows.push(row('vehicle', vrName, 1, null, true, vrDesc, '\uD83D\uDE97'));
  var brName = (document.getElementById('qf-brq-name').value || '').trim();
  var brDesc = (document.getElementById('qf-brq-desc').value || '').trim();
  if (brName) rows.push(row('building', brName, 1, null, true, brDesc, '\uD83C\uDFDB'));
  return rows;
}

function prereqRowsToFormValues(rows, q) {
  // Populate form from DB rows, falling back to q.pre blob if no rows
  if (!rows || !rows.length) {
    // Blob fallback — already handled by the form defaults
    return;
  }
  var skills = [], tools = [], langs = [], items = [], rel = [],
      gold = 0, minLv = 0, vrName = '', vrDesc = '', brName = '', brDesc = '';
  rows.forEach(function(r) {
    if (r.prereq_type === 'skill')    skills.push(r.value);
    else if (r.prereq_type === 'tool')    tools.push(r.value);
    else if (r.prereq_type === 'lang')    langs.push(r.value);
    else if (r.prereq_type === 'rel')     { if (!Array.isArray(rel)) rel = []; if (r.value) rel.push(r.value); }
    else if (r.prereq_type === 'gold')    gold = r.quantity || 0;
    else if (r.prereq_type === 'level')   minLv = r.min_level || 0;
    else if (r.prereq_type === 'item')    items.push(r.value);
    else if (r.prereq_type === 'vehicle' && r.bonus_only) { vrName = r.value || ''; vrDesc = r.bonus_note || ''; }
    else if (r.prereq_type === 'building' && r.bonus_only) { brName = r.value || ''; brDesc = r.bonus_note || ''; }
  });
  // Apply to form elements (they already exist in DOM at this point)
  function setMulti(id, vals) {
    var el = document.getElementById(id); if (!el) return;
    Array.from(el.options).forEach(function(o) { o.selected = vals.indexOf(o.value) !== -1; });
  }
  setMulti('qf-skills', skills); setMulti('qf-tools', tools); setMulti('qf-lang', langs);
  setMulti('qf-rel', Array.isArray(rel) ? rel : (rel ? [rel] : []));
  setMulti('qf-pets', items.filter(function(x){ return PET_NAMES.indexOf(x) !== -1; }));
  items = items.filter(function(x){ return PET_NAMES.indexOf(x) === -1; }); // gear only
  var goldEl = document.getElementById('qf-gold'); if (goldEl) goldEl.value = gold;
  var lvEl = document.getElementById('qf-min-level'); if (lvEl) lvEl.value = minLv;
  var itemsEl = document.getElementById('qf-items'); if (itemsEl) itemsEl.value = items.join('\n');
  var vrEl = document.getElementById('qf-vrq-name'); if (vrEl) vrEl.value = vrName;
  var vrDEl = document.getElementById('qf-vrq-desc'); if (vrDEl) vrDEl.value = vrDesc;
  var brEl = document.getElementById('qf-brq-name'); if (brEl) brEl.value = brName;
  var brDEl = document.getElementById('qf-brq-desc'); if (brDEl) brDEl.value = brDesc;
}

async function doLogin() {
  var email = document.getElementById('email').value.trim();
  var pass  = document.getElementById('password').value;
  if (!email || !pass) { setLoginStatus('Enter email and password.', true); return; }
  setLoginStatus('Logging in…', false);
  try {
    var r = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
      body: JSON.stringify({ email, password: pass })
    });
    var d = await r.json();
    if (!r.ok) throw new Error(d.error_description || 'Login failed');
    currentUser = d;
    persistSession();
    showApp();
  } catch(err) {
    setLoginStatus(err.message || 'Login failed', true);
  }
}
async function doRegister() {
  var email = document.getElementById('email').value.trim();
  var pass  = document.getElementById('password').value;
  if (!email || !pass) { setLoginStatus('Enter email and password.', true); return; }
  setLoginStatus('Creating account…', false);
  var r = await fetch(SB_URL + '/auth/v1/signup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
    body: JSON.stringify({ email, password: pass })
  });
  var d = await r.json();
  if (!r.ok) { setLoginStatus(d.msg || d.error_description || 'Failed', true); return; }
  setLoginStatus('Account created — now log in.', false);
}
function doLogout() {
  currentUser = null;
  persistSession();
  showLogin();
}
window.doLogin    = doLogin;

function _mergeDbIntoPrereqLists() {
  // Merge custom DB items into GEAR_PREREQ_NAMES (deduplicated)
  (items || []).forEach(function(it) {
    if (it.name && GEAR_PREREQ_NAMES.indexOf(it.name) === -1) {
      GEAR_PREREQ_NAMES.push(it.name);
    }
  });
  // Merge custom DB pets into PET_NAMES (deduplicated)
  (pets || []).forEach(function(p) {
    if (p.name && PET_NAMES.indexOf(p.name) === -1) {
      PET_NAMES.push(p.name);
    }
  });
  // Merge capstone-rewarded items from custom quests into GEAR_PREREQ_NAMES
  // (e.g. 'Longinus Carpetbag of Holding' awarded as capstoneReward.name)
  (quests || []).forEach(function(q) {
    if (q.capstoneReward && q.capstoneReward.name) {
      var n = q.capstoneReward.name;
      if (GEAR_PREREQ_NAMES.indexOf(n) === -1) GEAR_PREREQ_NAMES.push(n);
    }
    if (q.reward && typeof q.reward === 'string' && q.reward.length > 2) {
      // reward strings like 'Longinus Bag of Holding' also count
      if (GEAR_PREREQ_NAMES.indexOf(q.reward) === -1) GEAR_PREREQ_NAMES.push(q.reward);
    }
  });
}

function pullData() {
  if (!uid()) { setStatus('Not connected.'); return; }
  setStatus('Loading…');

  // Fetch 1: author's own quest/quest_set content (private authoring) + own monsters
  var ownFilter = 'select=*' +
    '&owner_user_id=eq.' + encodeURIComponent(uid()) +
    '&content_type=in.(quest_set,quest,monster)' +
    '&order=sort_order.asc';

  // Fetch 2: shared vocabulary visible to all authors regardless of owner
  // Monsters: include official+shared from any owner (for Pull-from-Workshop)
  // Traits/terrain/conditions/game_rules/outcome_template: official+shared only
  var vocabFilter = 'select=*' +
    '&visibility=in.(official,shared)' +
    '&content_type=in.(trait,terrain,condition,game_rules,outcome_template,monster)' +
    '&order=sort_order.asc';

  return Promise.all([
    sbGet(ownFilter),
    sbGet(vocabFilter)
  ]).then(function(results) {
    // Merge, dedupe by (content_type, content_key). Own rows take precedence
    // so author drafts override any shared version of the same key.
    var ownRows   = results[0] || [];
    var vocabRows = results[1] || [];
    var seen = {};
    var rows = [];
    ownRows.forEach(function(r) {
      var k = r.content_type + '::' + r.content_key;
      if (!seen[k]) { seen[k] = true; rows.push(r); }
    });
    vocabRows.forEach(function(r) {
      var k = r.content_type + '::' + r.content_key;
      if (!seen[k]) { seen[k] = true; rows.push(r); }
    });

    cycles = [];
    quests = [];
    traits = [];
    terrain = [];
    conditions = [];
    gameRules = [];
    outcomeTemplates = [];
    monsters = [];
    // pets reset inside the pets table fetch below
    (rows || []).forEach(function(row) {
      var d = row.data || {};
      // Strip fields that the main app embeds into data (stale/internal)
      delete d._dbId; delete d._ownerUserId; delete d._published;
      delete d._visibility; delete d._editable;
      // Set fresh fields from the row itself
      d._dbId       = row.id;
      d._visibility = row.visibility;
      d._ownerUserId = row.owner_user_id || '';
      d.published   = (row.visibility === 'shared' || row.visibility === 'official');
      if (row.content_type === 'quest_set') {
        if (!d.cycleGate) d.cycleGate = {};
        cycles.push(d);
      } else if (row.content_type === 'quest') {
        // Preserve sort_order from DB row for reordering
        if (typeof row.sort_order === 'number') d.sort_order = row.sort_order;
        quests.push(d);
      } else if (row.content_type === 'trait') {
        if (typeof row.sort_order === 'number') d.sort_order = row.sort_order;
        d.content_key = row.content_key;
        traits.push(d);
      } else if (row.content_type === 'terrain') {
        if (typeof row.sort_order === 'number') d.sort_order = row.sort_order;
        d.content_key = row.content_key;
        terrain.push(d);
      } else if (row.content_type === 'condition') {
        if (typeof row.sort_order === 'number') d.sort_order = row.sort_order;
        d.content_key = row.content_key;
        conditions.push(d);
      } else if (row.content_type === 'game_rules') {
        d.content_key = row.content_key;
        gameRules.push(d);
      } else if (row.content_type === 'outcome_template') {
        if (typeof row.sort_order === 'number') d.sort_order = row.sort_order;
        d.content_key = row.content_key;
        outcomeTemplates.push(d);
      } else if (row.content_type === 'monster') {
        if (typeof row.sort_order === 'number') d.sort_order = row.sort_order;
        d.content_key = row.content_key;
        monsters.push(d);
      }
    });
    // Default: collapse all cycles
    cycles.forEach(function(c) {
      if (!(c.id in collapsed)) collapsed[c.id] = true;
    });
    // Also fetch all pets from the dedicated pets table
    // Fetch pets, items, and effects in parallel
    return Promise.all([
      sbFetch(SB_URL + '/rest/v1/pets?order=sort_order.asc', {method:'GET'}).then(function(r){return r.json();}),
      sbFetch(SB_URL + '/rest/v1/items?order=sort_order.asc', {method:'GET'}).then(function(r){return r.json();}),
      sbFetch(SB_URL + '/rest/v1/effects?order=name.asc', {method:'GET'}).then(function(r){return r.json();}),
      sbFetch(SB_URL + '/rest/v1/item_effects?select=item_id,effect_id', {method:'GET'}).then(function(r){return r.json();})
    ]).then(function(results) {
      var petRows = results[0] || [];
      var itemRows = results[1] || [];
      var effectRows = results[2] || [];
      var linkRows = results[3] || [];

      pets = petRows.map(function(row) {
        return { id:row.id, name:row.name, ic:row.ic||'🐾', desc:row.description||'',
          rar:row.rar||'common', price:row.price||0, published:!!row.published,
          sort_order:row.sort_order||0, _dbId:row.id };
      });

      effects = effectRows.map(function(row) {
        return { id:row.id, name:row.name, description:row.description||'',
          effect_type:row.effect_type, target:row.target||'',
          bonus_value:row.bonus_value, _dbId:row.id };
      });

      // Build item_id → [effect_id] map
      var fxMap = {};
      linkRows.forEach(function(l) {
        if (!fxMap[l.item_id]) fxMap[l.item_id] = [];
        fxMap[l.item_id].push(l.effect_id);
      });

      items = itemRows.map(function(row) {
        return { id:row.id, name:row.name, ic:row.ic||'📦', desc:row.description||'',
          type:row.type||'gear', rar:row.rar||'common', price:row.price||0,
          weight:row.weight||0, published:!!row.published, sort_order:row.sort_order||0,
          effect_ids: fxMap[row.id] || [],
          _dbId:row.id };
      });

      setStatus('Loaded ' + cycles.length + ' cycles, ' + quests.length + ' quests, '
        + pets.length + ' pets, ' + items.length + ' items, '
        + traits.length + ' traits, ' + terrain.length + ' terrains, '
        + conditions.length + ' conditions.');
      _mergeDbIntoPrereqLists(); // inject custom items/pets into prereq dropdowns
      renderList();
    });
  }).catch(function(err) {
    setStatus('Load failed: ' + (err.message || err), '#e55');
    renderList();
  });
}

// ══════════════════════════════════════════════════
// SAVE HELPERS
// ══════════════════════════════════════════════════
function cycleToRow(cycle, idx) {
  var pub = cycle.published ? 'shared' : 'private';
  var data = {
    id:        cycle.id,
    name:      cycle.name,
    theme:     cycle.theme || ''
  };
  if (cycle.territory) data.territory = cycle.territory;
  if (cycle.cycleGate) data.cycleGate = cycle.cycleGate;
  if (Array.isArray(cycle.questOrder) && cycle.questOrder.length) data.questOrder = cycle.questOrder;
  return {
    content_type:  'quest_set',
    content_key:   cycle.id,
    title:         cycle.name || cycle.id,
    data:          data,
    visibility:    pub,
    status:        'published',
    owner_user_id: uid(),
    sort_order:    idx || 0
  };
}
// Direct pets table CRUD
function savePetRow(p) {
  var isNew = !p._dbId;
  var body = JSON.stringify({
    name:        p.name,
    ic:          p.ic || '🐾',
    description: p.desc || '',
    rar:         p.rar || 'common',
    price:       p.price || 0,
    published:   !!p.published,
    sort_order:  p.sort_order || 0
  });
  if (isNew) {
    return sbFetch(SB_URL + '/rest/v1/pets', {
      method: 'POST',
      headers: { 'Prefer': 'return=representation' },
      body: body
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
      return r.json();
    }).then(function(rows) {
      if (rows && rows[0]) p._dbId = rows[0].id;
      return p;
    });
  } else {
    return sbFetch(SB_URL + '/rest/v1/pets?id=eq.' + encodeURIComponent(p._dbId), {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: body
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
      return p;
    });
  }
}
function deletePetRow(p) {
  if (!p._dbId) return Promise.resolve();
  return sbFetch(SB_URL + '/rest/v1/pets?id=eq.' + encodeURIComponent(p._dbId), {
    method: 'DELETE'
  }).then(function(r) {
    if (!r.ok && r.status !== 404)
      return r.text().then(function(t) { throw new Error(t); });
  });
}

function questToRow(q, idx) {
  var pub = q.published ? 'shared' : 'private';
  var data = Object.assign({}, q);
  delete data._dbId;
  delete data._dbContent;
  delete data.sort_order;
  delete data.published;
  delete data._visibility;
  return {
    content_type:  'quest',
    content_key:   q.setId + '::' + q.idx,
    title:         q.title || ('Quest ' + q.idx),
    data:          data,
    visibility:    pub,
    status:        'published',
    owner_user_id: uid(),
    sort_order:    typeof idx === 'number' ? idx : (typeof q.sort_order === 'number' ? q.sort_order : (q.idx || 0))
  };
}

function saveCycle(cycle) {
  var idx = cycles.indexOf(cycle);
  return sbUpsert(cycleToRow(cycle, idx)).then(function() {
    flash('✓ Cycle saved');
    setStatus('Cycle "' + cycle.name + '" saved.');
  });
}
function saveQuest(q) {
  return sbUpsert(questToRow(q)).then(function() {
    flash('✓ Quest saved');
    setStatus('Quest "' + q.title + '" saved.');
  });
}
function savePet(p) {
  return savePetRow(p).then(function() {
    flash('✓ Pet saved');
    setStatus('Pet "' + p.name + '" saved.');
  });
}
function deletePet(p) {
  return deletePetRow(p).then(function() {
    pets = pets.filter(function(x) { return x !== p; });
    sel = null;
    setStatus('Pet "' + p.name + '" deleted.');
    renderList();
    showPlaceholder();
  });
}

function deleteQuest(q) {
  var key = q.setId + '::' + q.idx;
  var filter = 'content_type=eq.quest' +
    '&content_key=eq.' + encodeURIComponent(key) +
    '&owner_user_id=eq.' + encodeURIComponent(uid());
  return sbDelete(filter).then(function() {
    quests = quests.filter(function(x) { return x !== q; });
    sel = null;
    setStatus('Quest deleted.');
    renderList();
    showPlaceholder();
  });
}
function deleteCycle(cycle) {
  // Delete the cycle set row
  var filter = 'content_type=eq.quest_set' +
    '&content_key=eq.' + encodeURIComponent(cycle.id) +
    '&owner_user_id=eq.' + encodeURIComponent(uid());
  // Also delete all quest rows for this cycle
  var qFilter = 'content_type=eq.quest' +
    '&content_key=like.' + encodeURIComponent(cycle.id + '::%') +
    '&owner_user_id=eq.' + encodeURIComponent(uid());
  return Promise.all([sbDelete(filter), sbDelete(qFilter)]).then(function() {
    cycles = cycles.filter(function(c) { return c !== cycle; });
    quests = quests.filter(function(q) { return q.setId !== cycle.id; });
    sel = null;
    setStatus('Cycle "' + cycle.name + '" deleted.');
    renderList();
    showPlaceholder();
  });
}

function flash(msg) {
  var el = document.getElementById('save-flash');
  if (!el) return;
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0'; }, 1800);
}

// ══════════════════════════════════════════════════
// LIST RENDERING
// ══════════════════════════════════════════════════
function renderPetList() {
  var el = document.getElementById('list-scroll');
  if (!uid()) { el.innerHTML = '<div class="list-empty">Log in to load pets.</div>'; return; }

  var allPets = pets.slice();
  if (!allPets.length) {
    el.innerHTML = '<div class="list-empty">No pets yet. Pull to load.</div>';
    return;
  }

  var rarOrder = ['common','uncommon','rare','veryrare'];
  var rarLabels = { common:'Common', uncommon:'Uncommon', rare:'Rare', veryrare:'Very Rare' };
  var html = '';
  rarOrder.forEach(function(rar) {
    var group = allPets.filter(function(p) { return (p.rar||'common') === rar; });
    if (!group.length) return;
    html += '<div style="padding:6px 12px 3px;font-family:\'Cinzel\',serif;font-size:.7em;' +
      'text-transform:uppercase;letter-spacing:.05em;color:var(--gold);' +
      'border-top:1px solid var(--border2);margin-top:4px">' + rarLabels[rar] + '</div>';
    group.forEach(function(p) {
      var isCustom = !!p._custom;
      var isSel = sel && sel.kind === 'pet' && sel.name === p.name;
      html += '<div class="quest-row ' + (isSel ? 'sel' : '') + '" data-sel-pet="' + esc(p.name) + '">' +
        '<span style="margin-right:4px">' + (p.ic || '🐾') + '</span>' +
        '<span class="quest-row-title">' + esc(p.name) + '</span>' +
        (isCustom ? '<span class="qbadge custom">custom</span>' :
          '<span class="qbadge">built-in</span>') +
        '</div>';
    });
  });
  el.innerHTML = html;
  el.onclick = function(e) {
    var row = e.target.closest('[data-sel-pet]');
    if (!row) return;
    var name = row.getAttribute('data-sel-pet');
    sel = { kind: 'pet', name: name };
    renderPetList();
    showPetForm(name);
  };
}

function renderList() {
  // Sync tab button states
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    var on = b.getAttribute('data-tab') === activeTab;
    b.classList.toggle('active', on);
    b.style.borderBottomColor = on ? 'var(--gold)' : 'transparent';
    b.style.background = on ? 'rgba(201,146,42,.1)' : 'none';
    b.style.color = on ? 'var(--gold)' : 'var(--ink2)';
  });
  // Show/hide quest-only controls
  var isQuests = activeTab === 'quests';
  document.getElementById('btn-dupe-cycle').style.display = isQuests ? '' : 'none';
  document.getElementById('btn-new-cycle').style.display  = isQuests ? '' : 'none';
  document.getElementById('btn-new-quest').style.display  = (isQuests && sel && (sel.kind==='cycle'||sel.kind==='quest')) ? '' : 'none';
  document.getElementById('btn-new-pet').style.display    = activeTab === 'pets'  ? '' : 'none';
  document.getElementById('btn-new-item').style.display   = activeTab === 'items' ? '' : 'none';
  document.getElementById('btn-new-trait').style.display  = (activeTab === 'traits' && isAdmin()) ? '' : 'none';
  if (activeTab === 'pets')   { renderPetList();   return; }
  if (activeTab === 'items')  { renderItemList();  return; }
  if (activeTab === 'traits') { renderTraitList(); return; }
  var el = document.getElementById('list-scroll');
  if (!uid()) {
    el.innerHTML = '<div class="list-empty">Log in to load your quests.</div>';
    document.getElementById('btn-new-quest').style.display = 'none';
    return;
  }
  if (!cycles.length) {
    el.innerHTML = '<div class="list-empty">No quest cycles yet.<br>Click "+ Cycle" to create one.</div>';
    document.getElementById('btn-new-quest').style.display = 'none';
    return;
  }

  var html = '';
  cycles.forEach(function(cycle) {
    var isOpen = !collapsed[cycle.id];
    var cycleQuests = quests
      .filter(function(q) { return q.setId === cycle.id; })
      .sort(function(a, b) {
        var so_a = typeof a.sort_order === 'number' ? a.sort_order : (a.idx || 0);
        var so_b = typeof b.sort_order === 'number' ? b.sort_order : (b.idx || 0);
        if (so_a !== so_b) return so_a - so_b;
        return (a.idx || 0) - (b.idx || 0); // tiebreak by idx
      });
    var isCycleSel = sel && sel.kind === 'cycle' && sel.setId === cycle.id;
    var pubClass = cycle.published ? 'pub' : 'unpub';
    var pubLabel = cycle.published ? 'Published' : 'Draft';

    html += '<div class="cycle-group" data-setid="' + esc(cycle.id) + '">';
    html += '<div class="cycle-hdr" data-toggle="' + esc(cycle.id) + '">' +
      '<span class="cycle-toggle ' + (isOpen ? 'open' : '') + '">▶</span>' +
      '<span class="cycle-name">' + esc(cycle.name || 'Untitled Cycle') + '</span>' +
      '<span class="cycle-count">' + cycleQuests.length + '</span>' +
      '<span class="cycle-pub ' + pubClass + '">' + pubLabel + '</span>' +
      '</div>';

    html += '<div class="quest-rows ' + (isOpen ? 'open' : '') + '" data-setid="' + esc(cycle.id) + '">';
    // Cycle rules row
    html += '<div class="quest-row ' + (isCycleSel ? 'sel' : '') +
      '" data-sel-cycle="' + esc(cycle.id) + '" style="padding-left:14px;border-left-color:' +
      (isCycleSel ? 'var(--purple)' : 'transparent') + '">' +
      '<span class="quest-row-title" style="color:var(--ink2);font-style:italic">⚙ Cycle settings</span>' +
      '</div>';

    cycleQuests.forEach(function(q, qi) {
      var isQSel = sel && sel.kind === 'quest' && sel.setId === cycle.id && sel.idx === q.idx;
      var badges = '';
      if (q._custom || q._editable) badges += '<span class="qbadge custom">custom</span>';
      if (q.capstone) badges += '<span class="qbadge cap">capstone</span>';
      var isFirst = (qi === 0); // kept for future use
      var isLast  = (qi === cycleQuests.length - 1);
      html += '<div class="quest-row ' + (isQSel ? 'sel' : '') +
        '" data-sel-quest="' + esc(cycle.id) + '" data-idx="' + q.idx + '">' +
        '<span class="quest-row-title" style="flex:1">' + esc(q.title || '(untitled)') + '</span>' +
        badges +
        '</div>';
    });

    html += '<div class="quest-row" data-new-quest="' + esc(cycle.id) +
      '" style="opacity:.6;font-style:italic;padding-left:22px">' +
      '<span class="quest-row-title" style="font-size:.82em">+ New quest</span></div>';

    html += '</div></div>';
  });

  el.innerHTML = html;

  // Show/hide the "New Quest" header button based on selection
  var hasSelCycle = sel && (sel.kind === 'cycle' || sel.kind === 'quest');
  document.getElementById('btn-new-quest').style.display = hasSelCycle ? '' : 'none';

  // Event delegation on the scroll container
  el.onclick = function(e) {
    // Toggle collapse
    var toggleEl = e.target.closest('[data-toggle]');
    if (toggleEl) {
      var sid = toggleEl.getAttribute('data-toggle');
      collapsed[sid] = !collapsed[sid];
      renderList();
      return;
    }
    // ── Quest reorder: position dropdown change (handled on 'change', not click) ──

    // Select cycle settings
    var cycleRow = e.target.closest('[data-sel-cycle]');
    if (cycleRow && !cycleRow.hasAttribute('data-toggle')) {
      var sid = cycleRow.getAttribute('data-sel-cycle');
      sel = { kind: 'cycle', setId: sid };
      renderList();
      showCycleForm(sid);
      return;
    }
    // Select quest
    var questRow = e.target.closest('[data-sel-quest]');
    if (questRow) {
      var sid = questRow.getAttribute('data-sel-quest');
      var idx = parseInt(questRow.getAttribute('data-idx'), 10);
      sel = { kind: 'quest', setId: sid, idx: idx };
      renderList();
      showQuestForm(sid, idx);
      return;
    }
    // New quest inline
    var newQ = e.target.closest('[data-new-quest]');
    if (newQ) {
      var sid = newQ.getAttribute('data-new-quest');
      createNewQuest(sid);
      return;
    }
  };
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// PLACEHOLDER
// ══════════════════════════════════════════════════
function showPetForm(name) {
  // Find in custom pets first, then built-ins
  var p = pets.filter(function(x) { return x.name === name; })[0] || null;
  var isNew = !p;

  var fi = document.getElementById('form-inner');
  fi.innerHTML =
    '<div id="form-title-row">' +
    '<div id="form-heading">' + (isNew ? '🐾 New Pet' : '🐾 ' + esc(p.name)) + '</div>' +
    '</div>' +

    pubRow(p ? !!p.published : false) +

    '<div class="fsec">' +
    '<div class="fsec-title">Identity</div>' +
    '<div style="display:grid;grid-template-columns:80px 1fr;gap:12px;align-items:start">' +
    frow('Icon', '<input type="text" id="pf-ic" value="' + esc(p ? p.ic : '🐾') + '" style="font-size:1.4em;text-align:center;padding:6px">') +
    frow('Name *', '<input type="text" id="pf-name" value="' + esc(p ? p.name : '') + '" placeholder="e.g. Shadow Cat">') +
    '</div>' +
    '<div class="fgrid" style="margin-top:10px">' +
    frow('Description *', '<textarea id="pf-desc" rows="3" placeholder="What does this pet do?">' + esc(p ? p.desc : '') + '</textarea>') +
    '</div></div>' +

    '<div class="fsec">' +
    '<div class="fsec-title">Stats</div>' +
    '<div class="fgrid c2">' +
    frow('Rarity', rarSelect('pf-rar', p ? p.rar : 'common')) +
    frow('Price (gp)', '<input type="number" id="pf-price" min="0" value="' + (p ? (p.price || 0) : 0) + '">') +
    '</div></div>' +

    '<div id="action-row">' +
    '<button class="btn btn-save" id="pf-save">💾 Save Pet</button>' +
    (!isNew ? '<button class="btn btn-del" id="pf-del">🗑 Delete</button>' : '') +
    (!isNew ? '<button class="btn btn-new" id="pf-dupe">⧉ Duplicate</button>' : '') +
    '<button class="btn btn-new" id="pf-new" style="margin-left:auto">+ New Pet</button>' +
    '<span id="save-flash"></span>' +
    '</div>';

  document.getElementById('pf-save').onclick = function() {
    var nm   = (document.getElementById('pf-name').value || '').trim();
    var desc = (document.getElementById('pf-desc').value || '').trim();
    if (!nm || !desc) { alert('Name and description are required.'); return; }
    var isPublished = document.getElementById('pub-chk').checked;
    // Simple: build the updated pet object
    var isPublished = document.getElementById('pub-chk').checked;
    var newPet = {
      name:      nm,
      ic:        (document.getElementById('pf-ic').value || '').trim() || '🐾',
      desc:      desc,
      rar:       document.getElementById('pf-rar').value || 'common',
      price:     Math.max(0, parseInt(document.getElementById('pf-price').value) || 0),
      published: isPublished,
      sort_order: p ? (p.sort_order || 0) : pets.length,
      _dbId:     p ? p._dbId : null
    };

    // Update in-memory then save to DB
    var existing = pets.filter(function(x) { return x.name === (p ? p.name : nm); })[0];
    if (existing) {
      Object.assign(existing, newPet);
    } else {
      pets.push(newPet);
      existing = newPet;
    }
    savePet(existing).then(function() {
      return pullData();
    }).then(function() {
      sel = { kind: 'pet', name: nm };
      activeTab = 'pets';
      renderList();
      showPetForm(nm);
    }).catch(function(err) {
      alert('Save failed: ' + (err.message || err));
    });
  };

  if (!isNew) {
    document.getElementById('pf-del').onclick = function() {
      if (prompt('Type DELETE to confirm removing "' + p.name + '"') !== 'DELETE') {
        alert('Cancelled.'); return;
      }
      deletePet(p);
    };
  }
  if (!isNew) {
    document.getElementById('pf-dupe').onclick = function() {
      // Pre-fill a new pet form with this pet's values, name cleared
      var dupeName = p.name + ' (copy)';
      // Check name isn't taken
      var taken = pets.some(function(x) { return x.name === dupeName; });
      if (taken) dupeName = p.name + ' ' + Date.now();
      var dupe = {
        name:      dupeName,
        ic:        p.ic,
        desc:      p.desc,
        rar:       p.rar,
        price:     p.price,
        published: false, // always start as draft
        sort_order: pets.length,
        _dbId:     null   // new row
      };
      pets.push(dupe);
      savePet(dupe).then(function() {
        return pullData();
      }).then(function() {
        sel = { kind: 'pet', name: dupeName };
        activeTab = 'pets';
        renderList();
        showPetForm(dupeName);
        flash('⧉ Duplicated as "' + dupeName + '"');
      }).catch(function(err) {
        alert('Duplicate failed: ' + (err.message || err));
      });
    };
  }
  document.getElementById('pf-new').onclick = function() {
    sel = { kind: 'pet', name: null };
    renderPetList();
    showPetForm(null);
  };
}

function rarSelect(id, val) {
  return selEl(id, ['common','uncommon','rare','veryrare'], val);
}

function renderItemList() {
  var el = document.getElementById('list-scroll');
  if (!uid()) { el.innerHTML = '<div class="list-empty">Log in to load items.</div>'; return; }
  if (!items.length) {
    el.innerHTML = '<div class="list-empty">No items yet. Pull to load.</div>';
    return;
  }

  // Group by store category
  var groups = {};
  var groupOrder = ['Adventuring','Magic','Expedition','Buildings'];
  items.forEach(function(item) {
    var typeInfo = ITEM_TYPES.filter(function(t) { return t.value === item.type; })[0];
    var group = typeInfo ? typeInfo.group : 'Other';
    if (!groups[group]) groups[group] = [];
    groups[group].push(item);
  });

  var html = '';
  groupOrder.forEach(function(grp) {
    var grpItems = groups[grp] || [];
    if (!grpItems.length) return;
    html += '<div style="padding:6px 12px 3px;font-family:\"Cinzel\",serif;font-size:.7em;' +
      'text-transform:uppercase;letter-spacing:.05em;color:var(--gold);' +
      'border-top:1px solid var(--border2);margin-top:4px">' + grp + '</div>';
    grpItems.forEach(function(item) {
      var isSel = sel && sel.kind === 'item' && sel.id === item.id;
      var pubBadge = item.published
        ? '<span class="qbadge" style="border-color:var(--forest);color:var(--forest)">pub</span>'
        : '<span class="qbadge">draft</span>';
      html += '<div class="quest-row ' + (isSel ? 'sel' : '') + '" data-sel-item="' + esc(item.id) + '">' +
        '<span style="margin-right:4px">' + (item.ic || '📦') + '</span>' +
        '<span class="quest-row-title">' + esc(item.name) + '</span>' +
        pubBadge + '</div>';
    });
  });

  el.innerHTML = html;
  el.onclick = function(e) {
    var row = e.target.closest('[data-sel-item]');
    if (!row) return;
    var id = row.getAttribute('data-sel-item');
    sel = { kind: 'item', id: id };
    renderItemList();
    showItemForm(id);
  };
}

// ── Item CRUD ─────────────────────────────────────────────────────
function saveItemRow(item) {
  var body = JSON.stringify({
    name:        item.name,
    ic:          item.ic || '📦',
    description: item.desc || '',
    type:        item.type || 'gear',
    rar:         item.rar || 'common',
    price:       item.price || 0,
    weight:      item.weight || 0,
    published:   !!item.published,
    sort_order:  item.sort_order || 0
  });
  if (!item._dbId) {
    return sbFetch(SB_URL + '/rest/v1/items', {
      method: 'POST',
      headers: { 'Prefer': 'return=representation' },
      body: body
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
      return r.json();
    }).then(function(rows) {
      if (rows && rows[0]) { item._dbId = rows[0].id; item.id = rows[0].id; }
      return item;
    });
  } else {
    return sbFetch(SB_URL + '/rest/v1/items?id=eq.' + encodeURIComponent(item._dbId), {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: body
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
      return item;
    });
  }
}

function deleteItemRow(item) {
  if (!item._dbId) return Promise.resolve();
  // Also remove item_effects links (cascade handles DB side)
  return sbFetch(SB_URL + '/rest/v1/items?id=eq.' + encodeURIComponent(item._dbId), {
    method: 'DELETE'
  }).then(function(r) {
    if (!r.ok && r.status !== 404)
      return r.text().then(function(t) { throw new Error(t); });
  });
}

function saveEffectRow(effect) {
  var body = JSON.stringify({
    name:        effect.name,
    description: effect.description || '',
    effect_type: effect.effect_type,
    target:      effect.target || null,
    bonus_value: effect.bonus_value || null
  });
  if (!effect._dbId) {
    return sbFetch(SB_URL + '/rest/v1/effects', {
      method: 'POST',
      headers: { 'Prefer': 'return=representation' },
      body: body
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
      return r.json();
    }).then(function(rows) {
      if (rows && rows[0]) { effect._dbId = rows[0].id; effect.id = rows[0].id; }
      return effect;
    });
  } else {
    return sbFetch(SB_URL + '/rest/v1/effects?id=eq.' + encodeURIComponent(effect._dbId), {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: body
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
      return effect;
    });
  }
}

function linkItemEffect(itemId, effectId) {
  return sbFetch(SB_URL + '/rest/v1/item_effects', {
    method: 'POST',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify({ item_id: itemId, effect_id: effectId })
  }).then(function(r) {
    if (!r.ok && r.status !== 409) // 409 = already linked, OK
      return r.text().then(function(t) { throw new Error(t); });
    return true;
  });
}

function unlinkItemEffect(itemId, effectId) {
  return sbFetch(
    SB_URL + '/rest/v1/item_effects?item_id=eq.' + encodeURIComponent(itemId) +
    '&effect_id=eq.' + encodeURIComponent(effectId),
    { method: 'DELETE' }
  ).then(function(r) {
    if (!r.ok && r.status !== 404)
      return r.text().then(function(t) { throw new Error(t); });
    return true;
  });
}

// ── Item Form ─────────────────────────────────────────────────────
function showItemForm(id) {
  var item = id ? items.filter(function(x) { return x.id === id; })[0] : null;
  var isNew = !item;

  // Build type options grouped
  var lastGroup = '';
  var typeOpts = ITEM_TYPES.map(function(t) {
    var grpHeader = '';
    if (t.group !== lastGroup) {
      grpHeader = '<option disabled>── ' + t.group + ' ──</option>';
      lastGroup = t.group;
    }
    return grpHeader + '<option value="' + t.value + '"' +
      (item && item.type === t.value ? ' selected' : '') + '>' + esc(t.label) + '</option>';
  }).join('');

  // Attached effects
  var attachedEffects = item
    ? effects.filter(function(e) { return (item.effect_ids || []).indexOf(e.id) !== -1; })
    : [];

  var effectsHtml = attachedEffects.length
    ? attachedEffects.map(function(e) {
        var etInfo = EFFECT_TYPES.filter(function(t) { return t.value === e.effect_type; })[0];
        var label = etInfo ? etInfo.label : e.effect_type;
        var detail = e.target ? ' → ' + e.target : '';
        if (e.bonus_value != null) detail += ' (' + e.bonus_value + ')';
        return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border2)">' +
          '<span style="flex:1;font-size:.88em">' + esc(e.name) + '<span style="color:var(--ink2);font-size:.85em"> — ' + esc(label) + esc(detail) + '</span></span>' +
          '<button class="btn btn-del" data-unlink-effect="' + esc(e.id) + '" style="padding:2px 8px;font-size:.72em">✕</button>' +
          '</div>';
      }).join('')
    : '<div style="font-size:.85em;color:var(--ink2);font-style:italic">No effects attached.</div>';

  // Available effects to add (not already attached)
  var availEffects = effects.filter(function(e) {
    return (item ? (item.effect_ids || []).indexOf(e.id) === -1 : true);
  });
  var availOpts = '<option value="">— Select effect to add —</option>' +
    availEffects.map(function(e) {
      var etInfo = EFFECT_TYPES.filter(function(t) { return t.value === e.effect_type; })[0];
      return '<option value="' + esc(e.id) + '">' + esc(e.name) +
        (etInfo ? ' (' + etInfo.label + ')' : '') + '</option>';
    }).join('');

  var fi = document.getElementById('form-inner');
  fi.innerHTML =
    '<div id="form-title-row">' +
    '<div id="form-heading">' + (isNew ? '📦 New Item' : '📦 ' + esc(item.name)) + '</div>' +
    '</div>' +

    pubRow(item ? !!item.published : false) +

    // ── Identity ──
    '<div class="fsec">' +
    '<div class="fsec-title">Identity</div>' +
    '<div style="display:grid;grid-template-columns:80px 1fr;gap:12px;align-items:start">' +
    frow('Icon', '<input type="text" id="if-ic" value="' + esc(item ? item.ic : '📦') + '" style="font-size:1.4em;text-align:center;padding:6px">') +
    frow('Name *', '<input type="text" id="if-name" value="' + esc(item ? item.name : '') + '" placeholder="Item name…">') +
    '</div>' +
    '<div class="fgrid" style="margin-top:10px">' +
    frow('Description *', '<textarea id="if-desc" rows="3" placeholder="What does this item do?">' + esc(item ? item.desc : '') + '</textarea>') +
    '</div></div>' +

    // ── Store Placement ──
    '<div class="fsec">' +
    '<div class="fsec-title">Store Placement</div>' +
    '<div class="fgrid c2">' +
    frow('Type <span class="select-hint">(determines store tab)</span>',
      '<select id="if-type">' + typeOpts + '</select>') +
    frow('Rarity', rarSelect('if-rar', item ? item.rar : 'common')) +
    '</div>' +
    '<div class="fgrid c2" style="margin-top:10px">' +
    frow('Price (gp)', '<input type="number" id="if-price" min="0" value="' + (item ? item.price : 0) + '">') +
    frow('Weight (lbs)', '<input type="number" id="if-weight" min="0" value="' + (item ? item.weight : 0) + '">') +
    '</div></div>' +

    // ── Effects ──
    '<div class="fsec">' +
    '<div class="fsec-title">Effects</div>' +
    '<div id="if-effects-list" style="margin-bottom:12px">' + effectsHtml + '</div>' +
    (isNew ? '<div style="font-size:.82em;color:var(--ink2);font-style:italic">Save the item first, then attach effects.</div>' :
      '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">' +
      '<select id="if-effect-add" style="flex:1;min-width:0">' + availOpts + '</select>' +
      '<button class="btn btn-new" id="if-btn-attach" style="white-space:nowrap">+ Attach</button>' +
      '</div>' +
      '<div style="margin-top:10px;padding:8px;background:rgba(201,146,42,.06);border:1px solid var(--border2);border-radius:5px;font-size:.8em;color:var(--ink2)">' +
      'Effects not in the list above? <button class="btn btn-new" id="if-btn-new-effect" style="font-size:.82em;padding:3px 10px">+ Create New Effect</button>' +
      '</div>') +
    '</div>' +

    '<div id="action-row">' +
    '<button class="btn btn-save" id="if-save">💾 Save Item</button>' +
    (!isNew ? '<button class="btn btn-del" id="if-del">🗑 Delete</button>' : '') +
    (!isNew ? '<button class="btn btn-new" id="if-dupe">⧉ Duplicate</button>' : '') +
    '<span id="save-flash"></span>' +
    '</div>';

  // ── Save handler ─────────────────────────────────────────────
  document.getElementById('if-save').onclick = function() {
    var nm   = (document.getElementById('if-name').value || '').trim();
    var desc = (document.getElementById('if-desc').value || '').trim();
    if (!nm || !desc) { alert('Name and description are required.'); return; }
    var newItem = {
      name:      nm,
      ic:        (document.getElementById('if-ic').value || '').trim() || '📦',
      desc:      desc,
      type:      document.getElementById('if-type').value || 'gear',
      rar:       document.getElementById('if-rar').value || 'common',
      price:     Math.max(0, parseInt(document.getElementById('if-price').value) || 0),
      weight:    Math.max(0, parseInt(document.getElementById('if-weight').value) || 0),
      published: document.getElementById('pub-chk').checked,
      sort_order: item ? (item.sort_order || 0) : items.length,
      effect_ids: item ? (item.effect_ids || []) : [],
      _dbId: item ? item._dbId : null
    };
    var existing = item || null;
    if (existing) {
      Object.assign(existing, newItem);
    } else {
      items.push(newItem);
      existing = newItem;
    }
    saveItemRow(existing).then(function() {
      flash('✓ Item saved');
      setStatus('Item "' + nm + '" saved.');
      return pullData();
    }).then(function() {
      sel = { kind: 'item', id: existing.id || existing._dbId };
      activeTab = 'items';
      renderList();
      showItemForm(sel.id);
    }).catch(function(err) { alert('Save failed: ' + (err.message || err)); });
  };

  // ── Attach effect handler ─────────────────────────────────────
  if (!isNew) {
    document.getElementById('if-btn-attach').onclick = function() {
      var effectId = document.getElementById('if-effect-add').value;
      if (!effectId) { alert('Select an effect to attach.'); return; }
      linkItemEffect(item._dbId, effectId).then(function() {
        if ((item.effect_ids || []).indexOf(effectId) === -1)
          item.effect_ids.push(effectId);
        return pullData();
      }).then(function() {
        sel = { kind: 'item', id: item.id };
        activeTab = 'items';
        renderList();
        showItemForm(item.id);
      }).catch(function(err) { alert('Attach failed: ' + (err.message || err)); });
    };

    // ── Unlink effect buttons ─────────────────────────────────
    document.querySelectorAll('[data-unlink-effect]').forEach(function(btn) {
      btn.onclick = function() {
        var effectId = this.getAttribute('data-unlink-effect');
        unlinkItemEffect(item._dbId, effectId).then(function() {
          item.effect_ids = (item.effect_ids || []).filter(function(id) { return id !== effectId; });
          return pullData();
        }).then(function() {
          sel = { kind: 'item', id: item.id };
          activeTab = 'items';
          renderList();
          showItemForm(item.id);
        }).catch(function(err) { alert('Unlink failed: ' + (err.message || err)); });
      };
    });

    // ── Create new effect ─────────────────────────────────────
    document.getElementById('if-btn-new-effect').onclick = function() {
      showNewEffectForm(item.id);
    };

    // ── Delete handler ────────────────────────────────────────
    document.getElementById('if-del').onclick = function() {
      if (prompt('Type DELETE to confirm removing "' + item.name + '"') !== 'DELETE') {
        alert('Cancelled.'); return;
      }
      deleteItemRow(item).then(function() {
        items = items.filter(function(x) { return x !== item; });
        sel = null;
        setStatus('Item "' + item.name + '" deleted.');
        renderList();
        showPlaceholder();
      }).catch(function(err) { alert('Delete failed: ' + (err.message || err)); });
    };

    // ── Duplicate handler ─────────────────────────────────────
    document.getElementById('if-dupe').onclick = function() {
      var dupeName = item.name + ' (copy)';
      var taken = items.some(function(x) { return x.name === dupeName; });
      if (taken) dupeName = item.name + ' ' + Date.now();
      var dupe = Object.assign({}, item, {
        name: dupeName, published: false,
        sort_order: items.length, _dbId: null, id: null, effect_ids: []
      });
      items.push(dupe);
      saveItemRow(dupe).then(function() {
        flash('⧉ Duplicated as "' + dupeName + '"');
        return pullData();
      }).then(function() {
        sel = { kind: 'item', id: dupe.id || dupe._dbId };
        activeTab = 'items';
        renderList();
        showItemForm(sel.id);
      }).catch(function(err) { alert('Duplicate failed: ' + (err.message || err)); });
    };
  }
}
