// DUPLICATE CYCLE
// ══════════════════════════════════════════════════
function showDupeForm() {
  sel = null;
  renderList();

  // allSrcCycles not yet built here; just check we have something
  if (!cycles.length && !BUILTIN_QUESTSETS.length) {
    document.getElementById('form-inner').innerHTML =
      '<div id="placeholder">No cycles yet — create one first.</div>';
    return;
  }

  // Working order state: srcId → [idx, idx, ...]
  var order = [];
  // Will be set after allSrcCycles is built; placeholder for closure
  var srcId = '';

  function getCycleQuests(id) {
    var cq = quests.filter(function(q) { return q.setId === id; });
    if (cq.length) return cq.sort(function(a,b){return (a.idx||0)-(b.idx||0);});
    var bs = BUILTIN_QUESTSETS.filter(function(s){return s.id===id;})[0];
    return bs ? (bs.quests||[]).slice() : [];
  }
  function getOrder(id) {
    return getCycleQuests(id).map(function(q) { return q.idx; });
  }

  function renderOrderList() {
    var listEl = document.getElementById('dupe-list');
    if (!listEl) return;
    if (!order.length) {
      listEl.innerHTML = '<div class="dupe-row" style="justify-content:center;color:var(--ink2);font-style:italic;font-size:.85em">No quests in this cycle</div>';
      return;
    }
    var cq = getCycleQuests(srcId);
    var typeIcons = { combat: '⚔', social: '🗣', explore: '🗺', wonder: '✨' };
    listEl.innerHTML = order.map(function(idx, pos) {
      var q = cq.filter(function(x) { return x.idx === idx; })[0];
      if (!q) return '';
      return '<div class="dupe-row">' +
        '<span class="dupe-pos">' + (pos + 1) + '</span>' +
        '<span class="dupe-title">' + (q.capstone ? '⭐ ' : '') + esc(q.title || '(untitled)') + '</span>' +
        '<span class="dupe-type">' + (typeIcons[q.type] || '') + '</span>' +
        '<div class="dupe-mvs">' +
        '<button class="dupe-mv" data-pos="' + pos + '" data-dir="-1"' + (pos === 0 ? ' disabled' : '') + '>▲</button>' +
        '<button class="dupe-mv" data-pos="' + pos + '" data-dir="1"' + (pos === order.length - 1 ? ' disabled' : '') + '>▼</button>' +
        '</div></div>';
    }).join('');

    // Wire move buttons
    listEl.onclick = function(e) {
      var btn = e.target.closest('.dupe-mv');
      if (!btn || btn.disabled) return;
      var pos = parseInt(btn.getAttribute('data-pos'), 10);
      var dir = parseInt(btn.getAttribute('data-dir'), 10);
      var np  = pos + dir;
      if (np < 0 || np >= order.length) return;
      var tmp = order[pos]; order[pos] = order[np]; order[np] = tmp;
      renderOrderList();
    };
  }

  function onSrcChange() {
    srcId = document.getElementById('dupe-src').value;
    var newOrder = getOrder(srcId);
    order.splice(0, order.length);
    newOrder.forEach(function(v) { order.push(v); });
    var srcCycle = cycles.filter(function(c) { return c.id === srcId; })[0];
    if (srcCycle) {
      var nameEl = document.getElementById('dupe-name');
      if (nameEl && !nameEl.value.trim()) {
        nameEl.value = srcCycle.name + ' (copy)';
      }
    }
    renderOrderList();
  }

  // Merge built-in and custom cycles for the source dropdown
  var allSrcCycles = BUILTIN_QUESTSETS.concat(
    cycles.filter(function(c) {
      return !BUILTIN_QUESTSETS.some(function(b){return b.id===c.id;});
    })
  );
  var srcOptions = allSrcCycles.map(function(c) {
    var cq = getCycleQuests(c.id);
    return '<option value="' + esc(c.id) + '">' + esc(c.name) +
      ' (' + cq.length + ' quest' + (cq.length !== 1 ? 's' : '') + ')</option>';
  }).join('');

  var fi = document.getElementById('form-inner');
  fi.innerHTML =
    '<div id="form-title-row">' +
    '<div id="form-heading">⧉ Duplicate Cycle</div>' +
    '</div>' +

    '<p style="font-size:.88em;color:var(--ink2);margin-bottom:18px;line-height:1.6">' +
    'Creates a copy of an existing cycle with all its quests. You can reorder the quests before creating. ' +
    'The original is unchanged — the copy is saved as a private draft.</p>' +

    '<div class="fsec">' +
    '<div class="fsec-title">Source</div>' +
    '<div class="fgrid">' +
    frow('Copy From', '<select id="dupe-src">' + srcOptions + '</select>') +
    '</div></div>' +

    '<div class="fsec">' +
    '<div class="fsec-title">New Cycle Identity</div>' +
    '<div class="fgrid">' +
    frow('New Cycle Name *', '<input type="text" id="dupe-name" placeholder="e.g. Shadows Rising">') +
    '</div>' +
    '<div class="fgrid" style="margin-top:10px">' +
    frow('Theme / Description', '<textarea id="dupe-theme" rows="2" placeholder="Describe this cycle&#39;s arc…"></textarea>') +
    '</div></div>' +

    '<div class="fsec">' +
    '<div class="fsec-title">Quest Order <span class="select-hint">(▲▼ to reorder — only affects the copy)</span></div>' +
    '<div class="dupe-list-wrap"><div id="dupe-list"></div></div>' +
    '</div>' +

    '<div id="action-row">' +
    '<button class="btn btn-save" id="dupe-create">⧉ Create Copy</button>' +
    '<span id="save-flash"></span>' +
    '</div>';

  // Wire source dropdown
  document.getElementById('dupe-src').onchange = onSrcChange;

  // Wire create button
  document.getElementById('dupe-create').onclick = function() {
    var name  = (document.getElementById('dupe-name').value || '').trim();
    var theme = (document.getElementById('dupe-theme').value || '').trim();
    if (!name) { alert('Please enter a name for the new cycle.'); return; }
    if (!order.length) { alert('The source cycle has no quests to copy.'); return; }

    var srcCycle = allSrcCycles.filter(function(c) { return c.id === srcId; })[0];
    var srcQuests = getCycleQuests(srcId);

    var newId = 'custom-' + Date.now();
    var newCycle = {
      id:        newId,
      name:      name,
      theme:     theme || ('Duplicated from "' + (srcCycle ? srcCycle.name : srcId) + '"'),
      published: false,
      cycleGate: {}
    };

    // Build new quests with reassigned idx values (0, 1, 2…)
    var newQuests = [];
    order.forEach(function(srcIdx, newIdx) {
      var srcQ = srcQuests.filter(function(q) { return q.idx === srcIdx; })[0];
      if (!srcQ) return;
      newQuests.push(Object.assign({}, srcQ, {
        setId:     newId,
        idx:       newIdx,
        _custom:   true,
        _editable: true,
        published: false,
        // Preserve capstone flag only if it was capstone AND it's still last
        capstone:  srcQ.capstone && newIdx === order.length - 1
      }));
    });

    // Update local state immediately
    cycles.push(newCycle);
    newQuests.forEach(function(q) { quests.push(q); });
    collapsed[newId] = false;

    // Save to Supabase: cycle row first, then all quest rows
    var cycleRow = cycleToRow(newCycle, cycles.length - 1);
    var questRows = newQuests.map(function(q, i) { return questToRow(q, i); });

    setStatus('Saving…');
    var btn = document.getElementById('dupe-create');
    btn.disabled = true;
    btn.textContent = 'Creating…';

    sbUpsert(cycleRow).then(function() {
      if (!questRows.length) return true;
      return sbUpsert(questRows);
    }).then(function() {
      sel = { kind: 'cycle', setId: newId };
      flash('✓ "' + name + '" created with ' + newQuests.length + ' quest' + (newQuests.length !== 1 ? 's' : '') + '');
      setStatus('Cycle "' + name + '" created with ' + newQuests.length + ' quests.');
      renderList();
      showCycleForm(newId);
    }).catch(function(err) {
      btn.disabled = false;
      btn.textContent = '⧉ Create Copy';
      alert('Save failed: ' + (err.message || err));
      setStatus('Save failed: ' + (err.message || err), '#e55');
    });
  };

  // Initialize with first available cycle
  srcId = allSrcCycles.length ? allSrcCycles[0].id : '';
  if (srcId) {
    getOrder(srcId).forEach(function(v) { order.push(v); });
    document.getElementById('dupe-name').value = allSrcCycles[0].name + ' (copy)';
    document.getElementById('dupe-src').value = srcId;
  }
  renderOrderList();
}
