function linkItemEffect(itemId, effectId) {
  return sbFetch(SB_URL + '/rest/v1/item_effects', {
    method: 'POST',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify({ item_id: itemId, effect_id: effectId })
  }).then(function(r) {
    if (!r.ok && r.status !== 409) // 409 = already linked, OK
      return r.text().then(function(t) { throw new Error(t); });
    return true;
  });
}

function unlinkItemEffect(itemId, effectId) {
  return sbFetch(
    SB_URL + '/rest/v1/item_effects?item_id=eq.' + encodeURIComponent(itemId) +
    '&effect_id=eq.' + encodeURIComponent(effectId),
    { method: 'DELETE' }
  ).then(function(r) {
    if (!r.ok && r.status !== 404)
      return r.text().then(function(t) { throw new Error(t); });
    return true;
  });
}

// ── Item Form ─────────────────────────────────────────────────────
function showItemForm(id) {
  var item = id ? items.filter(function(x) { return x.id === id; })[0] : null;
  var isNew = !item;

  // Build type options grouped
  var lastGroup = '';
  var typeOpts = ITEM_TYPES.map(function(t) {
    var grpHeader = '';
    if (t.group !== lastGroup) {
      grpHeader = '<option disabled>── ' + t.group + ' ──</option>';
      lastGroup = t.group;
    }
    return grpHeader + '<option value="' + t.value + '"' +
      (item && item.type === t.value ? ' selected' : '') + '>' + esc(t.label) + '</option>';
  }).join('');

  // Attached effects
  var attachedEffects = item
    ? effects.filter(function(e) { return (item.effect_ids || []).indexOf(e.id) !== -1; })
    : [];

  var effectsHtml = attachedEffects.length
    ? attachedEffects.map(function(e) {
        var etInfo = EFFECT_TYPES.filter(function(t) { return t.value === e.effect_type; })[0];
        var label = etInfo ? etInfo.label : e.effect_type;
        var detail = e.target ? ' → ' + e.target : '';
        if (e.bonus_value != null) detail += ' (' + e.bonus_value + ')';
        return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border2)">' +
          '<span style="flex:1;font-size:.88em">' + esc(e.name) + '<span style="color:var(--ink2);font-size:.85em"> — ' + esc(label) + esc(detail) + '</span></span>' +
          '<button class="btn btn-del" data-unlink-effect="' + esc(e.id) + '" style="padding:2px 8px;font-size:.72em">✕</button>' +
          '</div>';
      }).join('')
    : '<div style="font-size:.85em;color:var(--ink2);font-style:italic">No effects attached.</div>';

  // Available effects to add (not already attached)
  var availEffects = effects.filter(function(e) {
    return (item ? (item.effect_ids || []).indexOf(e.id) === -1 : true);
  });
  var availOpts = '<option value="">— Select effect to add —</option>' +
    availEffects.map(function(e) {
      var etInfo = EFFECT_TYPES.filter(function(t) { return t.value === e.effect_type; })[0];
      return '<option value="' + esc(e.id) + '">' + esc(e.name) +
        (etInfo ? ' (' + etInfo.label + ')' : '') + '</option>';
    }).join('');

  var fi = document.getElementById('form-inner');
  fi.innerHTML =
    '<div id="form-title-row">' +
    '<div id="form-heading">' + (isNew ? '📦 New Item' : '📦 ' + esc(item.name)) + '</div>' +
    '</div>' +

    pubRow(item ? !!item.published : false) +

    // ── Identity ──
    '<div class="fsec">' +
    '<div class="fsec-title">Identity</div>' +
    '<div style="display:grid;grid-template-columns:80px 1fr;gap:12px;align-items:start">' +
    frow('Icon', '<input type="text" id="if-ic" value="' + esc(item ? item.ic : '📦') + '" style="font-size:1.4em;text-align:center;padding:6px">') +
    frow('Name *', '<input type="text" id="if-name" value="' + esc(item ? item.name : '') + '" placeholder="Item name…">') +
    '</div>' +
    '<div class="fgrid" style="margin-top:10px">' +
    frow('Description *', '<textarea id="if-desc" rows="3" placeholder="What does this item do?">' + esc(item ? item.desc : '') + '</textarea>') +
    '</div></div>' +

    // ── Store Placement ──
    '<div class="fsec">' +
    '<div class="fsec-title">Store Placement</div>' +
    '<div class="fgrid c2">' +
    frow('Type <span class="select-hint">(determines store tab)</span>',
      '<select id="if-type">' + typeOpts + '</select>') +
    frow('Rarity', rarSelect('if-rar', item ? item.rar : 'common')) +
    '</div>' +
    '<div class="fgrid c2" style="margin-top:10px">' +
    frow('Price (gp)', '<input type="number" id="if-price" min="0" value="' + (item ? item.price : 0) + '">') +
    frow('Weight (lbs)', '<input type="number" id="if-weight" min="0" value="' + (item ? item.weight : 0) + '">') +
    '</div>' +
    // v1.691 — Quest Map "🪄 Arcane Offerings" rack controls. When "Sell on
    // Quest Map" is checked, the item is EXCLUDED from the regular store
    // and instead appears on the Quest Map's rotating rack of 3 items,
    // priced in QP. Pair the item with a quest cycle whose cycleGate has
    // requiredAsset set to this item's exact name — purchase unlocks the
    // cycle automatically because the item lands in franchiseStorage.
    '<div style="margin-top:14px;padding:10px 12px;background:rgba(201,146,42,.06);border:1px solid var(--border2);border-radius:6px">' +
    '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.9em;font-weight:600">' +
      '<input type="checkbox" id="if-qmrack"' + (item && item.qm_rack ? ' checked' : '') + ' style="margin:0">' +
      '🪄 Sell on Quest Map (Arcane Offerings rack)' +
    '</label>' +
    '<div style="font-size:.78em;color:var(--ink2);margin-top:4px;margin-left:24px;font-style:italic">' +
      'Item will be hidden from the regular store and appear on the Quest Map rack (3-slot daily rotation, QP priced). Pair with a quest cycle using <code>cycleGate.requiredAsset</code> set to this item name to make the purchase unlock that cycle.' +
    '</div>' +
    '<div id="if-qmrack-price-row" style="margin-top:10px;' + (item && item.qm_rack ? '' : 'display:none') + '">' +
      frow('QP Price *', '<input type="number" id="if-qpprice" min="1" value="' + (item && item.qp_price ? item.qp_price : '') + '" placeholder="Required when rack is enabled">') +
    '</div>' +
    '</div>' +
    '</div>' +

    // v1.698 — Consumable item flag + uses count. When checked, the item
    // is single-use (or multi-charge if uses > 1) and decrements by 1
    // each time it's used to satisfy a quest prereq, or each time the
    // player taps "Use" on the Gear tab in-game. When charges reach 0
    // the item is removed from the character's inventory automatically.
    '<div class="fsec">' +
    '<div class="fsec-title">Consumable</div>' +
    '<div style="font-size:.78em;color:var(--ink2);margin-bottom:6px">A consumable item is used up when its charges run out. Single-use items (torch, scroll, potion) leave <em>uses</em> blank or set it to 1. Multi-charge items (Healer\'s Kit, wand of Magic Missiles) set <em>uses</em> to N.</div>' +
    '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.9em;font-weight:600;margin-bottom:8px">' +
      '<input type="checkbox" id="if-consumable"' + (item && item.consumable ? ' checked' : '') + ' style="margin:0">' +
      '🔥 Item is consumable' +
    '</label>' +
    '<div id="if-uses-row" style="' + (item && item.consumable ? '' : 'display:none') + '">' +
      frow('Charges <span class="select-hint">(blank or 1 = single-use)</span>',
        '<input type="number" id="if-uses" min="1" max="999" value="' + (item && item.uses ? item.uses : '') + '" placeholder="1" style="max-width:120px">') +
    '</div>' +
    '</div>' +

    // ── Effects ──
    '<div class="fsec">' +
    '<div class="fsec-title">Effects</div>' +
    '<div id="if-effects-list" style="margin-bottom:12px">' + effectsHtml + '</div>' +
    (isNew ? '<div style="font-size:.82em;color:var(--ink2);font-style:italic">Save the item first, then attach effects.</div>' :
      '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">' +
      '<select id="if-effect-add" style="flex:1;min-width:0">' + availOpts + '</select>' +
      '<button class="btn btn-new" id="if-btn-attach" style="white-space:nowrap">+ Attach</button>' +
      '</div>' +
      '<div style="margin-top:10px;padding:8px;background:rgba(201,146,42,.06);border:1px solid var(--border2);border-radius:5px;font-size:.8em;color:var(--ink2)">' +
      'Effects not in the list above? <button class="btn btn-new" id="if-btn-new-effect" style="font-size:.82em;padding:3px 10px">+ Create New Effect</button>' +
      '</div>') +
    '</div>' +

    // v1.685 — Phase 2 trait multi-select on items (gear/vehicle/building/…)
    '<div class="fsec">' +
    '<div class="fsec-title">Traits</div>' +
    '<div style="font-size:.78em;color:var(--ink2);margin-bottom:6px">Tags applied to whoever carries or uses this item (e.g. fire-resistance, stealth, waterproof).</div>' +
    '<div id="if-traits" style="margin-bottom:4px"></div>' +
    '</div>' +

    // v1.7146 — Prereq-eligible classes. When at least one class is
    // selected, only characters of those classes (or with a subclass
    // exception) can use this item to satisfy a quest prereq. Empty
    // selection = unrestricted (the default, matching legacy behavior).
    // Stored on the items table as a jsonb column restricted_to_classes.
    '<div class="fsec">' +
    '<div class="fsec-title">Prereq-Eligible Classes</div>' +
    '<div style="font-size:.78em;color:var(--ink2);margin-bottom:6px">Limits which classes can use this item to satisfy a quest prerequisite. Leave all unselected for no restriction. Subclasses (added separately on character builds) can grant exceptions.</div>' +
    '<div id="if-classes" style="margin-bottom:4px"></div>' +
    '</div>' +

    '<div id="action-row">' +
    '<button class="btn btn-save" id="if-save">💾 Save Item</button>' +
    (!isNew ? '<button class="btn btn-del" id="if-del">🗑 Delete</button>' : '') +
    (!isNew ? '<button class="btn btn-new" id="if-dupe">⧉ Duplicate</button>' : '') +
    '<span id="save-flash"></span>' +
    '</div>';

  // v1.685 — Render item trait chips. Working copy in closure.
  var _ifTraits = Array.isArray(item && item.traits) ? item.traits.slice() : [];
  renderTraitChipPanel('if-traits', _ifTraits, true);

  // v1.7146 — Render class chips. Working copy in closure.
  var _ifClasses = Array.isArray(item && item.restricted_to_classes)
    ? item.restricted_to_classes.slice()
    : [];
  renderClassChipPanel('if-classes', _ifClasses, true);

  // v1.691 — Toggle the QP Price row visibility based on the rack checkbox.
  // Keep the value intact when unchecking so a user can toggle back without
  // retyping. Save path clears qp_price to 0 when rack is off, regardless.
  var _qmChk = document.getElementById('if-qmrack');
  var _qmPriceRow = document.getElementById('if-qmrack-price-row');
  if (_qmChk && _qmPriceRow) {
    _qmChk.addEventListener('change', function() {
      _qmPriceRow.style.display = _qmChk.checked ? '' : 'none';
    });
  }
  // v1.698 — Toggle the consumable charges row visibility based on the
  // consumable checkbox. Same pattern as qmrack: visible when enabled,
  // hidden but value preserved when disabled. Save path coerces uses=0
  // for non-consumables, but the input keeps whatever the author typed.
  var _conChk = document.getElementById('if-consumable');
  var _conRow = document.getElementById('if-uses-row');
  if (_conChk && _conRow) {
    _conChk.addEventListener('change', function() {
      _conRow.style.display = _conChk.checked ? '' : 'none';
    });
  }

  // ── Save handler ─────────────────────────────────────────────
  document.getElementById('if-save').onclick = function() {
    var nm   = (document.getElementById('if-name').value || '').trim();
    var desc = (document.getElementById('if-desc').value || '').trim();
    if (!nm || !desc) { alert('Name and description are required.'); return; }
    // v1.691 — Rack validation. If the author has ticked "Sell on Quest Map,"
    // qpPrice MUST be set to a positive integer. Otherwise the rack renderer
    // would show a slot with an unset cost and silently refuse to sell.
    var qmRack = !!(document.getElementById('if-qmrack') && document.getElementById('if-qmrack').checked);
    var qpPrice = 0;
    if (qmRack) {
      qpPrice = parseInt((document.getElementById('if-qpprice') || {}).value, 10) || 0;
      if (qpPrice <= 0) {
        alert('QP Price is required and must be at least 1 when "Sell on Quest Map" is checked.');
        return;
      }
    }
    var newItem = {
      name:      nm,
      ic:        (document.getElementById('if-ic').value || '').trim() || '📦',
      desc:      desc,
      type:      document.getElementById('if-type').value || 'gear',
      rar:       document.getElementById('if-rar').value || 'common',
      price:     Math.max(0, parseInt(document.getElementById('if-price').value) || 0),
      weight:    Math.max(0, parseInt(document.getElementById('if-weight').value) || 0),
      traits:    _ifTraits.slice(),     // v1.685
      qm_rack:   qmRack,                // v1.691 — Quest Map rack flag
      qp_price:  qpPrice,               // v1.691 — Quest Map rack QP cost
      // v1.698 — Consumable item flags. consumable=false stores uses=null
      // (no decrement system applies). consumable=true with uses=null
      // means single-use (default 1 charge). consumable=true with uses=N
      // means N starting charges. saveItemRow normalizes the column types.
      consumable: !!(document.getElementById('if-consumable')&&document.getElementById('if-consumable').checked),
      uses: (function(){
        var ch=document.getElementById('if-consumable');
        if(!ch||!ch.checked)return null;
        var u=parseInt((document.getElementById('if-uses')||{}).value,10);
        return (isFinite(u)&&u>0)?u:null;
      }()),
      // v1.7146 — Empty array stored as null so DB shape is "unrestricted"
      // for items without a class gate, distinct from "restricted to no
      // class" (which would be a misconfiguration). The save body normalizes
      // this in saveItemRow.
      restricted_to_classes: _ifClasses.length ? _ifClasses.slice() : null,
      published: document.getElementById('pub-chk').checked,
      sort_order: item ? (item.sort_order || 0) : items.length,
      effect_ids: item ? (item.effect_ids || []) : [],
      _dbId: item ? item._dbId : null
    };
    var existing = item || null;
    if (existing) {
      Object.assign(existing, newItem);
    } else {
      items.push(newItem);
      existing = newItem;
    }
    saveItemRow(existing).then(function() {
      flash('✓ Item saved');
      setStatus('Item "' + nm + '" saved.');
      return pullData();
    }).then(function() {
      sel = { kind: 'item', id: existing.id || existing._dbId };
      activeTab = 'items';
      renderList();
      showItemForm(sel.id);
    }).catch(function(err) { alert('Save failed: ' + (err.message || err)); });
  };

  // ── Attach effect handler ─────────────────────────────────────
  if (!isNew) {
    document.getElementById('if-btn-attach').onclick = function() {
      var effectId = document.getElementById('if-effect-add').value;
      if (!effectId) { alert('Select an effect to attach.'); return; }
      linkItemEffect(item._dbId, effectId).then(function() {
        if ((item.effect_ids || []).indexOf(effectId) === -1)
          item.effect_ids.push(effectId);
        return pullData();
      }).then(function() {
        sel = { kind: 'item', id: item.id };
        activeTab = 'items';
        renderList();
        showItemForm(item.id);
      }).catch(function(err) { alert('Attach failed: ' + (err.message || err)); });
    };

    // ── Unlink effect buttons ─────────────────────────────────
    document.querySelectorAll('[data-unlink-effect]').forEach(function(btn) {
      btn.onclick = function() {
        var effectId = this.getAttribute('data-unlink-effect');
        unlinkItemEffect(item._dbId, effectId).then(function() {
          item.effect_ids = (item.effect_ids || []).filter(function(id) { return id !== effectId; });
          return pullData();
        }).then(function() {
          sel = { kind: 'item', id: item.id };
          activeTab = 'items';
          renderList();
          showItemForm(item.id);
        }).catch(function(err) { alert('Unlink failed: ' + (err.message || err)); });
      };
    });

    // ── Create new effect ─────────────────────────────────────
    document.getElementById('if-btn-new-effect').onclick = function() {
      showNewEffectForm(item.id);
    };

    // ── Delete handler ────────────────────────────────────────
    document.getElementById('if-del').onclick = function() {
      if (prompt('Type DELETE to confirm removing "' + item.name + '"') !== 'DELETE') {
        alert('Cancelled.'); return;
      }
      deleteItemRow(item).then(function() {
        items = items.filter(function(x) { return x !== item; });
        sel = null;
        setStatus('Item "' + item.name + '" deleted.');
        renderList();
        showPlaceholder();
      }).catch(function(err) { alert('Delete failed: ' + (err.message || err)); });
    };

    // ── Duplicate handler ─────────────────────────────────────
    document.getElementById('if-dupe').onclick = function() {
      var dupeName = item.name + ' (copy)';
      var taken = items.some(function(x) { return x.name === dupeName; });
      if (taken) dupeName = item.name + ' ' + Date.now();
      var dupe = Object.assign({}, item, {
        name: dupeName, published: false,
        sort_order: items.length, _dbId: null, id: null, effect_ids: []
      });
      items.push(dupe);
      saveItemRow(dupe).then(function() {
        flash('⧉ Duplicated as "' + dupeName + '"');
        return pullData();
      }).then(function() {
        sel = { kind: 'item', id: dupe.id || dupe._dbId };
        activeTab = 'items';
        renderList();
        showItemForm(sel.id);
      }).catch(function(err) { alert('Duplicate failed: ' + (err.message || err)); });
    };
  }
}

// ══════════════════════════════════════════════════
// TRAITS TAB — vocabulary for gear/monster/quest encounter tagging
// Admin-only editing; read-only for non-admins.
// Data model:
//   content_type='trait'
//   content_key=slug-id (e.g. 'fire', 'rope')
//   title=human-readable label (e.g. 'Fire')
//   data.category=grouping for dropdowns (damage, utility, nav, etc.)
//   data.label=display label (mirrors title; kept in data for runtime consumers)
//   data.desc=tooltip description
// ══════════════════════════════════════════════════

// v1.685 — Shared trait-chip multi-select panel.
// Renders the entire `traits` vocabulary as toggleable chips inside the
// container with id=panelId. Reads/writes to the caller-supplied
// selectedArr (mutated in place). canEdit=false renders read-only chips.
// Re-renders itself on each click so the .on/.off style stays in sync.
// Used by Monsters, Pets, and Items forms.
function renderTraitChipPanel(panelId, selectedArr, canEdit) {
  var panel = document.getElementById(panelId);
  if (!panel) return;
  if (!traits || !traits.length) {
    panel.innerHTML = '<div style="font-style:italic;color:var(--ink2);font-size:.8em">No traits loaded yet. Visit the 🏷 Traits tab (admin) or pull from Supabase.</div>';
    return;
  }
  var sorted = traits.slice().sort(function(a,b){
    var ca = a.category || '~'; var cb = b.category || '~';
    if (ca !== cb) return ca.localeCompare(cb);
    return (a.label||'').localeCompare(b.label||'');
  });
  panel.innerHTML = sorted.map(function(tr){
    var on = selectedArr.indexOf(tr.content_key) !== -1;
    return '<span class="mtrait-chip'+(on?' on':'')+'" data-trait-key="'+esc(tr.content_key)+'" style="' +
      'display:inline-block;font-size:.72em;padding:3px 8px;margin:2px 3px 2px 0;border-radius:9px;' +
      'cursor:'+(canEdit?'pointer':'default')+';user-select:none;' +
      (on
        ? 'background:rgba(201,146,42,.18);border:1px solid var(--gold);color:var(--gold)'
        : 'background:none;border:1px solid var(--border2);color:var(--ink2)')+
      '" title="'+esc(tr.desc||tr.label||tr.content_key)+'">'+esc(tr.label||tr.content_key)+'</span>';
  }).join('');
  if (canEdit) {
    panel.querySelectorAll('.mtrait-chip').forEach(function(el){
      el.onclick = function(){
        var k = el.getAttribute('data-trait-key');
        var idx = selectedArr.indexOf(k);
        if (idx === -1) selectedArr.push(k);
        else selectedArr.splice(idx, 1);
        renderTraitChipPanel(panelId, selectedArr, canEdit);
      };
    });
  }
}

// v1.7146 — Class chip panel for the item form's "Prereq-Eligible Classes"
// section. Mirrors renderTraitChipPanel's interaction model (toggle on tap,
// re-render in place) but draws from the static DND_CLS list rather than
// the dynamic traits table — class names don't change with content edits,
// so no DB dependency. selectedArr is mutated in place by the closure
// holding it (the showItemForm closure), exactly like the trait panel.
function renderClassChipPanel(panelId, selectedArr, canEdit) {
  var panel = document.getElementById(panelId);
  if (!panel) return;
  panel.innerHTML = DND_CLS.map(function(cls){
    var on = selectedArr.indexOf(cls) !== -1;
    return '<span class="mclass-chip'+(on?' on':'')+'" data-class="'+esc(cls)+'" style="' +
      'display:inline-block;font-size:.72em;padding:3px 8px;margin:2px 3px 2px 0;border-radius:9px;' +
      'cursor:'+(canEdit?'pointer':'default')+';user-select:none;' +
      (on
        ? 'background:rgba(26,107,138,.18);border:1px solid var(--teal,#1a6b8a);color:var(--teal,#1a6b8a)'
        : 'background:none;border:1px solid var(--border2);color:var(--ink2)')+
      '">'+esc(cls)+'</span>';
  }).join('');
  if (canEdit) {
    panel.querySelectorAll('.mclass-chip').forEach(function(el){
      el.onclick = function(){
        var k = el.getAttribute('data-class');
        var idx = selectedArr.indexOf(k);
        if (idx === -1) selectedArr.push(k);
        else selectedArr.splice(idx, 1);
        renderClassChipPanel(panelId, selectedArr, canEdit);
      };
    });
  }
}

// DIFFICULTY_PROFILES — v1.686
// ══════════════════════════════════════════════════════════════════════
//
// This constant defines the design targets for every (D&D tier × quest
// difficulty) combination. Quest authors see these values as advisory
// reference in the Difficulty tab and next to the quest form's dropdown;
// the Quest Wizard (v1.687) auto-fills from them. The matrix is NOT
// user-editable from the UI — advanced devs modify this JS to tune the
// game. Comments inside the matrix explain each field's role.
//
// ── AXIS 1: D&D Tier (1–4) ───────────────────────────────────────────
// Tier is the standard D&D player-tier convention indicating a level
// band. This is a separate dimension from difficulty — it says "how
// high-level is the party this quest is built for" rather than "how
// dangerous is the quest within that band." Both dimensions stack:
// a Tier 2 Deadly quest is dangerous work for a Lv 5–10 party, while a
// Tier 4 Easy quest is light work for a Lv 17–20 party.
//
//   Tier 1 = Lv 1–4    (apprentice / low-fantasy adventuring)
//   Tier 2 = Lv 5–10   (heroic)
//   Tier 3 = Lv 11–16  (paragon)
//   Tier 4 = Lv 17–20  (epic)
//
// ── AXIS 2: Difficulty ───────────────────────────────────────────────
// Sub-divides each tier into relative quest danger/demand:
//
//   easy     = light adventuring; few prereqs; predictable
//   standard = baseline; moderate demands                   [*]
//   hard     = tough; fewer parties can succeed
//   deadly   = punishing; expect casualties
//
//   [*] Note: existing QE dropdown uses "standard" (not "medium") so
//   DIFFICULTY_PROFILES matches that key exactly. If you change the
//   dropdown options, also update the keys here.
//
// ── CELL FIELDS ──────────────────────────────────────────────────────
// Each profile is accessed as DIFFICULTY_PROFILES[tierNum][difficulty].
//
//   skillCount    Target number of skill prereqs this quest should need.
//                 The wizard appends skills up to this count; the
//                 save-time warning fires if actual count deviates > 50%.
//
//   toolCount     Same, for tool prereqs.
//
//   langCount     Same, for language prereqs.
//
//   squadMin      Recommended minimum party size. Wizard asks before
//                 overwriting an existing value on the quest form.
//
//   squadMax      Recommended max party size. Same overwrite rule.
//
//   crMin, crMax  Monster Challenge Rating range this quest should pull
//                 from. Feeds Wizard's encounter-generation suggestions
//                 and the Difficulty tab's preview.
//
//   baseGpMin     Base GP reward range. The Wizard sets Base GP to the
//   baseGpMax     midpoint of this range when auto-filling.
//                 The save-time warning fires if Base GP is outside this
//                 range by > 50%.
//
// ── TUNING GUIDANCE FOR DEVS ─────────────────────────────────────────
// The values below are a reasonable starting point, not absolute truth.
// The progression roughly doubles reward each difficulty step within a
// tier and triples between tiers. CR values are calibrated for D&D 5e
// encounter math: T1 parties can handle CR ≤ their level on standard
// difficulty; T2+ parties beat harder CRs as they gain resources.
// Adjust one cell at a time; the save-time warning will let authors
// know when existing quests fall out of target.
//
// To add a new difficulty: add its key to diffSelect() at the bottom
// of the file, then add a column (same key) to every tier below.
// To add a new tier: add a top-level key and fill in all four difficulties.
// ══════════════════════════════════════════════════════════════════════
var DIFFICULTY_PROFILES = {

    standard: {skillCount:2, toolCount:1, langCount:0, squadMin:3, squadMax:4, crMin:0.5,  crMax:1,    baseGpMin:40,   baseGpMax:60},
    hard:     {skillCount:3, toolCount:1, langCount:1, squadMin:3, squadMax:4, crMin:1,    crMax:2,    baseGpMin:60,   baseGpMax:100},
    deadly:   {skillCount:4, toolCount:2, langCount:1, squadMin:4, squadMax:5, crMin:2,    crMax:3,    baseGpMin:100,  baseGpMax:150}
  },
  2: {
    easy:     {skillCount:2, toolCount:1, langCount:0, squadMin:3, squadMax:4, crMin:1,    crMax:2,    baseGpMin:80,   baseGpMax:120},
    standard: {skillCount:3, toolCount:1, langCount:1, squadMin:3, squadMax:5, crMin:2,    crMax:3,    baseGpMin:120,  baseGpMax:180},
    hard:     {skillCount:4, toolCount:2, langCount:1, squadMin:4, squadMax:5, crMin:3,    crMax:5,    baseGpMin:180,  baseGpMax:280},

    hard:     {skillCount:5, toolCount:2, langCount:2, squadMin:5, squadMax:6, crMin:9,    crMax:13,   baseGpMin:650,  baseGpMax:1000},
    deadly:   {skillCount:6, toolCount:3, langCount:2, squadMin:5, squadMax:7, crMin:13,   crMax:17,   baseGpMin:1000, baseGpMax:1500}

    standard: {skillCount:5, toolCount:2, langCount:2, squadMin:5, squadMax:7, crMin:15,   crMax:19,   baseGpMin:1600, baseGpMax:2400},
    hard:     {skillCount:6, toolCount:3, langCount:2, squadMin:6, squadMax:7, crMin:19,   crMax:24,   baseGpMin:2400, baseGpMax:3600},
    deadly:   {skillCount:7, toolCount:3, langCount:3, squadMin:6, squadMax:8, crMin:24,   crMax:30,   baseGpMin:3600, baseGpMax:5400}

// Helper: safely look up a profile. Returns null if tier/difficulty
// aren't present. Callers should null-check before reading fields.
function getDifficultyProfile(tier, difficulty) {
  if (!tier || !difficulty) return null;
  var t = DIFFICULTY_PROFILES[tier];
  if (!t) return null;
  return t[difficulty] || null;
}

var TRAIT_CATEGORIES = [
  {id:'damage',     label:'Damage Types',     color:'var(--crimson)'},
  {id:'damage_mod', label:'Damage Modifiers', color:'var(--gold)'},
  {id:'utility',    label:'Utility',          color:'var(--ink2)'},
  {id:'nav',        label:'Navigation',       color:'var(--teal)'},

  {id:'terrain',    label:'Terrain Kits',     color:'var(--forest)'},
  {id:'anti',       label:'Creature Counters',color:'var(--crimson)'},
  {id:'counter',    label:'Consumable Counters',color:'var(--forest)'}
];
function traitCategoryLabel(id) {
  var c = TRAIT_CATEGORIES.filter(function(x){return x.id===id;})[0];
  return c ? c.label : (id || 'Other');
}

function renderTraitList() {
  var el = document.getElementById('list-scroll');
  if (!uid()) { el.innerHTML = '<div class="list-empty">Log in to load traits.</div>'; return; }
  if (!traits.length) {
    el.innerHTML = '<div class="list-empty">No traits loaded. Click ↓ to pull from Supabase.</div>';
    return;
  }

  // Sort into category buckets
  var groups = {};
  traits.forEach(function(t) {
    var cat = t.category || 'Other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  });
  // Sort within each group by sort_order then label
  Object.keys(groups).forEach(function(cat) {
    groups[cat].sort(function(a,b) {
      var sa = typeof a.sort_order === 'number' ? a.sort_order : 9999;
      var sb = typeof b.sort_order === 'number' ? b.sort_order : 9999;
      if (sa !== sb) return sa - sb;
      return (a.label||'').localeCompare(b.label||'');
    });
  });

  var html = '';
  if (!isAdmin()) {
    html += '<div style="padding:10px 12px;background:rgba(26,107,138,.08);' +
      'border-bottom:1px solid var(--border2);font-size:.78em;color:var(--ink2);' +
      'font-style:italic">👁 Read-only — only the admin can edit the trait vocabulary.</div>';
  }
  // Ordered categories first
  var ordered = TRAIT_CATEGORIES.map(function(c){return c.id;});
  var catKeys = Object.keys(groups).sort(function(a,b) {
    var ia = ordered.indexOf(a); var ib = ordered.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
  catKeys.forEach(function(cat) {
    var label = traitCategoryLabel(cat);
    html += '<div style="padding:6px 12px 3px;font-family:\'Cinzel\',serif;font-size:.7em;' +
      'text-transform:uppercase;letter-spacing:.05em;color:var(--gold);' +
      'border-top:1px solid var(--border2);margin-top:4px">' + esc(label) +
      ' <span style="color:var(--ink2);font-weight:normal">(' + groups[cat].length + ')</span></div>';
    groups[cat].forEach(function(t) {
      var isSel = sel && sel.kind === 'trait' && sel.key === t.content_key;
      var adminOwned = t._ownerUserId === ADMIN_UID;
      var badge = adminOwned
        ? '<span class="qbadge" style="border-color:var(--gold);color:var(--gold)">official</span>'
        : '<span class="qbadge">custom</span>';
      html += '<div class="quest-row ' + (isSel ? 'sel' : '') +
        '" data-sel-trait="' + esc(t.content_key) + '">' +
        '<span class="quest-row-title" style="flex:1">' + esc(t.label || t.content_key) + '</span>' +
        '<span style="color:var(--ink2);font-size:.75em;margin-right:6px">' + esc(t.content_key) + '</span>' +
        badge +
        '</div>';
    });
  });
  el.innerHTML = html;
  el.onclick = function(e) {
    var row = e.target.closest('[data-sel-trait]');
    if (!row) return;
    var key = row.getAttribute('data-sel-trait');
    sel = { kind: 'trait', key: key };
    renderTraitList();
    showTraitForm(key);
  };
}

function showTraitForm(key) {
  var t = traits.filter(function(x){return x.content_key===key;})[0] || null;
  var isNew = !t;
  var canEdit = isAdmin();
  var fi = document.getElementById('form-inner');

  var catOpts = TRAIT_CATEGORIES.map(function(c) {
    var selAttr = (t && t.category === c.id) ? ' selected' : '';
    return '<option value="' + esc(c.id) + '"' + selAttr + '>' + esc(c.label) + '</option>';
  }).join('');
  // Allow unrecognized category to still render without loss
  if (t && t.category && !TRAIT_CATEGORIES.some(function(c){return c.id===t.category;})) {
    catOpts = '<option value="' + esc(t.category) + '" selected>' + esc(t.category) + ' (custom)</option>' + catOpts;
  }

  var roAttr = canEdit ? '' : ' readonly disabled';
  fi.innerHTML =
    '<div id="form-title-row">' +
      '<div id="form-heading">🏷 ' + (isNew ? 'New Trait' : esc(t.label || t.content_key)) + '</div>' +
    '</div>' +

    (canEdit ? '' :
      '<div style="padding:10px 12px;background:rgba(26,107,138,.08);border:1px solid var(--border2);' +
      'border-radius:4px;margin-bottom:10px;font-size:.85em;color:var(--ink2);font-style:italic">' +
      'You are viewing this trait in read-only mode. Only the admin can modify the official vocabulary.</div>') +

    '<div class="fsec">' +
      '<div class="fsec-title">Identity</div>' +
      '<div class="fgrid c2">' +
        frow('Label *', '<input type="text" id="tf-label" value="' + esc(t ? (t.label||'') : '') +
          '" placeholder="e.g. Fire"' + roAttr + '>') +
        frow('ID / Key *', '<input type="text" id="tf-key" value="' + esc(t ? t.content_key : '') +
          '" placeholder="e.g. fire (lowercase, underscores)"' +
          (isNew && canEdit ? '' : ' readonly') + ' style="font-family:monospace">') +
      '</div>' +
      '<div class="fgrid c1" style="margin-top:10px">' +
        frow('Category *', '<select id="tf-cat"' + roAttr + '>' + catOpts + '</select>') +
        frow('Description', '<textarea id="tf-desc" rows="2" placeholder="What does this trait represent?"' +
          roAttr + '>' + esc(t ? (t.desc||'') : '') + '</textarea>') +
        frow('Sort Order', '<input type="number" id="tf-sort" value="' +
          (t && typeof t.sort_order === 'number' ? t.sort_order : 9999) +
          '" min="0" step="1"' + roAttr + '>') +
      '</div>' +
    '</div>' +

    (canEdit ? (
      '<div id="action-row">' +
        '<button class="btn btn-save" id="tf-save">💾 Save Trait</button>' +
        (!isNew && t && t._ownerUserId === ADMIN_UID ? '<button class="btn btn-del" id="tf-del">🗑 Delete</button>' : '') +
        (!isNew ? '<button class="btn btn-new" id="tf-dupe">⧉ Duplicate</button>' : '') +
        '<button class="btn btn-new" id="tf-new" style="margin-left:auto">+ New Trait</button>' +
        '<span id="save-flash"></span>' +
      '</div>'
    ) : '');

  if (!canEdit) return;

  document.getElementById('tf-save').onclick = function() {
    var label = (document.getElementById('tf-label').value || '').trim();
    var rawKey = (document.getElementById('tf-key').value || '').trim().toLowerCase();
    var slugKey = rawKey.replace(/[^a-z0-9_]/g,'_').replace(/^_+|_+$/g,'');
    var cat   = document.getElementById('tf-cat').value || 'utility';
    var desc  = (document.getElementById('tf-desc').value || '').trim();
    var srt   = parseInt(document.getElementById('tf-sort').value, 10);
    if (isNaN(srt)) srt = 9999;
    if (!label || !slugKey) { alert('Label and ID are required.'); return; }
    if (isNew && traits.some(function(x){return x.content_key===slugKey;})) {
      alert('A trait with ID "' + slugKey + '" already exists. Choose a different ID.');
      return;
    }
    var row = {
      content_type: 'trait',
      content_key:  slugKey,
      title:        label,
      owner_user_id: ADMIN_UID,      // admin-owned vocabulary row
      visibility:   'official',
      status:       'published',
      sort_order:   srt,
      data: { category: cat, label: label, desc: desc }
    };
    sbUpsert(row).then(function(){
      flash('✓ Trait saved');
      return pullData();
    }).then(function(){
      sel = { kind: 'trait', key: slugKey };
      activeTab = 'traits';
      renderList();
      showTraitForm(slugKey);
    }).catch(function(err){
      alert('Save failed: ' + (err.message || err));
    });
  };

  if (!isNew && t && t._ownerUserId === ADMIN_UID) {
    document.getElementById('tf-del').onclick = function() {
      if (prompt('Type DELETE to confirm removing trait "' + (t.label||t.content_key) + '". ' +
        'Items referencing this trait will retain the dangling reference until re-saved.') !== 'DELETE') {
        alert('Cancelled.'); return;
      }
      var filter = 'content_type=eq.trait' +
        '&content_key=eq.' + encodeURIComponent(t.content_key) +
        '&owner_user_id=eq.' + encodeURIComponent(ADMIN_UID);
      sbDelete(filter).then(function(){
        flash('✓ Trait deleted');
        return pullData();
      }).then(function(){
        sel = null;
        activeTab = 'traits';
        renderList();
        showPlaceholder();
      }).catch(function(err){
        alert('Delete failed: ' + (err.message || err));
      });
    };
  }

  if (!isNew) {
    document.getElementById('tf-dupe').onclick = function() {
      var dupeKey = t.content_key + '_copy';
      var n = 2;
      while (traits.some(function(x){return x.content_key===dupeKey;})) {
        dupeKey = t.content_key + '_copy' + (n++);
      }
      sel = { kind: 'trait', key: null };
      activeTab = 'traits';
      // Render an empty form pre-filled from t with new key
      var fi2 = document.getElementById('form-inner');
      var oldT = t;
      // Show form by simulating a new trait with prefilled label/cat/desc
      // Simplest: push a transient preview into the form (not into traits[])
      var preview = {
        content_key: dupeKey,
        label: (t.label || t.content_key) + ' (copy)',
        category: t.category,
        desc: t.desc || '',
        sort_order: (typeof t.sort_order === 'number' ? t.sort_order : 9999)
      };
      // Directly render a new-trait form with preview values
      showTraitForm(null);
      document.getElementById('tf-label').value = preview.label;
      document.getElementById('tf-key').value = preview.content_key;
      document.getElementById('tf-cat').value = preview.category;
      document.getElementById('tf-desc').value = preview.desc;
      document.getElementById('tf-sort').value = preview.sort_order;
    };
  }

  document.getElementById('tf-new').onclick = function() {
    sel = { kind: 'trait', key: null };
    activeTab = 'traits';
    showTraitForm(null);
  };
}

// ══════════════════════════════════════════════════
// SPECIALTIES TAB (v1.699 — was hardcoded in game.html SPECIALTIES)
// ══════════════════════════════════════════════════
// Specialties are class-agnostic Daggerheart-style domain tags. A
// character can hold at most one. The specialty's grantsItemAccess
// array lists item names whose class restriction (set on items via
// the Prereq-Eligible Classes panel) it bypasses.
//
// Schema: content_items rows with content_type='specialty'.
//   content_key: the specialty key (e.g. 'Texere')
//   data.label:  display name
//   data.desc:   lore blurb
//   data.grantsItemAccess: array of item names this specialty unlocks
//
// Admin-only CRUD (same pattern as Traits/Terrain). The Texere entry
// is also kept hardcoded as a fallback in both qe.html and game.html
// so the system works even before the v1.7149 migration runs.

function renderSpecialtyList() {
  var el = document.getElementById('list-scroll');
  if (!uid()) { el.innerHTML = '<div class="list-empty">Log in to load specialties.</div>'; return; }
  // Build a normalized list — DB rows + the hardcoded Texere fallback
  // (only if Texere isn't already in the DB list, so the Texere edit
  // surface lights up as soon as it's seeded).
  var dbKeys = {};
  specialties.forEach(function(s){ if(s&&s.content_key) dbKeys[s.content_key] = true; });
  var rows = specialties.slice();
  Object.keys(SPECIALTIES_QE||{}).forEach(function(k){
    if (dbKeys[k]) return;
    var f = SPECIALTIES_QE[k];
    rows.push({
      content_key: k,
      label: f.label,
      desc: f.desc,
      grantsItemAccess: [],
      _fallbackOnly: true
    });
  });
  rows.sort(function(a,b){
    var sa = typeof a.sort_order === 'number' ? a.sort_order : 9999;
    var sb = typeof b.sort_order === 'number' ? b.sort_order : 9999;
    if (sa !== sb) return sa - sb;
    return (a.label||a.content_key||'').localeCompare(b.label||b.content_key||'');
  });

  var html = '';
  if (!isAdmin()) {
    html += '<div style="padding:10px 12px;background:rgba(26,107,138,.08);' +
      'border-bottom:1px solid var(--border2);font-size:.78em;color:var(--ink2);' +
      'font-style:italic">👁 Read-only — only the admin can edit the specialty vocabulary.</div>';
  }
  if (!rows.length) {
    el.innerHTML = html + '<div class="list-empty">No specialties yet. Click "+ Specialty" to create one.</div>';
    return;
  }
  rows.forEach(function(s) {
    var isSel = sel && sel.kind === 'specialty' && sel.key === s.content_key;
    var badge;
    if (s._fallbackOnly) {
      badge = '<span class="qbadge" style="border-color:var(--ink2);color:var(--ink2)" title="Hardcoded fallback — not yet in DB">fallback</span>';
    } else if (s._ownerUserId === ADMIN_UID) {
      badge = '<span class="qbadge" style="border-color:var(--gold);color:var(--gold)">official</span>';
    } else {
      badge = '<span class="qbadge">custom</span>';
    }
    var grantCount = (s.grantsItemAccess && s.grantsItemAccess.length) || 0;
    var grantBadge = grantCount
      ? ' <span style="font-size:.7em;color:var(--ink2)">· ' + grantCount + ' item' + (grantCount===1?'':'s') + '</span>'
      : '';
    html += '<div class="quest-row ' + (isSel ? 'sel' : '') +
      '" data-sel-specialty="' + esc(s.content_key) + '">' +
      '<span style="margin-right:4px">✨</span>' +
      '<span class="quest-row-title" style="flex:1">' + esc(s.label || s.content_key) + grantBadge + '</span>' +
      '<span style="color:var(--ink2);font-size:.75em;margin-right:6px">' + esc(s.content_key) + '</span>' +
      badge +
      '</div>';
  });
  el.innerHTML = html;
  el.onclick = function(e) {
    var row = e.target.closest('[data-sel-specialty]');
    if (!row) return;
    var key = row.getAttribute('data-sel-specialty');
    sel = { kind: 'specialty', key: key };
    renderSpecialtyList();
    showSpecialtyForm(key);
  };
}

function showSpecialtyForm(key) {
  // Resolve from DB first, then from fallback (so editing 'Texere' before
  // the migration shows its baked-in label/desc).
  var s = specialties.filter(function(x){return x.content_key===key;})[0] || null;
  var fallback = (!s && SPECIALTIES_QE && SPECIALTIES_QE[key]) ? SPECIALTIES_QE[key] : null;
  var isNew = !s && !fallback;
  var canEdit = isAdmin();
  var fi = document.getElementById('form-inner');
  // Source of truth for prefill values
  var src = s || fallback || null;
  var srcLabel = src ? (src.label||key||'') : '';
  var srcDesc  = src ? (src.desc ||'') : '';
  var srcGrants = (src && Array.isArray(src.grantsItemAccess)) ? src.grantsItemAccess.slice() : [];
  var srcSort  = (s && typeof s.sort_order === 'number') ? s.sort_order : 9999;

  var roAttr = canEdit ? '' : ' readonly disabled';

  // Build the grantsItemAccess multi-select. Source = GEAR_PREREQ_NAMES
  // (already deduped against the DB). Pre-select rows in srcGrants;
  // surface orphans (saved values not in current GEAR_PREREQ_NAMES) as
  // separate options so they can be deliberately kept or removed.
  var orphans = srcGrants.filter(function(n){ return GEAR_PREREQ_NAMES.indexOf(n) === -1; });
  var grantOptsHtml =
    GEAR_PREREQ_NAMES.slice().sort().map(function(n){
      var selAttr = (srcGrants.indexOf(n) !== -1) ? ' selected' : '';
      return '<option value="' + esc(n) + '"' + selAttr + '>' + esc(n) + '</option>';
    }).join('') +
    orphans.map(function(n){
      return '<option value="' + esc(n) + '" selected>' + esc(n) + '  \u26A0 not in DB</option>';
    }).join('');

  fi.innerHTML =
    '<div id="form-title-row">' +
      '<div id="form-heading">✨ ' + (isNew ? 'New Specialty' : esc(srcLabel || key)) + '</div>' +
    '</div>' +

    (canEdit ? '' :
      '<div style="padding:10px 12px;background:rgba(26,107,138,.08);border:1px solid var(--border2);' +
      'border-radius:4px;margin-bottom:10px;font-size:.85em;color:var(--ink2);font-style:italic">' +
      'You are viewing this specialty in read-only mode. Only the admin can modify the specialty vocabulary.</div>') +

    (fallback && !s ? (
      '<div style="padding:10px 12px;background:rgba(201,146,42,.08);border:1px solid var(--border2);' +
      'border-radius:4px;margin-bottom:10px;font-size:.85em;color:var(--ink2)">' +
      '\u26A0 This specialty currently exists only as a hardcoded fallback in the game source. ' +
      'Saving it here will create a Supabase row that overrides the fallback going forward.</div>'
    ) : '') +

    '<div class="fsec">' +
      '<div class="fsec-title">Identity</div>' +
      '<div class="fgrid c2">' +
        frow('Label *', '<input type="text" id="sf-label" value="' + esc(srcLabel) +
          '" placeholder="e.g. Texere"' + roAttr + '>') +
        frow('ID / Key *', '<input type="text" id="sf-key" value="' + esc(key||'') +
          '" placeholder="e.g. Texere"' +
          (isNew && canEdit ? '' : ' readonly') + ' style="font-family:monospace">') +
      '</div>' +
      '<div class="fgrid c1" style="margin-top:10px">' +
        frow('Description',
          '<textarea id="sf-desc" rows="3" placeholder="Lore blurb shown on character peek and capstone reward modal"' +
          roAttr + '>' + esc(srcDesc) + '</textarea>') +
        frow('Sort Order', '<input type="number" id="sf-sort" value="' + srcSort +
          '" min="0" step="1"' + roAttr + '>') +
      '</div>' +
    '</div>' +

    '<div class="fsec">' +
      '<div class="fsec-title">Item Access Grants</div>' +
      '<div style="font-size:.78em;color:var(--ink2);margin-bottom:6px">' +
        'Items listed here can be used by any character bound to this specialty, ' +
        'even if the item is otherwise restricted to specific classes (via the ' +
        'item form\'s Prereq-Eligible Classes panel). Use this for class-locked ' +
        'gear that the specialty\'s lore would unlock — e.g., Texere unlocks ' +
        'dragon-touched runic foci that are normally Wizard-only.' +
      '</div>' +
      frow('Grants Item Access <span class="select-hint">(Ctrl/⌘ for multi)</span>',
        '<select id="sf-grants" multiple' + roAttr + ' style="min-height:120px">' +
        grantOptsHtml + '</select>') +
    '</div>' +

    (canEdit ? (
      '<div id="action-row">' +
        '<button class="btn btn-save" id="sf-save">💾 Save Specialty</button>' +
        (!isNew && s && s._ownerUserId === ADMIN_UID ? '<button class="btn btn-del" id="sf-del">🗑 Delete</button>' : '') +
        (!isNew ? '<button class="btn btn-new" id="sf-dupe">⧉ Duplicate</button>' : '') +
        '<button class="btn btn-new" id="sf-new" style="margin-left:auto">+ New Specialty</button>' +
        '<span id="save-flash"></span>' +
      '</div>'
    ) : '');

  if (!canEdit) return;

  document.getElementById('sf-save').onclick = function() {
    var label = (document.getElementById('sf-label').value || '').trim();
    var rawKey = (document.getElementById('sf-key').value || '').trim();
    // Specialty keys preserve case (Texere, Bone, Blade — proper nouns) but
    // strip whitespace and special chars to a safe slug. We allow letters,
    // digits, hyphen, underscore. Blanks rejected.
    var slugKey = rawKey.replace(/[^a-zA-Z0-9_\-]/g, '');
    var desc  = (document.getElementById('sf-desc').value || '').trim();
    var srt   = parseInt(document.getElementById('sf-sort').value, 10);
    if (isNaN(srt)) srt = 9999;
    if (!label || !slugKey) { alert('Label and ID are required.'); return; }
    if (isNew && specialties.some(function(x){return x.content_key===slugKey;})) {
      alert('A specialty with ID "' + slugKey + '" already exists. Choose a different ID.');
      return;
    }
    var grantsSel = document.getElementById('sf-grants');
    var grants = grantsSel ? Array.from(grantsSel.selectedOptions).map(function(o){return o.value;}) : [];

    var row = {
      content_type: 'specialty',
      content_key:  slugKey,
      title:        label,
      owner_user_id: ADMIN_UID,
      visibility:   'official',
      status:       'published',
      sort_order:   srt,
      data: { label: label, desc: desc, grantsItemAccess: grants }
    };
    sbUpsert(row).then(function(){
      flash('✓ Specialty saved');
      console.log('[specialty save] upserted', row.content_key, '— pulling fresh data');
      return pullData();
    }).then(function(){
      // v1.699 — Verify the round-trip. If the row didn't come back in
      // the local `specialties` array, something is filtering it out
      // (RLS, vocab fetch filter, etc.). Surface a warning so the user
      // doesn't silently lose data.
      var found = (specialties||[]).some(function(x){return x.content_key===slugKey;});
      if (!found) {
        console.warn('[specialty save] row "'+slugKey+'" did not appear after pullData. ' +
          'Check (1) RLS policies on content_items for content_type=specialty, ' +
          '(2) the vocab fetch filter in pullData includes "specialty", ' +
          '(3) the visibility column was set correctly.');
        alert('⚠ The specialty appeared to save but did not reload from Supabase. ' +
          'Check the browser console for details. Common causes:\n\n' +
          '• RLS policy on content_items rejects content_type=specialty\n' +
          '• The vocab fetch filter excludes specialty\n' +
          '• A CHECK constraint on content_type rejected the row');
      }
      sel = { kind: 'specialty', key: slugKey };
      activeTab = 'specialties';
      renderList();
      showSpecialtyForm(slugKey);
    }).catch(function(err){
      console.error('[specialty save] error:', err);
      alert('Save failed: ' + (err.message || err));
    });
  };

  if (!isNew && s && s._ownerUserId === ADMIN_UID) {
    document.getElementById('sf-del').onclick = function() {
      if (prompt('Type DELETE to confirm removing specialty "' + (s.label||s.content_key) +
        '". Characters currently bound to this specialty will retain c.specialty="' +
        s.content_key + '" but the gate will fall back to the hardcoded SPECIALTIES (Texere only).') !== 'DELETE') {
        alert('Cancelled.'); return;
      }
      var filter = 'content_type=eq.specialty' +
        '&content_key=eq.' + encodeURIComponent(s.content_key) +
        '&owner_user_id=eq.' + encodeURIComponent(ADMIN_UID);
      sbDelete(filter).then(function(){
        flash('✓ Specialty deleted');
        return pullData();
      }).then(function(){
        sel = null;
        activeTab = 'specialties';
        renderList();
        showPlaceholder();
      }).catch(function(err){
        alert('Delete failed: ' + (err.message || err));
      });
    };
  }

  if (!isNew && s) {
    document.getElementById('sf-dupe').onclick = function() {
      var dupeKey = s.content_key + '_copy';
      var n = 2;
      while (specialties.some(function(x){return x.content_key===dupeKey;})) {
        dupeKey = s.content_key + '_copy' + (n++);
      }
      sel = { kind: 'specialty', key: null };
      activeTab = 'specialties';
      showSpecialtyForm(null);
      document.getElementById('sf-label').value = (s.label || s.content_key) + ' (copy)';
      document.getElementById('sf-key').value = dupeKey;
      document.getElementById('sf-desc').value = s.desc || '';
      document.getElementById('sf-sort').value = (typeof s.sort_order === 'number' ? s.sort_order : 9999);
      // Pre-select the same grants
      var gSel = document.getElementById('sf-grants');
      if (gSel) {
        Array.from(gSel.options).forEach(function(o){
          o.selected = (s.grantsItemAccess||[]).indexOf(o.value) !== -1;
        });
      }
    };
  }

  document.getElementById('sf-new').onclick = function() {
    sel = { kind: 'specialty', key: null };
    activeTab = 'specialties';
    showSpecialtyForm(null);
  };
}

// ══════════════════════════════════════════════════
// TERRAIN (v1.680 — Phase 2 Post-Quest Resolution)
// Admin-only CRUD over the terrain vocabulary. Terrain entries tag
// quests and feed the resolution engine with environment context
// (lighting, footing, cover, etc.). Same pattern as Traits above —
// Phase 1 already plumbed `terrain` state array + pull-path branch +
// vocabFilter inclusion, so this is list render + form only.
// ══════════════════════════════════════════════════
var TERRAIN_CATEGORIES = [
  {id:'outdoor',     label:'Outdoor / Wild',     color:'var(--forest)'},
  {id:'urban',       label:'Urban / Settled',    color:'var(--gold)'},
  {id:'underground', label:'Underground',        color:'var(--ink2)'},
  {id:'aquatic',     label:'Aquatic',            color:'var(--teal)'},
  {id:'aerial',      label:'Aerial / Sky',       color:'var(--teal)'},
  {id:'extreme',     label:'Extreme Climate',    color:'var(--crimson)'},
  {id:'planar',      label:'Planar / Exotic',    color:'var(--purple)'}
];
function terrainCategoryLabel(id) {
  var c = TERRAIN_CATEGORIES.filter(function(x){return x.id===id;})[0];
  return c ? c.label : (id || 'Other');
}

function renderTerrainList() {
  var el = document.getElementById('list-scroll');
  if (!uid()) { el.innerHTML = '<div class="list-empty">Log in to load terrain.</div>'; return; }
  if (!terrain.length) {
    el.innerHTML = '<div class="list-empty">No terrain loaded. Click ↓ to pull from Supabase.</div>';
    return;
  }

  var groups = {};
  terrain.forEach(function(t) {
    var cat = t.category || 'Other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  });
  Object.keys(groups).forEach(function(cat) {
    groups[cat].sort(function(a,b) {
      var sa = typeof a.sort_order === 'number' ? a.sort_order : 9999;
      var sb = typeof b.sort_order === 'number' ? b.sort_order : 9999;
      if (sa !== sb) return sa - sb;
      return (a.label||'').localeCompare(b.label||'');
    });
  });

  var html = '';
  if (!isAdmin()) {
    html += '<div style="padding:10px 12px;background:rgba(26,107,138,.08);' +
      'border-bottom:1px solid var(--border2);font-size:.78em;color:var(--ink2);' +
      'font-style:italic">👁 Read-only — only the admin can edit the terrain vocabulary.</div>';
  }
  var ordered = TERRAIN_CATEGORIES.map(function(c){return c.id;});
  var catKeys = Object.keys(groups).sort(function(a,b) {
    var ia = ordered.indexOf(a); var ib = ordered.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
  catKeys.forEach(function(cat) {
    var label = terrainCategoryLabel(cat);
    html += '<div style="padding:6px 12px 3px;font-family:\'Cinzel\',serif;font-size:.7em;' +
      'text-transform:uppercase;letter-spacing:.05em;color:var(--gold);' +
      'border-top:1px solid var(--border2);margin-top:4px">' + esc(label) +
      ' <span style="color:var(--ink2);font-weight:normal">(' + groups[cat].length + ')</span></div>';
    groups[cat].forEach(function(t) {
      var isSel = sel && sel.kind === 'terrain' && sel.key === t.content_key;
      var adminOwned = t._ownerUserId === ADMIN_UID;
      var badge = adminOwned
        ? '<span class="qbadge" style="border-color:var(--gold);color:var(--gold)">official</span>'
        : '<span class="qbadge">custom</span>';
      html += '<div class="quest-row ' + (isSel ? 'sel' : '') +
        '" data-sel-terrain="' + esc(t.content_key) + '">' +
        '<span class="quest-row-title" style="flex:1">' + esc(t.label || t.content_key) + '</span>' +
        '<span style="color:var(--ink2);font-size:.75em;margin-right:6px">' + esc(t.content_key) + '</span>' +
        badge +
        '</div>';
    });
  });
  el.innerHTML = html;
  el.onclick = function(e) {
    var row = e.target.closest('[data-sel-terrain]');
    if (!row) return;
    var key = row.getAttribute('data-sel-terrain');
    sel = { kind: 'terrain', key: key };
    renderTerrainList();
    showTerrainForm(key);
  };
}

          (t && typeof t.sort_order === 'number' ? t.sort_order : 9999) +

      '</div>' +
    '</div>' +

        (!isNew ? '<button class="btn btn-new" id="rf-dupe">⧉ Duplicate</button>' : '') +

        '<span id="save-flash"></span>' +

  if (!canEdit) return;

  document.getElementById('rf-save').onclick = function() {
    var label = (document.getElementById('rf-label').value || '').trim();
    var rawKey = (document.getElementById('rf-key').value || '').trim().toLowerCase();

    var cat   = document.getElementById('rf-cat').value || 'outdoor';
    var desc  = (document.getElementById('rf-desc').value || '').trim();

    if (isNaN(srt)) srt = 9999;

  if (!isNew && t && t._ownerUserId === ADMIN_UID) {

      sel = { kind: 'terrain', key: null };
      activeTab = 'terrain';
      var preview = {

      if (sa !== sb) return sa - sb;

      var badge = adminOwned
        ? '<span class="qbadge" style="border-color:var(--gold);color:var(--gold)">official</span>'
        : '<span class="qbadge">custom</span>';
      html += '<div class="quest-row ' + (isSel ? 'sel' : '') +

function showConditionForm(key) {

  var isNew = !t;
  var canEdit = isAdmin();
  var fi = document.getElementById('form-inner');

  var catOpts = CONDITION_CATEGORIES.map(function(c) {
