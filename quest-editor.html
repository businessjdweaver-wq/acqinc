    '<div style="margin-top:10px;padding:8px 12px;background:rgba(139,26,26,.06);border:1px solid rgba(139,26,26,.15);border-radius:5px;font-size:.82em;color:var(--ink2)">Leave dropdowns at "— None —" and numeric fields at 0 to disable those gate conditions.</div>' +
    '</div>' +

    // ── Real Estate Options (v1.678) ──
    // When this cycle is completed, the main app offers a curated list of
    // buildings the player can purchase and name, bound to this cycle. Writers
    // can deny individual buildings (or the whole catalog) per cycle — e.g. a
    // maritime cycle might disallow Smithy but permit Safe House + Storage.
    // Data is persisted onto cycle.realEstateDeny = {all:bool, buildings:{name:true,...}}
    // which rides along the existing content_items.data JSONB blob — no SQL.
    (function() {
      var re = cycle.realEstateDeny || {};
      var denyAll = !!re.all;
      var deniedMap = (re.buildings && typeof re.buildings === 'object') ? re.buildings : {};
      var REAL_ESTATE_CATALOG = [
        {name:'Storage Shed',            price:200},
        {name:'Stables',                 price:500},
        {name:'Market Stall',            price:800},
        {name:'Barracks',                price:1000},
        {name:'Smithy',                  price:1200},
        {name:'Tavern (Common Room)',    price:1500},
        {name:'Greenhouse',              price:1800},
        {name:"Alchemist's Lab",         price:2000},
        {name:'Library & Scriptorium',   price:2500},
        {name:'Safe House',              price:3000}
      ];
      var rows = REAL_ESTATE_CATALOG.map(function(b) {
        var denied = !!deniedMap[b.name];
        return '<label class="cf-re-row" style="display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--parchment-deep);border-radius:4px;background:var(--parchment);cursor:pointer;font-size:.88em;'+(denyAll?'opacity:.4;pointer-events:none;':'')+'">' +
          '<input type="checkbox" class="cf-re-deny" data-bname="'+esc(b.name)+'"'+(denied?' checked':'')+'>' +
          '<span style="flex:1;color:var(--ink)">'+esc(b.name)+'</span>' +
          '<span style="color:var(--ink2);font-size:.82em">'+b.price.toLocaleString()+' gp</span>' +
          '</label>';
      }).join('');
      return '<div class="fsec">' +
        '<div class="fsec-title">Real Estate Options <span class="select-hint">— deny specific buildings (or all) from being purchasable against this completed cycle</span></div>' +
        '<label style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(201,146,42,.08);border:1px solid rgba(201,146,42,.3);border-radius:5px;margin-bottom:10px;cursor:pointer;font-size:.92em;font-weight:600;color:var(--ink)">' +
          '<input type="checkbox" id="cf-re-deny-all"'+(denyAll?' checked':'')+'>' +
          '<span>🚫 Deny all real estate on this cycle</span>' +
        '</label>' +
        '<div style="font-size:.78em;color:var(--ink2);margin-bottom:8px">Check a building below to block its purchase when this cycle is completed. Unchecked = available.</div>' +
        '<div id="cf-re-list" class="fgrid c2" style="gap:6px">' + rows + '</div>' +
      '</div>';
    })() +

    // ── Quest Matrix ──
    (function() {
      var cqs = quests
        .filter(function(q) { return q.setId === setId; })
        .sort(function(a, b) { return (a.idx || 0) - (b.idx || 0); });
      // Apply saved questOrder if present on the cycle
      if (cycle && Array.isArray(cycle.questOrder) && cycle.questOrder.length) {
        var _qom = {};
        cycle.questOrder.forEach(function(qi, pos) { _qom[qi] = pos; });
        cqs.sort(function(a, b) {
          var pa = _qom[a.idx] !== undefined ? _qom[a.idx] : (a.idx || 0) + 1000;
          var pb = _qom[b.idx] !== undefined ? _qom[b.idx] : (b.idx || 0) + 1000;
          return pa - pb;
        });
      }
      // Stage deep-copies so matrix edits don't mutate `quests` until Save Cycle.
      window._cfCycleQuests = cqs.map(function(q) {
        var copy = JSON.parse(JSON.stringify(q));
        // Ensure pre-object exists with array fields so edits can always push into them.
        copy.pre = copy.pre || {};
        ['skills','tools','lang','items'].forEach(function(k) {
          if (!Array.isArray(copy.pre[k])) copy.pre[k] = [];
        });
        // Faith/rel is historically either a string or array; normalize to array internally.
        if (!copy.pre.rel) copy.pre.rel = [];
        else if (!Array.isArray(copy.pre.rel)) copy.pre.rel = [copy.pre.rel];
        return copy;
      });

      window._cfRenderMatrix = function() {
        var wrap = document.getElementById('cf-matrix');
        if (!wrap) return;
        var rows = window._cfCycleQuests;
        if (!rows.length) {
          wrap.innerHTML = '<div style="padding:20px;text-align:center;color:var(--ink2);font-style:italic">No quests in this cycle yet. Use "+ Quest" in the sidebar to add one.</div>';
          return;
        }

        // ── Predecessor analysis: walk up to 2 hops back via cycleGate.requiredCycleSetId ──
        var predChain = [];
        (function() {
          var seen = {};
          var cur = cycle;
          for (var hop = 0; hop < 2; hop++) {
            var parentId = cur && cur.cycleGate && cur.cycleGate.requiredCycleSetId;
            if (!parentId || seen[parentId]) break;
            seen[parentId] = true;
            var parent = cycles.filter(function(c) { return c.id === parentId; })[0];
            if (!parent) break;
            predChain.push(parent);
            cur = parent;
          }
        }());

        function _collectPre(cyc) {
          var out = { skills:{}, tools:{}, lang:{}, rel:{}, items:{} };
          quests.filter(function(q) { return q.setId === cyc.id; }).forEach(function(q) {
            var pre = q.pre || {};
            (pre.skills || []).forEach(function(s) { out.skills[s] = true; });
            (pre.tools  || []).forEach(function(t) { out.tools[t]  = true; });
            (pre.lang   || []).forEach(function(l) { out.lang[l]   = true; });
            var relArr = Array.isArray(pre.rel) ? pre.rel : (pre.rel ? [pre.rel] : []);
            relArr.forEach(function(r) { out.rel[r] = true; });
            (pre.items  || []).forEach(function(x) { out.items[x] = true; });
          });
          return out;
        }
        var consumed = { skills:{}, tools:{}, lang:{}, rel:{}, items:{} };
        predChain.forEach(function(p) {
          var pc = _collectPre(p);
          ['skills','tools','lang','rel','items'].forEach(function(k) {
            Object.keys(pc[k]).forEach(function(v) { consumed[k][v] = true; });
          });
        });
        // Also subtract what this cycle already uses, so the recommendation is "what's left to try"
        var thisUsed = { skills:{}, tools:{}, lang:{}, rel:{}, items:{} };
        rows.forEach(function(q) {
          var pre = q.pre || {};
          (pre.skills || []).forEach(function(s) { thisUsed.skills[s] = true; });
          (pre.tools  || []).forEach(function(t) { thisUsed.tools[t]  = true; });
          (pre.lang   || []).forEach(function(l) { thisUsed.lang[l]   = true; });
          (pre.rel    || []).forEach(function(r) { thisUsed.rel[r]    = true; });
          (pre.items  || []).forEach(function(x) { thisUsed.items[x]  = true; });
        });
        function _remainder(fullList, consumedMap, usedMap) {
          return fullList.filter(function(v) { return !consumedMap[v] && !usedMap[v]; });
        }
        var recSkills = _remainder(DND_SKILLS,        consumed.skills, thisUsed.skills);
        var recTools  = _remainder(DND_TOOLS,         consumed.tools,  thisUsed.tools);
        var recLang   = _remainder(DND_LANG,          consumed.lang,   thisUsed.lang);
        var recRel    = _remainder(DND_REL,           consumed.rel,    thisUsed.rel);
        var recItems  = _remainder(GEAR_PREREQ_NAMES, consumed.items,  thisUsed.items);

        function _pill(label, color) {
          return '<span style="display:inline-flex;align-items:center;background:' + color
            + ';border-radius:10px;padding:1px 7px;font-size:.72em;margin:2px;white-space:nowrap">'
            + esc(label) + '</span>';
        }
        function _pillList(arr, color, cap) {
          cap = cap || 20;
          var shown = arr.slice(0, cap);
          var more = arr.length - shown.length;
          var html = shown.map(function(v) { return _pill(v, color); }).join('');
          if (more > 0) html += '<span style="font-size:.72em;color:#888;margin-left:4px">+' + more + ' more</span>';
          return html;
        }

        var predSummary = predChain.length
          ? predChain.map(function(p, i) { return '<strong>' + (i === 0 ? 'Immediate predecessor' : 'Previous predecessor') + ':</strong> ' + esc(p.name); }).join(' &nbsp; | &nbsp; ')
          : '<em>No predecessor cycle gated by cycleGate.requiredCycleSetId — showing full available pool.</em>';

        var _analysisHtml =
          '<div style="background:rgba(45,80,22,.06);border:1px solid rgba(45,80,22,.25);'
          + 'border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:.78em">' +
            '<div style="font-family:\'Cinzel\',serif;font-size:.8em;color:#2d5016;'
            + 'text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Recommended Prerequisites <span style="font-weight:normal;text-transform:none;letter-spacing:0;color:#888;font-size:.9em">— available pool minus predecessors &amp; current cycle</span></div>' +
            '<div style="margin-bottom:6px;color:#555;font-size:.92em">' + predSummary + '</div>' +
            (recSkills.length ? '<div style="margin-bottom:3px"><span style="color:#888">Skills: </span>' + _pillList(recSkills, 'rgba(26,95,160,.12)') + '</div>' : '') +
            (recTools.length  ? '<div style="margin-bottom:3px"><span style="color:#888">Tools: </span>'  + _pillList(recTools,  'rgba(80,120,60,.12)') + '</div>' : '') +
            (recLang.length   ? '<div style="margin-bottom:3px"><span style="color:#888">Languages: </span>' + _pillList(recLang,   'rgba(130,70,160,.12)') + '</div>' : '') +
            (recRel.length    ? '<div style="margin-bottom:3px"><span style="color:#888">Faiths: </span>'  + _pillList(recRel,    'rgba(180,100,20,.12)') + '</div>' : '') +
            (recItems.length  ? '<div style="margin-bottom:3px"><span style="color:#888">Items: </span>'  + _pillList(recItems,  'rgba(100,100,100,.12)', 12) + '</div>' : '') +
            ((recSkills.length + recTools.length + recLang.length + recRel.length + recItems.length) === 0
              ? '<div style="color:#8b1a1a;font-style:italic">No prerequisites left to recommend — the predecessor chain plus this cycle already cover the full pool.</div>' : '') +
          '</div>';

        // ── Build table rows ──
        function _chips(vals, cls) {
          if (!vals || !vals.length) return '';
          return vals.map(function(v) {
            return '<span class="qmx-chip ' + cls + '">' + esc(v) + '</span>';
          }).join('');
        }
        function _typeOpts(val) {
          return ['combat','explore','wonder','social'].map(function(t) {
            return '<option value="' + t + '"' + (t === val ? ' selected' : '') + '>' + t + '</option>';
          }).join('');
        }
        var tbody = rows.map(function(q, i) {
          var isFirst = i === 0, isLast = i === rows.length - 1;
          var pre = q.pre || {};
          var badge = q.capstone ? '⭐' : (q._custom || q._editable ? '✎' : '');
          var badgeTitle = q.capstone ? 'Capstone quest' : (q._custom || q._editable ? 'Custom / editable' : '');
          return '<tr class="' + (q.capstone ? 'capstone' : '') + '" data-qi="' + i + '">' +
            '<td class="qmx-pos">' + (i + 1) + '</td>' +
            '<td class="qmx-reord">' +
              '<button type="button" data-cf-move="up" data-cf-qi="' + i + '"' + (isFirst ? ' disabled' : '') + '>▲</button>' +
              '<button type="button" data-cf-move="down" data-cf-qi="' + i + '"' + (isLast ? ' disabled' : '') + '>▼</button>' +
            '</td>' +
            '<td class="qmx-badge-cell" title="' + esc(badgeTitle) + '">' + badge + '</td>' +
            '<td class="qmx-title"><input type="text" data-qmx-field="title" value="' + esc(q.title || '') + '" placeholder="(untitled)"></td>' +
            '<td class="qmx-desc"><textarea data-qmx-field="desc" data-qmx-autogrow rows="1" placeholder="(no description)">' + esc(q.desc || '') + '</textarea></td>' +
            '<td class="qmx-type"><select data-qmx-field="type">' + _typeOpts(q.type || 'explore') + '</select></td>' +
            '<td class="qmx-num"><input type="number" data-qmx-field="minLevel" min="0" max="20" value="' + (q.minLevel || 0) + '"></td>' +
            '<td class="qmx-num"><input type="number" data-qmx-field="squadReqMin" min="0" max="20" value="' + (q.squadReqMin || 0) + '"></td>' +
            '<td class="qmx-num"><input type="number" data-qmx-field="squadReqMax" min="0" max="20" value="' + (q.squadReqMax || 0) + '"></td>' +
            '<td class="qmx-num"><input type="number" data-qmx-field="baseGp" min="0" value="' + (q.baseGp || 0) + '"></td>' +
            '<td class="qmx-chips"><div class="qmx-chipbox" data-qmx-pick="skills" title="Click to edit skills">' + _chips(pre.skills, '') + '</div></td>' +
            '<td class="qmx-chips"><div class="qmx-chipbox" data-qmx-pick="rel" title="Click to edit faiths">' + _chips(pre.rel, 'rel') + '</div></td>' +
            '<td class="qmx-chips"><div class="qmx-chipbox" data-qmx-pick="lang" title="Click to edit languages">' + _chips(pre.lang, 'lang') + '</div></td>' +
            '<td class="qmx-chips"><div class="qmx-chipbox" data-qmx-pick="tools" title="Click to edit tools">' + _chips(pre.tools, 'tool') + '</div></td>' +
            '<td class="qmx-chips"><div class="qmx-chipbox" data-qmx-pick="items" title="Click to edit items">' + _chips(pre.items, 'item') + '</div></td>' +
            '<td class="qmx-more"><button type="button" data-qmx-more="' + i + '" title="Edit additional fields">⋯ More</button></td>' +
          '</tr>';
        }).join('');

        // Header action buttons: ✕ clears a column; ∕ on baseGp interpolates a gradient.
        // Each <th> gets a label row plus a tiny action row beneath it, so <thead> stays one row grid-wise.
        function _hdr(label, cls, actionHtml) {
          return '<th' + (cls ? ' class="' + cls + '"' : '') + '>' +
            '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">' +
              '<span>' + label + '</span>' +
              '<div style="display:flex;gap:2px;min-height:16px">' + (actionHtml || '') + '</div>' +
            '</div>' +
          '</th>';
        }
        function _clearBtn(col) {
          return '<button type="button" class="qmx-hdr-btn" data-qmx-clear="' + col + '" title="Clear entire column">✕</button>';
        }
        function _gradBtn() {
          return '<button type="button" class="qmx-hdr-btn qmx-hdr-grad" data-qmx-gradient="baseGp" title="Interpolate gradient from first to last row">∕</button>';
        }

        var theadHtml =
          '<thead><tr>' +
            _hdr('#', 'num', '') +
            _hdr('Move', 'num', '') +
            _hdr('', '', '') +
            _hdr('Title', '', _clearBtn('title')) +
            _hdr('Description', '', _clearBtn('desc')) +
            _hdr('Type', '', _clearBtn('type')) +
            _hdr('Min Lvl', 'num', _clearBtn('minLevel')) +
            _hdr('Min Pty', 'num', _clearBtn('squadReqMin')) +
            _hdr('Max Pty', 'num', _clearBtn('squadReqMax')) +
            _hdr('Base GP', 'num', _gradBtn() + _clearBtn('baseGp')) +
            _hdr('Skills', '', _clearBtn('pre.skills')) +
            _hdr('Faiths', '', _clearBtn('pre.rel')) +
            _hdr('Languages', '', _clearBtn('pre.lang')) +
            _hdr('Tools', '', _clearBtn('pre.tools')) +
            _hdr('Items', '', _clearBtn('pre.items')) +
            _hdr('More', 'num', '') +
          '</tr></thead>';

        wrap.innerHTML =
          _analysisHtml +
          '<div style="font-size:.74em;color:var(--ink2);margin-bottom:8px">Edit any field inline. Use ▲/▼ to reorder. Click a column\u2019s ✕ to clear that column. Click ∕ above Base GP to interpolate values between first and last rows. Click ⋯ More for less-common fields. Changes apply when you press Save Cycle.</div>' +
          '<div class="qmx-wrap">' +
            '<table class="qmx">' +
              theadHtml +
              '<tbody>' + tbody + '</tbody>' +
            '</table>' +
          '</div>';

        // Auto-size all description textareas to fit content.
        wrap.querySelectorAll('textarea[data-qmx-autogrow]').forEach(function(ta) {
          _qmxAutosize(ta);
        });
      };

      return '<div class="fsec">' +
        '<div class="fsec-title">Quest Matrix <span class="select-hint">— inline editor for all quests in this cycle</span></div>' +
        '<div id="cf-matrix"></div>' +
      '</div>';
    }()) +

    '<div id="action-row">' +
    '<button class="btn btn-save" id="cf-save">💾 Save Cycle</button>' +
    '<button class="btn btn-del" id="cf-del">🗑 Delete Cycle</button>' +
    '<span id="save-flash"></span>' +
    '</div>';

  // Render matrix (must happen after innerHTML is set)
  if (typeof window._cfRenderMatrix === 'function') window._cfRenderMatrix();

  // ▲/▼ move buttons — reorder in memory, re-render matrix immediately
  document.getElementById('form-inner').addEventListener('click', function _cfMoveHandler(e) {
    var btn = e.target.closest('[data-cf-move]');
    if (!btn) return;
    e.stopPropagation();
    var dir = btn.getAttribute('data-cf-move');
    var qi = parseInt(btn.getAttribute('data-cf-qi'), 10);
    var _cqs = window._cfCycleQuests;
    var swapIdx = dir === 'up' ? qi - 1 : qi + 1;
    if (swapIdx < 0 || swapIdx >= _cqs.length) return;
    var tmp = _cqs[qi];
    _cqs[qi] = _cqs[swapIdx];
    _cqs[swapIdx] = tmp;
    window._cfRenderMatrix();
  });

  // Inline matrix cell edits — stage into _cfCycleQuests
  document.getElementById('form-inner').addEventListener('input', function _cfMatrixInput(e) {
    var field = e.target.getAttribute && e.target.getAttribute('data-qmx-field');
    if (!field) return;
    var row = e.target.closest('tr[data-qi]');
    if (!row) return;
    var qi = parseInt(row.getAttribute('data-qi'), 10);
    var q = window._cfCycleQuests[qi];
    if (!q) return;
    var v = e.target.value;
    if (['minLevel','squadReqMin','squadReqMax','baseGp'].indexOf(field) !== -1) {
      q[field] = Math.max(0, parseInt(v, 10) || 0);
    } else {
      q[field] = v;
    }
    // Auto-size description textareas as the user types
    if (e.target.hasAttribute && e.target.hasAttribute('data-qmx-autogrow')) {
      _qmxAutosize(e.target);
    }
  });
  document.getElementById('form-inner').addEventListener('change', function _cfMatrixChange(e) {
    var field = e.target.getAttribute && e.target.getAttribute('data-qmx-field');
    if (!field || e.target.tagName !== 'SELECT') return;
    var row = e.target.closest('tr[data-qi]');
    if (!row) return;
    var qi = parseInt(row.getAttribute('data-qi'), 10);
    var q = window._cfCycleQuests[qi];
    if (!q) return;
    q[field] = e.target.value;
  });

  // Chip-cell clicks open the chip picker modal
  document.getElementById('form-inner').addEventListener('click', function _cfChipClick(e) {
    var chipBox = e.target.closest('[data-qmx-pick]');
    if (!chipBox) return;
    var row = chipBox.closest('tr[data-qi]');
    if (!row) return;
    var qi = parseInt(row.getAttribute('data-qi'), 10);
    var field = chipBox.getAttribute('data-qmx-pick');
    openChipPicker(qi, field);
  });

  // "More" button opens the overflow modal
  document.getElementById('form-inner').addEventListener('click', function _cfMoreClick(e) {
    var btn = e.target.closest('[data-qmx-more]');
    if (!btn) return;
    var qi = parseInt(btn.getAttribute('data-qmx-more'), 10);
    openQuestMoreModal(qi);
  });

  // Column clear: ✕ button in a header — reset that field across all rows.
  document.getElementById('form-inner').addEventListener('click', function _cfClearCol(e) {
    var btn = e.target.closest('[data-qmx-clear]');
    if (!btn) return;
    var field = btn.getAttribute('data-qmx-clear');
    var rows = window._cfCycleQuests;
    if (!rows || !rows.length) return;
    // field may be 'pre.skills', 'pre.rel', etc. for chip columns
    var defaults = {
      title: '', desc: '', type: 'explore',
      minLevel: 0, squadReqMin: 0, squadReqMax: 0, baseGp: 0
    };
    rows.forEach(function(q) {
      if (field.indexOf('pre.') === 0) {
        var sub = field.slice(4);
        q.pre = q.pre || {};
        q.pre[sub] = [];
      } else if (defaults.hasOwnProperty(field)) {
        q[field] = defaults[field];
      }
    });
    window._cfRenderMatrix();
  });

  // Base GP gradient: ∕ button — linearly interpolate from row[0] to row[last] across all middle rows.
  document.getElementById('form-inner').addEventListener('click', function _cfGradient(e) {
    var btn = e.target.closest('[data-qmx-gradient]');
    if (!btn) return;
    var field = btn.getAttribute('data-qmx-gradient');
    var rows = window._cfCycleQuests;
    if (!rows || rows.length < 2) {
      alert('Need at least 2 quests to interpolate a gradient.');
      return;
    }
    var start = parseInt(rows[0][field], 10) || 0;
    var end   = parseInt(rows[rows.length - 1][field], 10) || 0;
    if (start === 0 && end === 0) {
      alert('Set the first and/or last row\u2019s ' + field + ' before generating a gradient.');
      return;
    }
    var n = rows.length;
    for (var i = 1; i < n - 1; i++) {
      var t = i / (n - 1);
      rows[i][field] = Math.round(start + (end - start) * t);
    }
    window._cfRenderMatrix();
  });

  // ── Real Estate: "Deny all" toggle greys out per-building rows (v1.678) ──
  (function() {
    var denyAllEl = document.getElementById('cf-re-deny-all');
    if (!denyAllEl) return;
    denyAllEl.addEventListener('change', function() {
      var on = denyAllEl.checked;
      document.querySelectorAll('#cf-re-list .cf-re-row').forEach(function(row) {
        if (on) {
          row.style.opacity = '.4';
          row.style.pointerEvents = 'none';
        } else {
          row.style.opacity = '';
          row.style.pointerEvents = '';
        }
      });
    });
  })();

  document.getElementById('cf-save').onclick = function() {
    var name = (document.getElementById('cf-name').value || '').trim();
    if (!name) { alert('Cycle name is required.'); return; }
    cycle.name      = name;
    cycle.theme     = (document.getElementById('cf-theme').value || '').trim();
    cycle.territory = (document.getElementById('cf-territory').value || '').trim() || undefined;
    cycle.published = document.getElementById('pub-chk').checked;

    // Build cycleGate — omit empty/zero values
    var gate = {};
    var vis = document.getElementById('cf-vis').value;
    if (vis && vis !== 'fully_visible') gate.visibility = vis;
    else gate.visibility = 'fully_visible';

    var cyclePre = document.getElementById('cf-cycle-pre').value;
    if (cyclePre) gate.requiredCycleSetId = cyclePre;

    var asset = (document.getElementById('cf-asset').value || '').trim();
    if (asset) gate.requiredAsset = asset; else delete gate.requiredAsset;

    var compKind = document.getElementById('cf-comp-kind').value;
    gate.requiredCompanionKind = compKind || 'specific';

    var mountType = (document.getElementById('cf-mount-type').value || '').trim();
    if (mountType) gate.requiredMountType = mountType; else delete gate.requiredMountType;
    var petType = (document.getElementById('cf-pet-type').value || '').trim();
    if (petType) gate.requiredPetType = petType; else delete gate.requiredPetType;
    var petCount = Math.max(0, parseInt(document.getElementById('cf-pet-count').value, 10) || 0);
    if (petCount) gate.requiredPetCount = petCount; else delete gate.requiredPetCount;

    var mountCount = Math.max(0, parseInt(document.getElementById('cf-mount-count').value, 10) || 0);
    if (mountCount) gate.requiredMountCount = mountCount;

    var squadSize = Math.max(0, parseInt(document.getElementById('cf-squad-size').value, 10) || 0);
    if (squadSize) gate.minSquadSize = squadSize;

    var avgLevel = Math.max(0, parseFloat(document.getElementById('cf-avg-level').value) || 0);
    if (avgLevel) gate.minAvgSquadLevel = avgLevel;

    cycle.cycleGate = gate;

    // ── Real Estate denial (v1.678) ────────────────────────────────
    // Collect per-building deny flags and the master "deny all" flag.
    // Persist as cycle.realEstateDeny. If nothing is denied, remove the
    // property entirely to keep the saved blob clean.
    var reDenyAll = !!document.getElementById('cf-re-deny-all').checked;
    var reBuildings = {};
    document.querySelectorAll('#cf-re-list .cf-re-deny').forEach(function(cb) {
      if (cb.checked) {
        var bn = cb.getAttribute('data-bname');
        if (bn) reBuildings[bn] = true;
      }
    });
    if (reDenyAll || Object.keys(reBuildings).length) {
      cycle.realEstateDeny = {};
      if (reDenyAll) cycle.realEstateDeny.all = true;
      if (Object.keys(reBuildings).length) cycle.realEstateDeny.buildings = reBuildings;
    } else {
      delete cycle.realEstateDeny;
    }
    // ──────────────────────────────────────────────────────────────

    // Read current order + edits from _cfCycleQuests (deep-copies; updated in memory by inline edits and ▲/▼)
    var _cqs = window._cfCycleQuests || [];
    if (_cqs.length) {
      cycle.questOrder = _cqs.map(function(q) { return q.idx; });
    }
    // Merge each edited copy back into the canonical `quests` array.
    // `_cfCycleQuests` holds deep-copies, so we find the original by (setId, idx) and overwrite its fields.
    _cqs.forEach(function(editedQ, pos) {
      var orig = quests.filter(function(x) { return x.setId === editedQ.setId && x.idx === editedQ.idx; })[0];
      if (!orig) return;
      // Copy all editable fields. We preserve internal flags (_dbId, _dbContent, _custom, _editable) on orig.
      var preserve = {
        _dbId: orig._dbId, _dbContent: orig._dbContent,
        _custom: orig._custom, _editable: orig._editable
      };
      // Wipe and re-assign, then restore preserved internal flags.
      Object.keys(orig).forEach(function(k) { delete orig[k]; });
      Object.assign(orig, editedQ);
      Object.keys(preserve).forEach(function(k) {
        if (preserve[k] !== undefined) orig[k] = preserve[k];
      });
      orig.sort_order = pos;
    });
    // Build quest rows from the now-updated `quests` array so sort_order + edits both persist.
    var _questRowsToSave = _cqs.map(function(editedQ, pos) {
      var orig = quests.filter(function(x) { return x.setId === editedQ.setId && x.idx === editedQ.idx; })[0];
      return questToRow(orig || editedQ, pos);
    });
    saveCycle(cycle).then(function() {
      if (!_questRowsToSave.length) return;
      return sbUpsert(_questRowsToSave);
    }).then(function() {
      renderList();
      showCycleForm(cycle.id);
    });
  };
  document.getElementById('cf-del').onclick = function() {
    var cycleQuests = quests.filter(function(q) { return q.setId === cycle.id; });
    var msg = 'Delete cycle "' + cycle.name + '"';
    if (cycleQuests.length) msg += ' and its ' + cycleQuests.length + ' quest(s)?';
    msg += '\n\nType DELETE to confirm.';
    if (prompt(msg) !== 'DELETE') { alert('Cancelled.'); return; }
    deleteCycle(cycle);
  };
}

  function renderDifficultyRefPanel() {
    var panel = document.getElementById('qf-diff-ref');
    if (!panel) return;
    var diff = (document.getElementById('qf-diff') || {}).value || '';
    var tierRaw = (document.getElementById('qf-dnd-tier') || {}).value || '';
    var tier = tierRaw ? parseInt(tierRaw, 10) : 0;

        'Pick a D&amp;D Tier above to see design-target reference values for this difficulty.' +
        '</div>';
      return;
    }
    var p = getDifficultyProfile(tier, diff);
    if (!p) {
      panel.innerHTML = '';
      return;
    }
    var diffMeta = DIFFICULTY_LIST.filter(function(d){return d.key===diff;})[0];
    var diffLabel = diffMeta ? diffMeta.label : diff;
    var diffColor = diffMeta ? diffMeta.color : 'var(--ink2)';
    var tierMeta = DND_TIER_LIST.filter(function(t){return t.num===tier;})[0];

        '<div><strong style="color:var(--ink)">Base GP:</strong> '+p.baseGpMin+'\u2013'+p.baseGpMax+'</div>' +

        '<div><strong style="color:var(--ink)">Skills:</strong> '+p.skillCount+'</div>' +

        '<div><strong style="color:var(--ink)">Languages:</strong> '+p.langCount+'</div>' +

      return;

    panel.innerHTML = _encList.map(function(e,i){return _renderEncRow(e,i);}).join('');

    panel.querySelectorAll('.enc-monster').forEach(function(el){
      el.onchange = function(){ var i=+el.getAttribute('data-enc-idx'); _encList[i].monsterKey = el.value; };

    panel.querySelectorAll('.enc-role').forEach(function(el){

        _renderEncPanel();

    var _tierRaw = (document.getElementById('qf-dnd-tier') || {}).value || '';
    q.dndTier     = _tierRaw ? parseInt(_tierRaw, 10) : null;
    q.baseGp      = parseInt(document.getElementById('qf-gp').value) || 40;
    q.reward      = (document.getElementById('qf-reward').value || '').trim();
    q.terrain     = document.getElementById('qf-terrain').value || 'none';
    q.squadReqMin = Math.max(0, parseInt(document.getElementById('qf-squad').value) || 0);
    q.squadReqMax = Math.max(0, parseInt(document.getElementById('qf-squadmax').value) || 0) || null;
    q.capstone    = document.getElementById('qf-capstone').checked;
    // Capstone reward
    (function() {
      var crT = document.getElementById('qf-cr-type');
      if (!crT || crT.value === 'random') { q.capstoneReward = null; return; }
      var t = crT.value;
      if (t === 'item') {
        var n = (document.getElementById('qf-cr-item-name').value || '').trim();
        if (!n) { q.capstoneReward = null; return; }
        q.capstoneReward = {
          type: 'item',
          name: n,
          ic: (document.getElementById('qf-cr-item-ic').value || '✨').trim(),
          desc: (document.getElementById('qf-cr-item-desc').value || '').trim(),
          bagOfHolding: document.getElementById('qf-cr-item-bag').checked || false
        };
      } else if (t === 'pet') {
        var n = (document.getElementById('qf-cr-pet-name').value || '').trim();
        if (!n) { q.capstoneReward = null; return; }
        q.capstoneReward = {
          type: 'pet',
          name: n,
          ic: (document.getElementById('qf-cr-pet-ic').value || '🐾').trim(),
          desc: (document.getElementById('qf-cr-pet-desc').value || '').trim()
        };
      } else if (t === 'npc') {
        var n = (document.getElementById('qf-cr-npc-name').value || '').trim();
        if (!n) { q.capstoneReward = null; return; }
        var invRaw = (document.getElementById('qf-cr-npc-inv').value || '').trim();
        var inv = invRaw ? invRaw.split(',').map(function(x){return x.trim();}).filter(Boolean) : ["Hireling's Pack"];
        var selSkills = Array.from(document.getElementById('qf-cr-npc-skills').selectedOptions).map(function(o){return o.value;});
        var selTools  = Array.from(document.getElementById('qf-cr-npc-tools').selectedOptions).map(function(o){return o.value;});
        var selLang   = Array.from(document.getElementById('qf-cr-npc-lang').selectedOptions).map(function(o){return o.value;});
        q.capstoneReward = {
          type: 'npc',
          name: n,
          species: (document.getElementById('qf-cr-npc-species').value || '').trim(),
          cls: (document.getElementById('qf-cr-npc-cls').value || 'Fighter'),
          contactBg: (document.getElementById('qf-cr-npc-bg').value || '').trim(),
          skills: selSkills, tools: selTools, lang: selLang,
          rel: document.getElementById('qf-cr-npc-rel').value || '',
          inv: inv,
          exoticTrait: (document.getElementById('qf-cr-npc-trait').value || '').trim(),
          stats: (function(){
            try{return JSON.parse(document.getElementById('qf-cr-npc-stats-json').value||'{}');}catch(e){return rollStatsQE(document.getElementById('qf-cr-npc-cls').value||'Fighter');}
          }()),
          questsRemaining: (function(){
            var ql=parseInt(document.getElementById('qf-cr-npc-qlimit').value,10);
            return isNaN(ql)||ql<=0?null:ql;
          }()),
          level: Math.max(0, parseInt(document.getElementById('qf-cr-npc-level').value, 10) || 0),
          hireling: true, contact: true
        };
      } else {
        q.capstoneReward = null;
      }
    }());
    // v1.684: persist encounters list. Cleaned — empty monsterKey entries dropped,
    // count coerced to ≥1 integer, role defaulted to 'standard'.
    q.encounters = _encList.filter(function(e){return e.monsterKey;}).map(function(e){
      var c = parseInt(e.count, 10);
      if (isNaN(c) || c < 1) c = 1;
      return {
        monsterKey: e.monsterKey,
        count: c,
        role: e.role || 'standard',
        note: (e.note||'').trim()
      };
    });
    q.published   = document.getElementById('pub-chk').checked;
    var _relVals = selValues('qf-rel');
    var _gearItems = selValues('qf-items');
    var _petItems = selValues('qf-pets');
    q.pre = {
      skills: selValues('qf-skills'),
      tools:  selValues('qf-tools'),
      lang:   selValues('qf-lang'),
      // v1.679: rel is persisted as a string (first non-empty value if the
      // multi-select has multiple entries). The main app's quest data model
      // treats pre.rel as a single faith string throughout — the QE's earlier
      // behavior of writing arrays for 2+ and empty string for 0 created a
      // shape drift that caused empty/un-fillable Faith peg slots in the app.
      rel:    (_relVals.filter(function(r){return typeof r==='string'&&r.trim();})[0] || ''),
      gold:   parseInt(document.getElementById('qf-gold').value) || 0,
      items:  _gearItems.concat(_petItems.filter(function(p){ return _gearItems.indexOf(p) === -1; }))
    };
    var _minLv = parseInt(document.getElementById('qf-min-level').value) || 0;
    if (_minLv > 0) q.minLevel = _minLv; else delete q.minLevel;
    var _vrName = (document.getElementById('qf-vrq-name').value || '').trim();
    var _vrDesc = (document.getElementById('qf-vrq-desc').value || '').trim();
    if (_vrName) q.vehicleReq = { name: _vrName, desc: _vrDesc, ic: '\uD83D\uDE97' };
    else delete q.vehicleReq;
    var _brName = (document.getElementById('qf-brq-name').value || '').trim();
    var _brDesc = (document.getElementById('qf-brq-desc').value || '').trim();
    if (_brName) q.buildingReq = { name: _brName, desc: _brDesc, ic: '\uD83C\uDFDB' };
    else delete q.buildingReq;
    q._custom   = true;
    q._editable = true;
    var _questKey = q.setId + '::' + q.idx;
    var _prereqRows = prereqRowsFromForm(_questKey);
    // v1.686: Advisory deviation warnings. Only fires when both tier and
    // difficulty are set. Compares actual prereq counts / base GP against
    // DIFFICULTY_PROFILES targets; >50% deviation surfaces a banner on
    // the next form render. Non-blocking — save proceeds regardless.
    (function(){
      if (!q.dndTier || !q.difficulty) return;
      var p = getDifficultyProfile(q.dndTier, q.difficulty);
      if (!p) return;
      var issues = [];
      // Count prereqs from the just-serialized rows
      var actualSkills = (_prereqRows||[]).filter(function(r){return r.kind==='skill';}).length;
      var actualTools  = (_prereqRows||[]).filter(function(r){return r.kind==='tool';}).length;
      var actualLangs  = (_prereqRows||[]).filter(function(r){return r.kind==='lang' || r.kind==='language';}).length;
      function outsideBy(actual, target, label, deviationPct){
        if (target === 0 && actual === 0) return null;
        // Treat "zero target with some actual" as 100% deviation
        if (target === 0 && actual > 0) return actual + ' ' + label + ' (target 0)';
        var pct = Math.abs(actual - target) / target;
        if (pct > (deviationPct || 0.5)) {
          return actual + ' ' + label + ' (target ~' + target + ')';
        }
        return null;
      }
      var sIssue = outsideBy(actualSkills, p.skillCount, 'skill prereq' + (actualSkills===1?'':'s'), 0.5);
      if (sIssue) issues.push(sIssue);
      var tIssue = outsideBy(actualTools, p.toolCount, 'tool prereq' + (actualTools===1?'':'s'), 0.5);
      if (tIssue) issues.push(tIssue);
      var lIssue = outsideBy(actualLangs, p.langCount, 'language prereq' + (actualLangs===1?'':'s'), 0.5);
      if (lIssue) issues.push(lIssue);
      var bg = Number(q.baseGp) || 0;
      if (bg > 0) {
        if (bg < p.baseGpMin * 0.5 || bg > p.baseGpMax * 1.5) {
          issues.push(bg + ' gp (target ' + p.baseGpMin + '\u2013' + p.baseGpMax + ')');
        }
      }
      if (issues.length) {
        window._questAdvisoryWarning = {
          questKey: _questKey,
          tier: q.dndTier,
          difficulty: q.difficulty,
          issues: issues
        };
      } else {
        // Clear any stale warning for this quest
        if (window._questAdvisoryWarning && window._questAdvisoryWarning.questKey === _questKey) {
          window._questAdvisoryWarning = null;
        }
      }
    }());
    saveQuest(q).then(function() {
      return sbPrereqSave(_questKey, _prereqRows);
    }).then(function() {
      renderList(); showQuestForm(setId, idx);
    }).catch(function(e) {
      console.warn('[prereq save]', e);
      renderList(); showQuestForm(setId, idx);
    });
  };

  document.getElementById('qf-del').onclick = function() {
    if (prompt('Type DELETE to confirm removing "' + q.title + '"') !== 'DELETE') {
      alert('Cancelled.');
      return;
    }
    deleteQuest(q);
  };
  // Load structured prereqs from DB and populate form (overrides blob defaults)
  sbPrereqFetch(q.setId + '::' + q.idx).then(function(rows) {
    prereqRowsToFormValues(rows, q);
  });
}

// NEW ITEMS
// ══════════════════════════════════════════════════
function createNewCycle() {
  var id = 'custom-' + Date.now();
  var cycle = { id: id, name: 'New Cycle', theme: '', published: false };
  cycles.push(cycle);
  collapsed[id] = false;
  saveCycle(cycle).then(function() {
    sel = { kind: 'cycle', setId: id };
    renderList();
    showCycleForm(id);
  });
}

function createNewQuest(setId) {
  var cycleQuests = quests.filter(function(q) { return q.setId === setId; });
  var maxIdx = cycleQuests.reduce(function(m, q) { return Math.max(m, q.idx || 0); }, -1);
  var q = {
    setId: setId, idx: maxIdx + 1,
    title: '', desc: '',
    type: 'combat', difficulty: 'standard',
    baseGp: 40, terrain: 'none', squadReqMin: 0,
    capstone: false, published: false,
    _custom: true, _editable: true,
    pre: { skills: [], tools: [], lang: [], rel: '', items: [], gold: 0 }
  };
  quests.push(q);
  collapsed[setId] = false;
  sel = { kind: 'quest', setId: setId, idx: q.idx };
  renderList();
  showQuestForm(setId, q.idx);
}

function frow(label, input) {

}
function pubRow(isPublished) {
  return '<div id="pub-row">' +
    '<input type="checkbox" id="pub-chk"' + (isPublished ? ' checked' : '') + '>' +
    '<label id="pub-label" for="pub-chk">' +
    '<span>' + (isPublished ? '✅ Published' : '⬜ Unpublished') + '</span>' +
    ' — ' + (isPublished ? 'Visible to players' : 'Dev only (draft)') +
    '</label></div>';
}
function typeSelect(id, val) {
  return selEl(id, ['combat','social','explore','wonder'], val);
}
function diffSelect(id, val) {
  return selEl(id, ['easy','standard','hard','deadly'], val);
}
function terrainSelect(id, val) {
  return selEl(id, ['none','mountain','forest','coastal','arctic','desert','swamp','urban','underdark'], val);
}
function selEl(id, opts, val) {
  return '<select id="' + id + '">' +
    opts.map(function(o) {
      return '<option value="' + o + '"' + (o === val ? ' selected' : '') + '>' + o + '</option>';
    }).join('') + '</select>';
}
function multiSelect(id, opts, selected) {
  var sel = selected || [];
  return '<select id="' + id + '" multiple>' +
    opts.map(function(o) {
      return '<option value="' + esc(o) + '"' + (sel.indexOf(o) !== -1 ? ' selected' : '') + '>' + esc(o) + '</option>';
    }).join('') + '</select>';
}
function selValues(id) {
  var el = document.getElementById(id);
  if (!el) return [];
  return Array.from(el.selectedOptions).map(function(o) { return o.value; });
}

// Publish checkbox label update

});

// GENERIC MODAL (used by Quest Matrix chip picker + More button)
// ══════════════════════════════════════════════════
function _qmxAutosize(ta) {
  if (!ta) return;
  // Reset then grow to scrollHeight; CSS max-height (300px) is the cap.
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 300) + 'px';
}
function closeQeModal() {
  var m = document.getElementById('qe-modal-root');
  if (m) m.remove();
  document.removeEventListener('keydown', _qeEscHandler);
}
function _qeEscHandler(e) { if (e.key === 'Escape') closeQeModal(); }
function openQeModal(title, bodyHtml, footerHtml, onMount) {
  closeQeModal();
  var root = document.createElement('div');
  root.id = 'qe-modal-root';
  root.className = 'qe-modal-backdrop';
  root.innerHTML =
    '<div class="qe-modal" role="dialog" aria-modal="true">' +
      '<div class="qe-modal-hdr">' +
        '<h3>' + title + '</h3>' +
        '<button class="qe-close" type="button" aria-label="Close">✕</button>' +
      '</div>' +
      '<div class="qe-modal-body">' + bodyHtml + '</div>' +
      (footerHtml ? '<div class="qe-modal-ftr">' + footerHtml + '</div>' : '') +
    '</div>';
  document.body.appendChild(root);
  root.querySelector('.qe-close').onclick = closeQeModal;
  root.addEventListener('click', function(e) { if (e.target === root) closeQeModal(); });
  document.addEventListener('keydown', _qeEscHandler);
  if (typeof onMount === 'function') onMount(root);
  return root;
}

// CHIP PICKER (for matrix chip cells)
// ══════════════════════════════════════════════════
function openChipPicker(qi, field) {
  var q = window._cfCycleQuests && window._cfCycleQuests[qi];
  if (!q) return;
  var optsMap = {
    skills: { label: 'Skills',    opts: DND_SKILLS,        chipCls: '' },
    tools:  { label: 'Tools',     opts: DND_TOOLS,         chipCls: 'tool' },
    lang:   { label: 'Languages', opts: DND_LANG,          chipCls: 'lang' },
    rel:    { label: 'Faiths',    opts: DND_REL,           chipCls: 'rel' },
    items:  { label: 'Items',     opts: GEAR_PREREQ_NAMES, chipCls: 'item' }
  };
  var cfg = optsMap[field];
  if (!cfg) return;
  q.pre = q.pre || {};
  if (!Array.isArray(q.pre[field])) {
    q.pre[field] = q.pre[field] ? [q.pre[field]] : [];
  }
  var selected = q.pre[field].slice(); // working copy

  function renderGrid(filter) {
    filter = (filter || '').toLowerCase();
    var shown = cfg.opts.filter(function(o) { return !filter || o.toLowerCase().indexOf(filter) !== -1; });
    return shown.map(function(o) {
      var on = selected.indexOf(o) !== -1;
      return '<div class="qe-picker-opt' + (on ? ' on' : '') + '" data-opt="' + esc(o) + '">' + esc(o) + '</div>';
    }).join('');
  }

  var body =
    '<div style="font-size:.85em;color:var(--ink2);margin-bottom:8px">Click options to toggle. Click outside or press Esc to cancel.</div>' +
    '<input type="text" class="qe-picker-search" id="qe-picker-search" placeholder="Filter…" autocomplete="off">' +
    '<div class="qe-picker-grid" id="qe-picker-grid">' + renderGrid('') + '</div>';

  var footer =
    '<button class="btn btn-ghost" type="button" id="qe-picker-clear">Clear All</button>' +
    '<button class="btn btn-ghost" type="button" id="qe-picker-cancel">Cancel</button>' +
    '<button class="btn btn-primary" type="button" id="qe-picker-apply">Apply</button>';

  openQeModal('Edit ' + cfg.label + ' — Quest #' + (qi + 1), body, footer, function(root) {
    var grid = root.querySelector('#qe-picker-grid');
    var search = root.querySelector('#qe-picker-search');
    search.focus();
    search.addEventListener('input', function() { grid.innerHTML = renderGrid(search.value); });
    grid.addEventListener('click', function(e) {
      var opt = e.target.closest('[data-opt]');
      if (!opt) return;
      var v = opt.getAttribute('data-opt');
      var i = selected.indexOf(v);
      if (i === -1) selected.push(v); else selected.splice(i, 1);
      opt.classList.toggle('on');
    });
    root.querySelector('#qe-picker-clear').onclick = function() {
      selected = [];
      grid.querySelectorAll('.qe-picker-opt.on').forEach(function(el) { el.classList.remove('on'); });
    };
    root.querySelector('#qe-picker-cancel').onclick = closeQeModal;
    root.querySelector('#qe-picker-apply').onclick = function() {
      q.pre[field] = selected.slice();
      closeQeModal();
      if (typeof window._cfRenderMatrix === 'function') window._cfRenderMatrix();
    };
  });
}

    '</div>' +

    '<div style="padding:8px 10px;background:rgba(139,26,26,.05);border:1px solid rgba(139,26,26,.15);border-radius:5px;font-size:.78em;color:var(--ink2);margin-top:10px">' +
      '<strong>Note:</strong> For the full Capstone Reward editor (specific item/pet/NPC), open the individual quest form in the sidebar list. This More panel covers the common overflow fields.' +
    '</div>';

  var footer =
    '<button class="btn btn-ghost" type="button" id="qmm-cancel">Cancel</button>' +
    '<button class="btn btn-primary" type="button" id="qmm-apply">Apply</button>';

  openQeModal('⋯ More — Quest #' + (qi + 1), body, footer, function(root) {
    root.querySelector('#qmm-cancel').onclick = closeQeModal;
    root.querySelector('#qmm-apply').onclick = function() {
      // Write-back into staged q
      q.terrain = root.querySelector('#qmm-terrain').value;
      q.difficulty = root.querySelector('#qmm-diff').value;
      q.reward = (root.querySelector('#qmm-reward').value || '').trim();
      var gold = Math.max(0, parseInt(root.querySelector('#qmm-gold').value, 10) || 0);
      if (gold) q.pre.gold = gold; else delete q.pre.gold;
      q.capstone = root.querySelector('#qmm-capstone').checked;

      // Pet prereqs — we merge selected pets back into pre.items (same representation as main quest form).
      var petsSel = Array.from(root.querySelector('#qmm-pets').selectedOptions).map(function(o) { return o.value; });
      // Strip existing pet entries, then append the new selection.
      var nonPetItems = (q.pre.items || []).filter(function(x) { return PET_NAMES.indexOf(x) === -1; });
      q.pre.items = nonPetItems.concat(petsSel);

      // Vehicle
      var vName = root.querySelector('#qmm-vrq-name').value;
      var vDesc = (root.querySelector('#qmm-vrq-desc').value || '').trim();
      if (vName || vDesc) q.vehicleReq = { name: vName, desc: vDesc };
      else delete q.vehicleReq;

      // Building
      var bName = root.querySelector('#qmm-brq-name').value;
      var bDesc = (root.querySelector('#qmm-brq-desc').value || '').trim();
      if (bName || bDesc) q.buildingReq = { name: bName, desc: bDesc };
      else delete q.buildingReq;

      closeQeModal();
      if (typeof window._cfRenderMatrix === 'function') window._cfRenderMatrix();
    };
  });
}

document.getElementById('btn-push').onclick = function() {
  if (!uid()) return;
  var btn = document.getElementById('btn-push');
  btn.textContent = '↑ Pushing…';
  btn.disabled = true;
  // Re-upsert every loaded item to ensure Supabase is current
  var rows = [];
  cycles.forEach(function(c, i)  { rows.push(cycleToRow(c, i)); });
  quests.forEach(function(q, i)  { rows.push(questToRow(q, i)); });
  // pets saved directly to pets table, not via push
  // Deduplicate by content_key — last entry wins (most specific scope)
  var seen = {};
  rows = rows.filter(function(r) {
    if (seen[r.content_key]) return false;
    seen[r.content_key] = true;
    return true;
  });
  if (!rows.length) {
    setStatus('Nothing to push.');
    btn.textContent = '☁ Push'; btn.disabled = false;
    return;
  }
  // Batch upsert in chunks of 50
  var chunks = [];
  for (var i = 0; i < rows.length; i += 50) chunks.push(rows.slice(i, i + 50));
  chunks.reduce(function(p, chunk) {
    return p.then(function() { return sbUpsert(chunk); });
  }, Promise.resolve()).then(function() {
    setStatus('✓ Pushed ' + rows.length + ' item' + (rows.length !== 1 ? 's' : '') + ' to Supabase.', 'var(--forest)');
    btn.textContent = '✓ Pushed';
    setTimeout(function() { btn.textContent = '☁ Push'; btn.disabled = false; }, 2000);
  }).catch(function(err) {
    setStatus('Push failed: ' + (err.message || err), '#e55');
    btn.textContent = '☁ Push'; btn.disabled = false;
  });
};

// DUPLICATE CYCLE
// ══════════════════════════════════════════════════
function showDupeForm() {
  sel = null;
  renderList();

  // allSrcCycles not yet built here; just check we have something
  if (!cycles.length && !BUILTIN_QUESTSETS.length) {
    document.getElementById('form-inner').innerHTML =
      '<div id="placeholder">No cycles yet — create one first.</div>';
    return;
  }

  // Working order state: srcId → [idx, idx, ...]
  var order = [];
  // Will be set after allSrcCycles is built; placeholder for closure
  var srcId = '';

  function getCycleQuests(id) {
    var cq = quests.filter(function(q) { return q.setId === id; });
    if (cq.length) return cq.sort(function(a,b){return (a.idx||0)-(b.idx||0);});
    var bs = BUILTIN_QUESTSETS.filter(function(s){return s.id===id;})[0];
    return bs ? (bs.quests||[]).slice() : [];
  }
  function getOrder(id) {
    return getCycleQuests(id).map(function(q) { return q.idx; });
  }

  function renderOrderList() {
    var listEl = document.getElementById('dupe-list');
    if (!listEl) return;
    if (!order.length) {
      listEl.innerHTML = '<div class="dupe-row" style="justify-content:center;color:var(--ink2);font-style:italic;font-size:.85em">No quests in this cycle</div>';
      return;
    }
    var cq = getCycleQuests(srcId);
    var typeIcons = { combat: '⚔', social: '🗣', explore: '🗺', wonder: '✨' };
    listEl.innerHTML = order.map(function(idx, pos) {
      var q = cq.filter(function(x) { return x.idx === idx; })[0];
      if (!q) return '';
      return '<div class="dupe-row">' +
        '<span class="dupe-pos">' + (pos + 1) + '</span>' +
        '<span class="dupe-title">' + (q.capstone ? '⭐ ' : '') + esc(q.title || '(untitled)') + '</span>' +
        '<span class="dupe-type">' + (typeIcons[q.type] || '') + '</span>' +
        '<div class="dupe-mvs">' +
        '<button class="dupe-mv" data-pos="' + pos + '" data-dir="-1"' + (pos === 0 ? ' disabled' : '') + '>▲</button>' +
        '<button class="dupe-mv" data-pos="' + pos + '" data-dir="1"' + (pos === order.length - 1 ? ' disabled' : '') + '>▼</button>' +
        '</div></div>';
    }).join('');

    // Wire move buttons
    listEl.onclick = function(e) {
      var btn = e.target.closest('.dupe-mv');
      if (!btn || btn.disabled) return;
      var pos = parseInt(btn.getAttribute('data-pos'), 10);
      var dir = parseInt(btn.getAttribute('data-dir'), 10);
      var np  = pos + dir;
      if (np < 0 || np >= order.length) return;
      var tmp = order[pos]; order[pos] = order[np]; order[np] = tmp;
      renderOrderList();
    };
  }

  function onSrcChange() {
    srcId = document.getElementById('dupe-src').value;
    var newOrder = getOrder(srcId);
    order.splice(0, order.length);
    newOrder.forEach(function(v) { order.push(v); });
    var srcCycle = cycles.filter(function(c) { return c.id === srcId; })[0];
    if (srcCycle) {
      var nameEl = document.getElementById('dupe-name');
      if (nameEl && !nameEl.value.trim()) {
        nameEl.value = srcCycle.name + ' (copy)';
      }
    }
    renderOrderList();
  }

  // Merge built-in and custom cycles for the source dropdown
  var allSrcCycles = BUILTIN_QUESTSETS.concat(
    cycles.filter(function(c) {
      return !BUILTIN_QUESTSETS.some(function(b){return b.id===c.id;});
    })
  );
  var srcOptions = allSrcCycles.map(function(c) {
    var cq = getCycleQuests(c.id);
    return '<option value="' + esc(c.id) + '">' + esc(c.name) +
      ' (' + cq.length + ' quest' + (cq.length !== 1 ? 's' : '') + ')</option>';
  }).join('');

  var fi = document.getElementById('form-inner');
  fi.innerHTML =
    '<div id="form-title-row">' +
    '<div id="form-heading">⧉ Duplicate Cycle</div>' +
    '</div>' +

    '<p style="font-size:.88em;color:var(--ink2);margin-bottom:18px;line-height:1.6">' +
    'Creates a copy of an existing cycle with all its quests. You can reorder the quests before creating. ' +
    'The original is unchanged — the copy is saved as a private draft.</p>' +

    '<div class="fsec">' +
    '<div class="fsec-title">Source</div>' +
    '<div class="fgrid">' +
    frow('Copy From', '<select id="dupe-src">' + srcOptions + '</select>') +
    '</div></div>' +

    '<div class="fsec">' +
    '<div class="fsec-title">New Cycle Identity</div>' +
    '<div class="fgrid">' +
    frow('New Cycle Name *', '<input type="text" id="dupe-name" placeholder="e.g. Shadows Rising">') +
    '</div>' +
    '<div class="fgrid" style="margin-top:10px">' +
    frow('Theme / Description', '<textarea id="dupe-theme" rows="2" placeholder="Describe this cycle&#39;s arc…"></textarea>') +
    '</div></div>' +

    '<div class="fsec">' +
    '<div class="fsec-title">Quest Order <span class="select-hint">(▲▼ to reorder — only affects the copy)</span></div>' +
    '<div class="dupe-list-wrap"><div id="dupe-list"></div></div>' +
    '</div>' +

    '<div id="action-row">' +
    '<button class="btn btn-save" id="dupe-create">⧉ Create Copy</button>' +
    '<span id="save-flash"></span>' +
    '</div>';

  // Wire source dropdown
  document.getElementById('dupe-src').onchange = onSrcChange;

  // Wire create button
  document.getElementById('dupe-create').onclick = function() {
    var name  = (document.getElementById('dupe-name').value || '').trim();
    var theme = (document.getElementById('dupe-theme').value || '').trim();
    if (!name) { alert('Please enter a name for the new cycle.'); return; }
    if (!order.length) { alert('The source cycle has no quests to copy.'); return; }

    var srcCycle = allSrcCycles.filter(function(c) { return c.id === srcId; })[0];
    var srcQuests = getCycleQuests(srcId);

    var newId = 'custom-' + Date.now();
    var newCycle = {
      id:        newId,
      name:      name,
      theme:     theme || ('Duplicated from "' + (srcCycle ? srcCycle.name : srcId) + '"'),
      published: false,
      cycleGate: {}
    };

    // Build new quests with reassigned idx values (0, 1, 2…)
    var newQuests = [];
    order.forEach(function(srcIdx, newIdx) {
      var srcQ = srcQuests.filter(function(q) { return q.idx === srcIdx; })[0];
      if (!srcQ) return;
      newQuests.push(Object.assign({}, srcQ, {
        setId:     newId,
        idx:       newIdx,
        _custom:   true,
        _editable: true,
        published: false,
        // Preserve capstone flag only if it was capstone AND it's still last
        capstone:  srcQ.capstone && newIdx === order.length - 1
      }));
    });

    // Update local state immediately
    cycles.push(newCycle);
    newQuests.forEach(function(q) { quests.push(q); });
    collapsed[newId] = false;

    // Save to Supabase: cycle row first, then all quest rows
    var cycleRow = cycleToRow(newCycle, cycles.length - 1);
    var questRows = newQuests.map(function(q, i) { return questToRow(q, i); });

    setStatus('Saving…');
    var btn = document.getElementById('dupe-create');
    btn.disabled = true;
    btn.textContent = 'Creating…';

    sbUpsert(cycleRow).then(function() {
      if (!questRows.length) return true;
      return sbUpsert(questRows);
    }).then(function() {
      sel = { kind: 'cycle', setId: newId };
      flash('✓ "' + name + '" created with ' + newQuests.length + ' quest' + (newQuests.length !== 1 ? 's' : '') + '');
      setStatus('Cycle "' + name + '" created with ' + newQuests.length + ' quests.');
      renderList();
      showCycleForm(newId);
    }).catch(function(err) {
      btn.disabled = false;
      btn.textContent = '⧉ Create Copy';
      alert('Save failed: ' + (err.message || err));
      setStatus('Save failed: ' + (err.message || err), '#e55');
    });
  };

  // Initialize with first available cycle
  srcId = allSrcCycles.length ? allSrcCycles[0].id : '';
  if (srcId) {
    getOrder(srcId).forEach(function(v) { order.push(v); });
    document.getElementById('dupe-name').value = allSrcCycles[0].name + ' (copy)';
    document.getElementById('dupe-src').value = srcId;
  }
  renderOrderList();
}
