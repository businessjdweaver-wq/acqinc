<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quest Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1d1209; --ink2:#4a3020; --parch:#f4e8c1; --parch2:#e8d5a0;
  --gold:#c9922a; --gold2:#f0b429; --crimson:#8b1a1a; --forest:#2d5016;
  --purple:#6655aa; --teal:#1a6b8a;
  --border:rgba(201,146,42,.3); --border2:rgba(201,146,42,.15);
  --shadow:rgba(44,26,14,.25);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Text',Georgia,serif;background:#1a0d04;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(201,146,42,.08),transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(139,26,26,.06),transparent 60%),#f4e8c1;
  z-index:0;pointer-events:none;}

/* ── Layout ── */
#app{position:relative;z-index:1;width:100%;max-width:900px;min-height:100vh;
  display:grid;grid-template-rows:auto 1fr;padding:0;}

/* ── Header ── */
#hdr{background:linear-gradient(135deg,#1a0d04,#2c1a0e);color:var(--gold2);
  padding:10px 20px;display:flex;align-items:center;gap:16px;
  border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100;}
#hdr h1{font-family:'Cinzel',serif;font-size:1em;letter-spacing:.08em;flex:1;
  text-transform:uppercase;}
#login-area{display:flex;align-items:center;gap:8px;font-size:.82em;}
#user-email{color:rgba(240,180,41,.7);font-size:.78em;}
.hbtn{background:rgba(255,255,255,.1);border:1px solid rgba(201,146,42,.4);
  border-radius:4px;padding:4px 12px;color:var(--gold2);font-size:.78em;
  cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.03em;
  transition:background .12s;}
.hbtn:hover{background:rgba(255,255,255,.2);}
.hbtn.danger{border-color:rgba(255,100,100,.4);color:#ffaaaa;}

/* ── Main split ── */
#main{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 46px);}

/* ── Sidebar (list) ── */
#sidebar{border-right:1px solid var(--border);background:rgba(244,232,193,.6);
  display:flex;flex-direction:column;overflow:hidden;}
#sidebar-hdr{padding:10px 12px 8px;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:6px;flex-shrink:0;}
#sidebar-hdr h2{font-family:'Cinzel',serif;font-size:.72em;text-transform:uppercase;
  letter-spacing:.06em;color:var(--ink2);flex:1;}
.icon-btn{background:none;border:1px solid var(--border);border-radius:4px;
  width:26px;height:26px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:.85em;color:var(--ink2);
  transition:background .12s,border-color .12s;}
.icon-btn:hover{background:rgba(201,146,42,.15);border-color:var(--gold);}
#list-scroll{flex:1;overflow-y:auto;}

/* Cycle groups */
.cycle-group{border-bottom:1px solid var(--border2);}
.cycle-hdr{display:flex;align-items:center;gap:6px;padding:7px 10px 6px;
  background:rgba(201,146,42,.08);cursor:pointer;user-select:none;
  transition:background .1s;}
.cycle-hdr:hover{background:rgba(201,146,42,.15);}
.cycle-toggle{font-size:.65em;color:var(--gold);width:14px;text-align:center;
  flex-shrink:0;transition:transform .15s;}
.cycle-toggle.open{transform:rotate(90deg);}
.cycle-name{font-family:'Cinzel',serif;font-size:.72em;text-transform:uppercase;
  letter-spacing:.04em;color:var(--ink2);flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cycle-count{font-size:.65em;color:var(--ink2);opacity:.5;}
.cycle-pub{font-size:.6em;padding:1px 5px;border-radius:3px;flex-shrink:0;}
.cycle-pub.pub{background:rgba(45,80,22,.15);color:var(--forest);
  border:1px solid rgba(45,80,22,.3);}
.cycle-pub.unpub{background:rgba(74,48,32,.12);color:var(--ink2);
  border:1px solid var(--border2);}

/* Quest rows */
.quest-rows{display:none;}
.quest-rows.open{display:block;}
.quest-row{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 22px;
  cursor:pointer;border-left:3px solid transparent;transition:background .1s;}
.quest-row:hover{background:rgba(201,146,42,.08);}
.quest-row.sel{background:rgba(139,26,26,.07);border-left-color:var(--crimson);}
.quest-row-title{flex:1;font-size:.86em;color:var(--ink);min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.quest-row.sel .quest-row-title{color:var(--crimson);font-weight:600;}
.qbadge{font-size:.58em;padding:1px 4px;border-radius:3px;flex-shrink:0;
  border:1px solid var(--border2);color:var(--ink2);}
.qbadge.custom{border-color:var(--crimson);color:var(--crimson);}
.qbadge.cap{border-color:var(--gold);color:var(--gold);}

/* Empty state */
.tab-btn.active{border-bottom-color:var(--gold)!important;background:rgba(201,146,42,.1)!important;color:var(--gold)!important;}
.tab-btn:hover:not(.active){background:rgba(201,146,42,.06)!important;}
.list-empty{padding:20px 14px;font-size:.85em;color:var(--ink2);
  font-style:italic;text-align:center;}

/* ── Form panel ── */
#form-panel{overflow-y:auto;background:var(--parch);}
#form-inner{padding:20px 24px 40px;max-width:640px;}

/* Placeholder */
#placeholder{display:flex;align-items:center;justify-content:center;
  height:100%;color:var(--ink2);font-style:italic;font-size:.95em;
  flex-direction:column;gap:12px;text-align:center;padding:40px;}
#placeholder svg{opacity:.3;}

/* Form sections */
.fsec{margin-bottom:20px;}
.fsec-title{font-family:'Cinzel',serif;font-size:.68em;text-transform:uppercase;
  letter-spacing:.06em;color:var(--gold);border-bottom:1px solid var(--border2);
  padding-bottom:4px;margin-bottom:12px;}
.fgrid{display:grid;gap:12px;}
.fgrid.c2{grid-template-columns:1fr 1fr;}
.fgrid.c3{grid-template-columns:1fr 1fr 1fr;}
.frow{display:flex;flex-direction:column;gap:4px;}
.flbl{font-family:'Cinzel',serif;font-size:.65em;text-transform:uppercase;
  letter-spacing:.04em;color:var(--ink2);}
input[type=text],input[type=number],select,textarea{
  width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:5px;
  background:rgba(255,255,255,.6);color:var(--ink);font-family:'Crimson Text',serif;
  font-size:.95em;transition:border-color .12s,box-shadow .12s;}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,146,42,.15);}
textarea{resize:vertical;min-height:70px;line-height:1.5;}
select{cursor:pointer;}

/* Multi-select */
select[multiple]{height:90px;padding:4px 6px;}
select[multiple] option{padding:3px 6px;border-radius:3px;}
.select-hint{font-size:.72em;color:var(--ink2);margin-top:2px;}

/* Checkbox row */
.chk-row{display:flex;align-items:center;gap:8px;cursor:pointer;}
.chk-row input[type=checkbox]{width:1.2em;height:1.2em;accent-color:var(--forest);
  cursor:pointer;flex-shrink:0;}
.chk-label{font-size:.9em;color:var(--ink);}

/* Publish toggle */
#pub-row{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(201,146,42,.07);border:1px solid var(--border);
  border-radius:6px;margin-bottom:16px;}
#pub-chk{width:1.3em;height:1.3em;accent-color:var(--forest);cursor:pointer;}
#pub-label{font-size:.9em;cursor:pointer;flex:1;}
#pub-label span{font-family:'Cinzel',serif;font-size:.8em;text-transform:uppercase;
  letter-spacing:.03em;}

/* Action row */
#action-row{display:flex;gap:10px;align-items:center;padding-top:8px;flex-wrap:wrap;}
.btn{padding:8px 20px;border:none;border-radius:5px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:.82em;letter-spacing:.04em;
  transition:opacity .12s,transform .06s;}
.btn:active{transform:scale(.97);}
.btn-save{background:var(--forest);color:#fff;}
.btn-save:hover{opacity:.88;}
.btn-del{background:var(--crimson);color:#fff;}
.btn-del:hover{opacity:.88;}
.btn-new{background:rgba(201,146,42,.2);color:var(--ink);
  border:1px solid var(--gold);}
.btn-new:hover{background:rgba(201,146,42,.35);}
#save-flash{font-size:.82em;color:var(--forest);font-weight:700;
  opacity:0;transition:opacity .4s;}

/* Form header */
#form-title-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
#form-heading{font-family:'Cinzel',serif;font-size:1.05em;color:var(--crimson);flex:1;}
.builtin-badge{font-size:.7em;background:rgba(201,146,42,.12);
  border:1px solid var(--gold);border-radius:4px;padding:2px 8px;color:var(--gold);}

/* Status bar */
#status-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:900px;background:rgba(26,13,4,.9);
  border-top:1px solid var(--border2);padding:4px 16px;
  font-size:.75em;color:rgba(240,180,41,.6);z-index:50;
  display:flex;align-items:center;gap:8px;}
#status-msg{flex:1;}

/* Login overlay */
#login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:20px;}
#login-box{background:var(--parch);border:2px solid var(--gold);border-radius:10px;
  padding:24px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.5);}
#login-box h2{font-family:'Cinzel',serif;color:var(--crimson);margin-bottom:16px;
  font-size:1.1em;}
.login-field{margin-bottom:12px;}
.login-field label{display:block;font-family:'Cinzel',serif;font-size:.7em;
  text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);margin-bottom:4px;}
.login-btns{display:flex;gap:8px;margin-top:16px;}
#login-status{margin-top:8px;font-size:.82em;min-height:1.2em;}
.test-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.test-pill{padding:3px 8px;background:rgba(201,146,42,.15);border:1px solid var(--border);
  border-radius:3px;font-size:.72em;cursor:pointer;color:var(--ink2);
  transition:background .1s;}
.test-pill:hover{background:rgba(201,146,42,.3);}

/* Dupe quest list */
.dupe-row{display:flex;align-items:center;gap:10px;padding:9px 14px;
  border-bottom:1px solid var(--border2);}
.dupe-row:last-child{border-bottom:none;}
.dupe-row:nth-child(odd){background:rgba(44,26,14,.03);}
.dupe-pos{font-size:.75em;color:var(--ink2);min-width:22px;text-align:right;}
.dupe-title{flex:1;font-size:.9em;}
.dupe-type{font-size:.82em;color:var(--ink2);}
.dupe-mvs{display:flex;flex-direction:column;gap:2px;}
.dupe-mv{background:none;border:1px solid var(--border);border-radius:3px;
  padding:1px 6px;cursor:pointer;font-size:.72em;color:var(--ink2);
  transition:background .1s;}
.dupe-mv:hover:not(:disabled){background:rgba(201,146,42,.2);}
.dupe-mv:disabled{opacity:.25;cursor:default;}
.dupe-list-wrap{border:1px solid var(--border);border-radius:6px;
  overflow:hidden;margin-bottom:16px;max-height:320px;overflow-y:auto;}

/* Responsive */

@media(max-width:600px){
  #main{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  #sidebar{max-height:40vh;border-right:none;border-bottom:1px solid var(--border);}
  #form-inner{padding:16px 16px 80px;}
}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <h1>⚔ Quest Editor</h1>
    <div id="login-area">
      <span id="user-email"></span>
      <button class="hbtn" id="btn-logout" style="display:none" onclick="doLogout()">Log Out</button>
    </div>
  </div>
  <div id="main">
    <div id="sidebar">
      <div id="sidebar-hdr">
        <h2>Quest Cycles</h2>
        <button class="icon-btn" id="btn-pull" title="Pull from Supabase">↓</button>
        <button class="icon-btn" id="btn-new-cycle" title="New cycle">+ Cycle</button>
        <button class="icon-btn" id="btn-new-quest" title="New quest" style="display:none">+ Quest</button>
        <button class="icon-btn" id="btn-new-pet" title="New pet" style="display:none">+ Pet</button>
        <button class="icon-btn" id="btn-dupe-cycle" title="Duplicate a cycle">⧉</button>
      </div>
      <div id="tab-bar" style="display:flex;border-bottom:1px solid var(--border2);flex-shrink:0">
        <button class="tab-btn active" data-tab="quests" style="flex:1;padding:6px 4px;font-family:'Cinzel',serif;font-size:.65em;text-transform:uppercase;letter-spacing:.04em;border:none;border-bottom:2px solid var(--gold);background:rgba(201,146,42,.1);color:var(--gold);cursor:pointer">⚔ Quests</button>
        <button class="tab-btn" data-tab="pets" style="flex:1;padding:6px 4px;font-family:'Cinzel',serif;font-size:.65em;text-transform:uppercase;letter-spacing:.04em;border:none;border-bottom:2px solid transparent;background:none;color:var(--ink2);cursor:pointer">🐾 Pets</button>
      </div>
      <div id="list-scroll">
        <div class="list-empty">Log in to load your quests.</div>
      </div>
    </div>
    <div id="form-panel">
      <div id="form-inner">
        <div id="placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10,9 9,9 8,9"/>
          </svg>
          Select a quest from the list, or create a new one.
        </div>
      </div>
    </div>
  </div>
</div>

<div id="status-bar">
  <span id="status-msg">Not logged in.</span>
</div>

<div id="login-overlay">
  <div id="login-box">
    <h2>⚔ Quest Editor Login</h2>
    <div class="test-pills" id="test-pills"></div>
    <div class="login-field">
      <label>Email</label>
      <input type="text" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Password">
    </div>
    <div class="login-btns">
      <button class="btn btn-save" onclick="doLogin()">Log In</button>
      <button class="btn btn-new" onclick="doRegister()">Register</button>
    </div>
    <div id="login-status"></div>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════
// SUPABASE CONFIG
// ══════════════════════════════════════════════════
var SB_URL = 'https://burtvenqfzextswpjziw.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1cnR2ZW5xZnpleHRzd3Bqeml3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTkxMzEsImV4cCI6MjA5MDgzNTEzMX0.M9krIdktkO1wMeKYMm_HoR_tEykewbRUVHdjerg1XIo';

var currentUser = null;

function uid() {
  return currentUser && currentUser.user ? currentUser.user.id : null;
}
function userEmail() {
  return currentUser && currentUser.user ? currentUser.user.email : '';
}
function isSessionExpiringSoon() {
  if (!currentUser || !currentUser.expires_at) return false;
  return (Date.now() + 60000) >= (currentUser.expires_at * 1000);
}
function persistSession() {
  try {
    if (currentUser) localStorage.setItem('qed_auth', JSON.stringify(currentUser));
    else localStorage.removeItem('qed_auth');
  } catch(e) {}
}
function restoreSession() {
  try {
    var raw = localStorage.getItem('qed_auth');
    if (raw) currentUser = JSON.parse(raw);
  } catch(e) {}
}
function sbHeaders() {
  var h = { 'Content-Type': 'application/json', 'apikey': SB_KEY };
  if (currentUser && currentUser.access_token)
    h.Authorization = 'Bearer ' + currentUser.access_token;
  else
    h.Authorization = 'Bearer ' + SB_KEY;
  return h;
}
function refreshSession(force) {
  if (!currentUser || !currentUser.refresh_token) return Promise.resolve(currentUser);
  if (!force && !isSessionExpiringSoon()) return Promise.resolve(currentUser);
  return fetch(SB_URL + '/auth/v1/token?grant_type=refresh_token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
    body: JSON.stringify({ refresh_token: currentUser.refresh_token })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.access_token) { currentUser = d; persistSession(); }
    return currentUser;
  }).catch(function() { return currentUser; });
}
function sbFetch(url, opts) {
  opts = opts || {};
  return refreshSession(false).catch(function() { return currentUser; }).then(function() {
    var req = Object.assign({}, opts);
    req.headers = Object.assign({}, sbHeaders(), opts.headers || {});
    return fetch(url, req);
  });
}
function sbGet(params) {
  return sbFetch(SB_URL + '/rest/v1/content_items?' + params, { method: 'GET' })
    .then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error('GET ' + r.status + ': ' + t); });
      return r.json();
    });
}
function sbUpsert(rows) {
  return sbFetch(
    SB_URL + '/rest/v1/content_items?on_conflict=content_key,owner_user_id,content_type',
    {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(Array.isArray(rows) ? rows : [rows])
    }
  ).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error('UPSERT ' + r.status + ': ' + t); });
    return true;
  });
}
function sbDelete(filter) {
  return sbFetch(SB_URL + '/rest/v1/content_items?' + filter, { method: 'DELETE' })
    .then(function(r) {
      if (!r.ok && r.status !== 404)
        return r.text().then(function(t) { throw new Error('DEL ' + r.status + ': ' + t); });
      return true;
    });
}

// ══════════════════════════════════════════════════
// AUTH UI
// ══════════════════════════════════════════════════
function setStatus(msg, color) {
  var el = document.getElementById('status-msg');
  if (el) { el.textContent = msg; el.style.color = color || 'rgba(240,180,41,.6)'; }
}
function setLoginStatus(msg, isErr) {
  var el = document.getElementById('login-status');
  if (el) { el.textContent = msg; el.style.color = isErr ? '#e55' : '#666'; }
}
function showApp() {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('user-email').textContent = userEmail();
  document.getElementById('btn-logout').style.display = '';
  setStatus('Logged in as ' + userEmail());
  pullData();
}
function showLogin() {
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('user-email').textContent = '';
  document.getElementById('btn-logout').style.display = 'none';
  setStatus('Not logged in.');
  renderList();
}
async function doLogin() {
  var email = document.getElementById('email').value.trim();
  var pass  = document.getElementById('password').value;
  if (!email || !pass) { setLoginStatus('Enter email and password.', true); return; }
  setLoginStatus('Logging in…', false);
  try {
    var r = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
      body: JSON.stringify({ email, password: pass })
    });
    var d = await r.json();
    if (!r.ok) throw new Error(d.error_description || 'Login failed');
    currentUser = d;
    persistSession();
    showApp();
  } catch(err) {
    setLoginStatus(err.message || 'Login failed', true);
  }
}
async function doRegister() {
  var email = document.getElementById('email').value.trim();
  var pass  = document.getElementById('password').value;
  if (!email || !pass) { setLoginStatus('Enter email and password.', true); return; }
  setLoginStatus('Creating account…', false);
  var r = await fetch(SB_URL + '/auth/v1/signup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
    body: JSON.stringify({ email, password: pass })
  });
  var d = await r.json();
  if (!r.ok) { setLoginStatus(d.msg || d.error_description || 'Failed', true); return; }
  setLoginStatus('Account created — now log in.', false);
}
function doLogout() {
  currentUser = null;
  persistSession();
  showLogin();
}
window.doLogin    = doLogin;
window.doRegister = doRegister;
window.doLogout   = doLogout;

// ══════════════════════════════════════════════════
// BUILT-IN QUEST SETS (embedded from main app)
// ══════════════════════════════════════════════════
var QUESTSETS=[

  // ══════════════════════════════════════════
  //  MONTH 1 — Root & Branch (Tier 1)
  // ══════════════════════════════════════════
  {
    id:'root-and-branch',
    name:'Root & Branch',
    theme:'Establishing the local franchise — making allies, clearing threats, exploring nearby ruins.',
    dndTier:1,
    capstoneIdx:9, // index within this set's quests array
    quests:[
      {idx:0,tier:'common',type:'social',title:'The Welcome Banquet',
       desc:'Introduce your franchise to the guild council. First impressions set the tone for everything that follows.',
       baseGp:25,reward:'Guild favour token',

// SUPABASE LOAD
// ══════════════════════════════════════════════════
function pullData() {
  if (!uid()) return;
  setStatus('Loading…');
  var filter = 'select=*' +
    '&owner_user_id=eq.' + encodeURIComponent(uid()) +
    '&content_type=in.(quest_set,quest,pet)' +
    '&order=sort_order.asc';
  return sbGet(filter).then(function(rows) {
    cycles = [];
    quests = [];
    pets   = [];
    (rows || []).forEach(function(row) {
      var d = row.data || {};
      // Strip fields that the main app embeds into data (stale/internal)
      delete d._dbId; delete d._ownerUserId; delete d._published;
      delete d._visibility; delete d._editable;
      // Set fresh fields from the row itself
      d._dbId       = row.id;
      d._visibility = row.visibility;
      d.published   = (row.visibility === 'shared' || row.visibility === 'official');
      if (row.content_type === 'quest_set') {
        if (!d.cycleGate) d.cycleGate = {};
        cycles.push(d);
      } else if (row.content_type === 'quest') {
        quests.push(d);
      } else if (row.content_type === 'pet') {
        // Tombstones (_deleted) are always unpublished in the editor
        d.published = !d._deleted && (row.visibility === 'shared' || row.visibility === 'official');
        d._tombstone = !!d._deleted; // flag for showPetForm
        pets.push(d);
      }
    });
    // Default: collapse all cycles
    cycles.forEach(function(c) {
      if (!(c.id in collapsed)) collapsed[c.id] = true;
    });
    setStatus('Loaded ' + cycles.length + ' cycles, ' + quests.length + ' quests, ' + pets.length + ' custom pets.');
    renderList();
  }).catch(function(err) {
    setStatus('Load failed: ' + (err.message || err), '#e55');
    renderList();
  });
}

// ══════════════════════════════════════════════════
// SAVE HELPERS
// ══════════════════════════════════════════════════
function cycleToRow(cycle, idx) {
  var pub = cycle.published ? 'shared' : 'private';
  var data = {
    id:        cycle.id,
    name:      cycle.name,
    theme:     cycle.theme || ''
  };
  if (cycle.territory) data.territory = cycle.territory;
  if (cycle.cycleGate) data.cycleGate = cycle.cycleGate;
  return {
    content_type:  'quest_set',
    content_key:   cycle.id,
    title:         cycle.name || cycle.id,
    data:          data,
    visibility:    pub,
    status:        'published',
    owner_user_id: uid(),
    sort_order:    idx || 0
  };
}
function petToRow(p, idx, visOverride) {
  var vis = visOverride || (p.published ? 'shared' : 'private');
  var data = Object.assign({}, p);
  delete data._dbId; delete data.published; delete data._visibility;
  return {
    content_type:  'pet',
    content_key:   'pet::' + (p.name || ('pet-' + idx)),
    title:         p.name || ('Pet ' + idx),
    data:          data,
    visibility:    vis,
    status:        'published',
    owner_user_id: uid(),
    sort_order:    idx || 0
  };
}

function questToRow(q, idx) {
  var pub = q.published ? 'shared' : 'private';
  var data = Object.assign({}, q);
  delete data._dbId;
  delete data.published;
  delete data._visibility;
  return {
    content_type:  'quest',
    content_key:   q.setId + '::' + q.idx,
    title:         q.title || ('Quest ' + q.idx),
    data:          data,
    visibility:    pub,
    status:        'published',
    owner_user_id: uid(),
    sort_order:    typeof idx === 'number' ? idx : (q.idx || 0)
  };
}

function saveCycle(cycle) {
  var idx = cycles.indexOf(cycle);
  return sbUpsert(cycleToRow(cycle, idx)).then(function() {
    flash('✓ Cycle saved');
    setStatus('Cycle "' + cycle.name + '" saved.');
  });
}
function saveQuest(q) {
  return sbUpsert(questToRow(q)).then(function() {
    flash('✓ Quest saved');
    setStatus('Quest "' + q.title + '" saved.');
  });
}
function savePet(p) {
  var idx = pets.indexOf(p);
  return sbUpsert(petToRow(p, idx < 0 ? pets.length : idx)).then(function() {
    flash('✓ Pet saved');
    setStatus('Pet "' + p.name + '" saved.');
  });
}
function deletePet(p) {
  var filter = 'content_type=eq.pet' +
    '&content_key=eq.' + encodeURIComponent('pet::' + p.name) +
    '&owner_user_id=eq.' + encodeURIComponent(uid());
  return sbDelete(filter).then(function() {
    pets = pets.filter(function(x) { return x !== p; });
    sel = null;
    setStatus('Pet "' + p.name + '" deleted.');
    renderList();
    showPlaceholder();
  });
}

function deleteQuest(q) {
  var key = q.setId + '::' + q.idx;
  var filter = 'content_type=eq.quest' +
    '&content_key=eq.' + encodeURIComponent(key) +
    '&owner_user_id=eq.' + encodeURIComponent(uid());
  return sbDelete(filter).then(function() {
    quests = quests.filter(function(x) { return x !== q; });
    sel = null;
    setStatus('Quest deleted.');
    renderList();
    showPlaceholder();
  });
}
function deleteCycle(cycle) {
  // Delete the cycle set row
  var filter = 'content_type=eq.quest_set' +
    '&content_key=eq.' + encodeURIComponent(cycle.id) +
    '&owner_user_id=eq.' + encodeURIComponent(uid());
  // Also delete all quest rows for this cycle
  var qFilter = 'content_type=eq.quest' +
    '&content_key=like.' + encodeURIComponent(cycle.id + '::%') +
    '&owner_user_id=eq.' + encodeURIComponent(uid());
  return Promise.all([sbDelete(filter), sbDelete(qFilter)]).then(function() {
    cycles = cycles.filter(function(c) { return c !== cycle; });
    quests = quests.filter(function(q) { return q.setId !== cycle.id; });
    sel = null;
    setStatus('Cycle "' + cycle.name + '" deleted.');
    renderList();
    showPlaceholder();
  });
}

function flash(msg) {
  var el = document.getElementById('save-flash');
  if (!el) return;
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0'; }, 1800);
}

// ══════════════════════════════════════════════════
// LIST RENDERING
// ══════════════════════════════════════════════════
function renderPetList() {
  var el = document.getElementById('list-scroll');
  if (!uid()) { el.innerHTML = '<div class="list-empty">Log in to load pets.</div>'; return; }

  // Merge: built-ins overridden by custom pets
  var allPets = BUILTIN_PETS.slice();
  pets.forEach(function(p) {
    var idx = allPets.findIndex(function(b) { return b.name === p.name; });
    if (idx >= 0) allPets[idx] = p; else allPets.push(p);
  });
  if (!allPets.length) {
    el.innerHTML = '<div class="list-empty">No pets yet.</div>';
    return;
  }

  var rarOrder = ['common','uncommon','rare','veryrare'];
  var rarLabels = { common:'Common', uncommon:'Uncommon', rare:'Rare', veryrare:'Very Rare' };
  var html = '';
  rarOrder.forEach(function(rar) {
    var group = allPets.filter(function(p) { return (p.rar||'common') === rar; });
    if (!group.length) return;
    html += '<div style="padding:6px 12px 3px;font-family:\'Cinzel\',serif;font-size:.7em;' +
      'text-transform:uppercase;letter-spacing:.05em;color:var(--gold);' +
      'border-top:1px solid var(--border2);margin-top:4px">' + rarLabels[rar] + '</div>';
    group.forEach(function(p) {
      var isCustom = !!p._custom;
      var isSel = sel && sel.kind === 'pet' && sel.name === p.name;
      html += '<div class="quest-row ' + (isSel ? 'sel' : '') + '" data-sel-pet="' + esc(p.name) + '">' +
        '<span style="margin-right:4px">' + (p.ic || '🐾') + '</span>' +
        '<span class="quest-row-title">' + esc(p.name) + '</span>' +
        (isCustom ? '<span class="qbadge custom">custom</span>' :
          '<span class="qbadge">built-in</span>') +
        '</div>';
    });
  });
  el.innerHTML = html;
  el.onclick = function(e) {
    var row = e.target.closest('[data-sel-pet]');
    if (!row) return;
    var name = row.getAttribute('data-sel-pet');
    sel = { kind: 'pet', name: name };
    renderPetList();
    showPetForm(name);
  };
}

function renderList() {
  // Sync tab button states
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    var on = b.getAttribute('data-tab') === activeTab;
    b.classList.toggle('active', on);
    b.style.borderBottomColor = on ? 'var(--gold)' : 'transparent';
    b.style.background = on ? 'rgba(201,146,42,.1)' : 'none';
    b.style.color = on ? 'var(--gold)' : 'var(--ink2)';
  });
  // Show/hide quest-only controls
  var isQuests = activeTab === 'quests';
  document.getElementById('btn-dupe-cycle').style.display = isQuests ? '' : 'none';
  document.getElementById('btn-new-cycle').style.display  = isQuests ? '' : 'none';
  document.getElementById('btn-new-quest').style.display  = (isQuests && sel && (sel.kind==='cycle'||sel.kind==='quest')) ? '' : 'none';
  document.getElementById('btn-new-pet').style.display    = activeTab === 'pets' ? '' : 'none';
  if (activeTab === 'pets') { renderPetList(); return; }
  var el = document.getElementById('list-scroll');
  if (!uid()) {
    el.innerHTML = '<div class="list-empty">Log in to load your quests.</div>';
    document.getElementById('btn-new-quest').style.display = 'none';
    return;
  }
  if (!cycles.length) {
    el.innerHTML = '<div class="list-empty">No quest cycles yet.<br>Click "+ Cycle" to create one.</div>';
    document.getElementById('btn-new-quest').style.display = 'none';
    return;
  }

  var html = '';
  cycles.forEach(function(cycle) {
    var isOpen = !collapsed[cycle.id];
    var cycleQuests = quests
      .filter(function(q) { return q.setId === cycle.id; })
      .sort(function(a, b) { return (a.idx || 0) - (b.idx || 0); });
    var isCycleSel = sel && sel.kind === 'cycle' && sel.setId === cycle.id;
    var pubClass = cycle.published ? 'pub' : 'unpub';
    var pubLabel = cycle.published ? 'Published' : 'Draft';

    html += '<div class="cycle-group" data-setid="' + esc(cycle.id) + '">';
    html += '<div class="cycle-hdr" data-toggle="' + esc(cycle.id) + '">' +
      '<span class="cycle-toggle ' + (isOpen ? 'open' : '') + '">▶</span>' +
      '<span class="cycle-name">' + esc(cycle.name || 'Untitled Cycle') + '</span>' +
      '<span class="cycle-count">' + cycleQuests.length + '</span>' +
      '<span class="cycle-pub ' + pubClass + '">' + pubLabel + '</span>' +
      '</div>';

    html += '<div class="quest-rows ' + (isOpen ? 'open' : '') + '" data-setid="' + esc(cycle.id) + '">';
    // Cycle rules row
    html += '<div class="quest-row ' + (isCycleSel ? 'sel' : '') +
      '" data-sel-cycle="' + esc(cycle.id) + '" style="padding-left:14px;border-left-color:' +
      (isCycleSel ? 'var(--purple)' : 'transparent') + '">' +
      '<span class="quest-row-title" style="color:var(--ink2);font-style:italic">⚙ Cycle settings</span>' +
      '</div>';

    cycleQuests.forEach(function(q) {
      var isQSel = sel && sel.kind === 'quest' && sel.setId === cycle.id && sel.idx === q.idx;
      var badges = '';
      if (q._custom || q._editable) badges += '<span class="qbadge custom">custom</span>';
      if (q.capstone) badges += '<span class="qbadge cap">capstone</span>';
      html += '<div class="quest-row ' + (isQSel ? 'sel' : '') +
        '" data-sel-quest="' + esc(cycle.id) + '" data-idx="' + q.idx + '">' +
        '<span class="quest-row-title">' + esc(q.title || '(untitled)') + '</span>' +
        badges + '</div>';
    });

    html += '<div class="quest-row" data-new-quest="' + esc(cycle.id) +
      '" style="opacity:.6;font-style:italic;padding-left:22px">' +
      '<span class="quest-row-title" style="font-size:.82em">+ New quest</span></div>';

    html += '</div></div>';
  });

  el.innerHTML = html;

  // Show/hide the "New Quest" header button based on selection
  var hasSelCycle = sel && (sel.kind === 'cycle' || sel.kind === 'quest');
  document.getElementById('btn-new-quest').style.display = hasSelCycle ? '' : 'none';

  // Event delegation on the scroll container
  el.onclick = function(e) {
    // Toggle collapse
    var toggleEl = e.target.closest('[data-toggle]');
    if (toggleEl) {
      var sid = toggleEl.getAttribute('data-toggle');
      collapsed[sid] = !collapsed[sid];
      renderList();
      return;
    }
    // Select cycle settings
    var cycleRow = e.target.closest('[data-sel-cycle]');
    if (cycleRow && !cycleRow.hasAttribute('data-toggle')) {
      var sid = cycleRow.getAttribute('data-sel-cycle');
      sel = { kind: 'cycle', setId: sid };
      renderList();
      showCycleForm(sid);
      return;
    }
    // Select quest
    var questRow = e.target.closest('[data-sel-quest]');
    if (questRow) {
      var sid = questRow.getAttribute('data-sel-quest');
      var idx = parseInt(questRow.getAttribute('data-idx'), 10);
      sel = { kind: 'quest', setId: sid, idx: idx };
      renderList();
      showQuestForm(sid, idx);
      return;
    }
    // New quest inline
    var newQ = e.target.closest('[data-new-quest]');
    if (newQ) {
      var sid = newQ.getAttribute('data-new-quest');
      createNewQuest(sid);
      return;
    }
  };
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════
// PLACEHOLDER
// ══════════════════════════════════════════════════
function showPetForm(name) {
  // Find in custom pets first, then built-ins
  var p = pets.filter(function(x) { return x.name === name; })[0] ||
          BUILTIN_PETS.filter(function(x) { return x.name === name; })[0] || null;
  var isNew   = !p;
  var isBuiltin = p && !p._custom;

  var fi = document.getElementById('form-inner');
  fi.innerHTML =
    '<div id="form-title-row">' +
    '<div id="form-heading">' + (isNew ? '🐾 New Pet' : '🐾 ' + esc(p.name)) + '</div>' +
    (isBuiltin ? '<span class="builtin-badge">built-in</span>' : '') +
    '</div>' +

    pubRow(p && !isBuiltin && !p._tombstone ? !!p.published : false) +

    '<div class="fsec">' +
    '<div class="fsec-title">Identity</div>' +
    '<div style="display:grid;grid-template-columns:80px 1fr;gap:12px;align-items:start">' +
    frow('Icon', '<input type="text" id="pf-ic" value="' + esc(p ? p.ic : '🐾') + '" style="font-size:1.4em;text-align:center;padding:6px">') +
    frow('Name *', '<input type="text" id="pf-name" value="' + esc(p ? p.name : '') + '" placeholder="e.g. Shadow Cat">') +
    '</div>' +
    '<div class="fgrid" style="margin-top:10px">' +
    frow('Description *', '<textarea id="pf-desc" rows="3" placeholder="What does this pet do?">' + esc(p ? p.desc : '') + '</textarea>') +
    '</div></div>' +

    '<div class="fsec">' +
    '<div class="fsec-title">Stats</div>' +
    '<div class="fgrid c2">' +
    frow('Rarity', rarSelect('pf-rar', p ? p.rar : 'common')) +
    frow('Price (gp)', '<input type="number" id="pf-price" min="0" value="' + (p ? (p.price || 0) : 0) + '">') +
    '</div></div>' +

    '<div id="action-row">' +
    '<button class="btn btn-save" id="pf-save">💾 Save Pet</button>' +
    (!isNew && !isBuiltin ? '<button class="btn btn-del" id="pf-del">🗑 Delete</button>' : '') +
    (!isNew && isBuiltin  ? '<button class="btn btn-new" id="pf-revert" style="font-size:.78em">↩ Revert to Built-in</button>' : '') +
    '<button class="btn btn-new" id="pf-new" style="margin-left:auto">+ New Pet</button>' +
    '<span id="save-flash"></span>' +
    '</div>';

  document.getElementById('pf-save').onclick = function() {
    var nm   = (document.getElementById('pf-name').value || '').trim();
    var desc = (document.getElementById('pf-desc').value || '').trim();
    if (!nm || !desc) { alert('Name and description are required.'); return; }
    var isPublished = document.getElementById('pub-chk').checked;
    var builtIn = BUILTIN_PETS.filter(function(b) { return b.name === nm; })[0];
    // If there's a tombstone for this name, treat like a built-in override
    var existingTombstone = pets.filter(function(x) { return x.name === nm && x._tombstone; })[0];
    if (existingTombstone && !builtIn) builtIn = existingTombstone; // treat as built-in-like

    var newPet;
    var visOverride;

    if (builtIn && !isPublished) {
      // Unpublishing a built-in: save a SHARED tombstone so all devices
      // suppress it. Private rows are invisible to other devices, so
      // a private 'unpublished' flag would never reach them.
      newPet = {
        name: nm, ic: builtIn.ic, desc: builtIn.desc,
        rar: builtIn.rar, price: builtIn.price,
        type: 'pet', party: true,
        _custom: true, _deleted: true, published: false
      };
      visOverride = 'shared'; // must be shared so other devices can read it
    } else if (builtIn && isPublished) {
      // Publishing a built-in override: save shared so all devices see it
      newPet = {
        name: nm,
        ic:   (document.getElementById('pf-ic').value || '').trim() || builtIn.ic,
        desc: (document.getElementById('pf-desc').value || '').trim() || builtIn.desc,
        rar:  document.getElementById('pf-rar').value || builtIn.rar,
        price: Math.max(0, parseInt(document.getElementById('pf-price').value) || 0),
        type: 'pet', party: true,
        _custom: true, published: true
      };
      visOverride = 'shared';
    } else {
      // Pure custom pet: private = draft, shared = visible
      newPet = {
        name:      nm,
        ic:        (document.getElementById('pf-ic').value || '').trim() || '🐾',
        desc:      desc,
        rar:       document.getElementById('pf-rar').value || 'common',
        price:     Math.max(0, parseInt(document.getElementById('pf-price').value) || 0),
        type:      'pet',
        party:     true,
        _custom:   true,
        published: isPublished
      };
      visOverride = null; // petToRow decides based on published flag
    }

    // Update or add to local pets array
    var existing = pets.filter(function(x) { return x.name === (p ? p.name : nm); })[0];
    if (existing) {
      Object.assign(existing, newPet);
    } else {
      pets.push(newPet);
      existing = newPet;
    }

    // Save with correct visibility
    var pidx = pets.indexOf(existing);
    sbUpsert(petToRow(existing, pidx, visOverride)).then(function() {
      flash(builtIn && !isPublished ? '✓ Pet hidden from store' : '✓ Pet saved');
      setStatus('Pet "' + nm + '" ' + (builtIn && !isPublished ? 'hidden from store (tombstone saved).' : 'saved.'));
      return pullData();
    }).then(function() {
      sel = { kind: 'pet', name: nm };
      activeTab = 'pets';
      renderList();
      showPetForm(nm);
    }).catch(function(err) {
      alert('Save failed: ' + (err.message || err));
    });
  };

  if (!isNew && !isBuiltin) {
    document.getElementById('pf-del').onclick = function() {
      if (prompt('Type DELETE to confirm removing "' + p.name + '"') !== 'DELETE') {
        alert('Cancelled.'); return;
      }
      deletePet(p);
    };
  }
  if (!isNew && isBuiltin) {
    document.getElementById('pf-revert').onclick = function() {
      if (!confirm('Remove your customisation and restore the built-in "' + p.name + '"?')) return;
      deletePet(p).then(function() { showPetForm(p.name); });
    };
  }
  document.getElementById('pf-new').onclick = function() {
    sel = { kind: 'pet', name: null };
    renderPetList();
    showPetForm(null);
  };
}

function rarSelect(id, val) {
  return selEl(id, ['common','uncommon','rare','veryrare'], val);
}

function showPlaceholder() {
  document.getElementById('form-inner').innerHTML =
    '<div id="placeholder">' +
    '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
    '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>' +
    '<polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/>' +
    '<line x1="16" y1="17" x2="8" y2="17"/></svg>' +
    'Select a quest or cycle from the list, or create a new one.</div>';
}

// ══════════════════════════════════════════════════
// CYCLE FORM
// ══════════════════════════════════════════════════
function showCycleForm(setId) {
  var cycle = cycles.filter(function(c) { return c.id === setId; })[0];
  if (!cycle) return;

  var g = cycle.cycleGate || {};
  var fi = document.getElementById('form-inner');

  // Build the required-cycle dropdown options from other cycles
  var cycleOpts = '<option value="">— None —</option>' +
    cycles.filter(function(c) { return c.id !== cycle.id; }).map(function(c) {
      return '<option value="' + esc(c.id) + '"' +
        ((g.requiredCycleSetId || '') === c.id ? ' selected' : '') + '>' +
        esc(c.name) + '</option>';
    }).join('');

  fi.innerHTML =
    '<div id="form-title-row">' +
    '<div id="form-heading">⚙ Cycle Settings</div>' +
    '</div>' +

    pubRow(cycle.published) +

    // ── Identity ──
    '<div class="fsec">' +
    '<div class="fsec-title">Identity</div>' +
    '<div class="fgrid">' +
    frow('Cycle Name *', '<input type="text" id="cf-name" value="' + esc(cycle.name) + '" placeholder="e.g. Rising Reputation">') +
    '</div>' +
    '<div class="fgrid" style="margin-top:10px">' +
    frow('Description / Theme', '<textarea id="cf-theme" rows="2" placeholder="Optional flavour line">' + esc(cycle.theme || '') + '</textarea>') +
    '</div>' +
    '<div class="fgrid" style="margin-top:10px">' +
    frow('Territory <span class="select-hint">(squads in same territory can swap members)</span>',
      '<input type="text" id="cf-territory" value="' + esc(cycle.territory || '') + '" placeholder="e.g. Midlands, Coastal Reach">') +
    '</div></div>' +

    // ── Gate / Prerequisites ──
    '<div class="fsec">' +
    '<div class="fsec-title">Gate Rules <span class="select-hint">— control when this cycle becomes available on the Quest Map</span></div>' +
    '<div class="fgrid c2">' +
    frow('Visibility Mode',
      '<select id="cf-vis">' +
      '<option value="fully_visible"' + ((g.visibility || 'fully_visible') === 'fully_visible' ? ' selected' : '') + '>Always Visible (show even if locked)</option>' +
      '<option value="hidden"' + ((g.visibility === 'hidden' || g.visibility === 'obscured') ? ' selected' : '') + '>Hidden (only appears when requirements met)</option>' +
      '</select>') +
    frow('Required Completed Cycle',
      '<select id="cf-cycle-pre">' + cycleOpts + '</select>') +
    '</div>' +

    '<div class="fgrid c2" style="margin-top:10px">' +
    frow('Required Franchise Item',
      '<input type="text" id="cf-asset" value="' + esc(g.requiredAsset || '') + '" placeholder="e.g. Diving Bell">') +
    frow('Companion Requirement',
      '<select id="cf-comp-kind">' +
      '<option value="specific"' + ((g.requiredCompanionKind || 'specific') === 'specific' ? ' selected' : '') + '>Specific Mount/Vehicle Type</option>' +
      '<option value="mount"' + ((g.requiredCompanionKind) === 'mount' ? ' selected' : '') + '>Any Mount / Vehicle</option>' +
      '<option value="pet"' + ((g.requiredCompanionKind) === 'pet' ? ' selected' : '') + '>Any Pet</option>' +
      '</select>') +
    '</div>' +

    '<div class="fgrid c2" style="margin-top:10px">' +
    frow('Required Mount / Vehicle Type',
      '<input type="text" id="cf-mount-type" value="' + esc(g.requiredMountType || '') + '" placeholder="e.g. Mule">') +
    frow('Required Mount / Vehicle Count',
      '<input type="number" id="cf-mount-count" min="0" value="' + (parseInt(g.requiredMountCount, 10) || 0) + '">') +
    '</div>' +

    '<div class="fgrid c2" style="margin-top:10px">' +
    frow('Minimum Squad Size',
      '<input type="number" id="cf-squad-size" min="0" value="' + (parseInt(g.minSquadSize, 10) || 0) + '">') +
    frow('Minimum Average Squad Level',
      '<input type="number" id="cf-avg-level" min="0" step="0.1" value="' + (g.minAvgSquadLevel || 0) + '">') +
    '</div>' +
    '<div style="margin-top:10px;padding:8px 12px;background:rgba(139,26,26,.06);border:1px solid rgba(139,26,26,.15);border-radius:5px;font-size:.82em;color:var(--ink2)">Leave numeric fields at 0 and text fields blank to disable those gate conditions.</div>' +
    '</div>' +

    '<div id="action-row">' +
    '<button class="btn btn-save" id="cf-save">💾 Save Cycle</button>' +
    '<button class="btn btn-del" id="cf-del">🗑 Delete Cycle</button>' +
    '<span id="save-flash"></span>' +
    '</div>';

  document.getElementById('cf-save').onclick = function() {
    var name = (document.getElementById('cf-name').value || '').trim();
    if (!name) { alert('Cycle name is required.'); return; }
    cycle.name      = name;
    cycle.theme     = (document.getElementById('cf-theme').value || '').trim();
    cycle.territory = (document.getElementById('cf-territory').value || '').trim() || undefined;
    cycle.published = document.getElementById('pub-chk').checked;

    // Build cycleGate — omit empty/zero values
    var gate = {};
    var vis = document.getElementById('cf-vis').value;
    if (vis && vis !== 'fully_visible') gate.visibility = vis;
    else gate.visibility = 'fully_visible';

    var cyclePre = document.getElementById('cf-cycle-pre').value;
    if (cyclePre) gate.requiredCycleSetId = cyclePre;

    var asset = (document.getElementById('cf-asset').value || '').trim();
    if (asset) gate.requiredAsset = asset;

    var compKind = document.getElementById('cf-comp-kind').value;
    gate.requiredCompanionKind = compKind || 'specific';

    var mountType = (document.getElementById('cf-mount-type').value || '').trim();
    if (mountType) gate.requiredMountType = mountType;

    var mountCount = Math.max(0, parseInt(document.getElementById('cf-mount-count').value, 10) || 0);
    if (mountCount) gate.requiredMountCount = mountCount;

    var squadSize = Math.max(0, parseInt(document.getElementById('cf-squad-size').value, 10) || 0);
    if (squadSize) gate.minSquadSize = squadSize;

    var avgLevel = Math.max(0, parseFloat(document.getElementById('cf-avg-level').value) || 0);
    if (avgLevel) gate.minAvgSquadLevel = avgLevel;

    cycle.cycleGate = gate;
    saveCycle(cycle).then(function() {
      renderList();
      showCycleForm(cycle.id); // re-render form to confirm saved values
    });
  };
  document.getElementById('cf-del').onclick = function() {
    var cycleQuests = quests.filter(function(q) { return q.setId === cycle.id; });
    var msg = 'Delete cycle "' + cycle.name + '"';
    if (cycleQuests.length) msg += ' and its ' + cycleQuests.length + ' quest(s)?';
    msg += '\n\nType DELETE to confirm.';
    if (prompt(msg) !== 'DELETE') { alert('Cancelled.'); return; }
    deleteCycle(cycle);
  };
}

// ══════════════════════════════════════════════════
// QUEST FORM
// ══════════════════════════════════════════════════
function showQuestForm(setId, idx) {
  var q = quests.filter(function(x) { return x.setId === setId && x.idx === idx; })[0];
  if (!q) return;
  var cycle = cycles.filter(function(c) { return c.id === setId; })[0];

  var fi = document.getElementById('form-inner');
  fi.innerHTML =
    '<div id="form-title-row">' +
    '<div id="form-heading">Quest</div>' +
    (cycle ? '<span style="font-size:.78em;color:var(--ink2)">in ' + esc(cycle.name) + '</span>' : '') +
    '</div>' +

    pubRow(q.published) +

    // ── Core ──
    '<div class="fsec">' +
    '<div class="fsec-title">Core</div>' +
    '<div class="fgrid">' +
    frow('Title *', '<input type="text" id="qf-title" value="' + esc(q.title || '') + '" placeholder="Quest title…">') +
    '</div>' +
    '<div class="fgrid" style="margin-top:10px">' +
    frow('Description *', '<textarea id="qf-desc" rows="3" placeholder="Quest description…">' + esc(q.desc || '') + '</textarea>') +
    '</div>' +
    '<div class="fgrid c3" style="margin-top:10px">' +
    frow('Type', typeSelect('qf-type', q.type)) +
    frow('Difficulty', diffSelect('qf-diff', q.difficulty)) +
    frow('Base GP', '<input type="number" id="qf-gp" min="0" value="' + (q.baseGp || 40) + '">') +
    '</div>' +
    '<div class="fgrid c2" style="margin-top:10px">' +
    frow('Terrain', terrainSelect('qf-terrain', q.terrain)) +
    frow('Min Squad Size', '<input type="number" id="qf-squad" min="0" value="' + (q.squadReqMin || 0) + '">') +
    '</div>' +
    '</div>' +

    // ── Prerequisites ──
    '<div class="fsec">' +
    '<div class="fsec-title">Prerequisites</div>' +
    '<div class="fgrid c2">' +
    frow('Skills <span class="select-hint">(Ctrl/⌘ for multi)</span>',
      multiSelect('qf-skills', DND_SKILLS, q.pre && q.pre.skills)) +
    frow('Tools <span class="select-hint">(Ctrl/⌘ for multi)</span>',
      multiSelect('qf-tools', DND_TOOLS, q.pre && q.pre.tools)) +
    '</div>' +
    '<div class="fgrid c2" style="margin-top:10px">' +
    frow('Languages <span class="select-hint">(Ctrl/⌘ for multi)</span>',
      multiSelect('qf-lang', DND_LANG, q.pre && q.pre.lang)) +
    frow('Gold Requirement (gp)', '<input type="number" id="qf-gold" min="0" value="' + ((q.pre && q.pre.gold) || 0) + '">') +
    '</div>' +
    '</div>' +

    // ── Flags ──
    '<div class="fsec">' +
    '<div class="fsec-title">Flags</div>' +
    '<div style="display:flex;flex-direction:column;gap:10px">' +
    '<label class="chk-row"><input type="checkbox" id="qf-capstone"' + (q.capstone ? ' checked' : '') + '>' +
    '<span class="chk-label">This is the cycle\'s capstone (final) quest</span></label>' +
    '</div></div>' +

    '<div id="action-row">' +
    '<button class="btn btn-save" id="qf-save">💾 Save Quest</button>' +
    '<button class="btn btn-del" id="qf-del">🗑 Delete Quest</button>' +
    '<span id="save-flash"></span>' +
    '</div>';

  document.getElementById('qf-save').onclick = function() {
    var title = (document.getElementById('qf-title').value || '').trim();
    var desc  = (document.getElementById('qf-desc').value || '').trim();
    if (!title || !desc) { alert('Title and description are required.'); return; }
    q.title       = title;
    q.desc        = desc;
    q.type        = document.getElementById('qf-type').value;
    q.difficulty  = document.getElementById('qf-diff').value;
    q.baseGp      = parseInt(document.getElementById('qf-gp').value) || 40;
    q.terrain     = document.getElementById('qf-terrain').value || 'none';
    q.squadReqMin = Math.max(0, parseInt(document.getElementById('qf-squad').value) || 0);
    q.capstone    = document.getElementById('qf-capstone').checked;
    q.published   = document.getElementById('pub-chk').checked;
    q.pre = {
      skills: selValues('qf-skills'),
      tools:  selValues('qf-tools'),
      lang:   selValues('qf-lang'),
      gold:   parseInt(document.getElementById('qf-gold').value) || 0
    };
    q._custom   = true;
    q._editable = true;
    saveQuest(q).then(function() { renderList(); showQuestForm(setId, idx); });
  };

  document.getElementById('qf-del').onclick = function() {
    if (prompt('Type DELETE to confirm removing "' + q.title + '"') !== 'DELETE') {
      alert('Cancelled.');
      return;
    }
    deleteQuest(q);
  };
}

// ══════════════════════════════════════════════════
// NEW ITEMS
// ══════════════════════════════════════════════════
function createNewCycle() {
  var id = 'custom-' + Date.now();
  var cycle = { id: id, name: 'New Cycle', theme: '', published: false };
  cycles.push(cycle);
  collapsed[id] = false;
  saveCycle(cycle).then(function() {
    sel = { kind: 'cycle', setId: id };
    renderList();
    showCycleForm(id);
  });
}

function createNewQuest(setId) {
  var cycleQuests = quests.filter(function(q) { return q.setId === setId; });
  var maxIdx = cycleQuests.reduce(function(m, q) { return Math.max(m, q.idx || 0); }, -1);
  var q = {
    setId: setId, idx: maxIdx + 1,
    title: '', desc: '',
    type: 'combat', difficulty: 'standard',
    baseGp: 40, terrain: 'none', squadReqMin: 0,
    capstone: false, published: false,
    _custom: true, _editable: true,
    pre: { skills: [], tools: [], lang: [], gold: 0 }
  };
  quests.push(q);
  collapsed[setId] = false;
  sel = { kind: 'quest', setId: setId, idx: q.idx };
  renderList();
  showQuestForm(setId, q.idx);
}

// ══════════════════════════════════════════════════
// FORM HELPERS
// ══════════════════════════════════════════════════
function frow(label, input) {
  return '<div class="frow"><label class="flbl">' + label + '</label>' + input + '</div>';
}
function pubRow(isPublished) {
  return '<div id="pub-row">' +
    '<input type="checkbox" id="pub-chk"' + (isPublished ? ' checked' : '') + '>' +
    '<label id="pub-label" for="pub-chk">' +
    '<span>' + (isPublished ? '✅ Published' : '⬜ Unpublished') + '</span>' +
    ' — ' + (isPublished ? 'Visible to players' : 'Dev only (draft)') +
    '</label></div>';
}
function typeSelect(id, val) {
  return selEl(id, ['combat','social','explore','wonder'], val);
}
function diffSelect(id, val) {
  return selEl(id, ['easy','standard','hard','deadly'], val);
}
function terrainSelect(id, val) {
  return selEl(id, ['none','mountain','forest','coastal','arctic','desert','swamp','urban','underdark'], val);
}
function selEl(id, opts, val) {
  return '<select id="' + id + '">' +
    opts.map(function(o) {
      return '<option value="' + o + '"' + (o === val ? ' selected' : '') + '>' + o + '</option>';
    }).join('') + '</select>';
}
function multiSelect(id, opts, selected) {
  var sel = selected || [];
  return '<select id="' + id + '" multiple>' +
    opts.map(function(o) {
      return '<option value="' + esc(o) + '"' + (sel.indexOf(o) !== -1 ? ' selected' : '') + '>' + esc(o) + '</option>';
    }).join('') + '</select>';
}
function selValues(id) {
  var el = document.getElementById(id);
  if (!el) return [];
  return Array.from(el.selectedOptions).map(function(o) { return o.value; });
}

// ══════════════════════════════════════════════════
// DUPLICATE CYCLE
// ══════════════════════════════════════════════════
function showDupeForm() {
  sel = null;
  renderList();

  // allSrcCycles not yet built here; just check we have something
  if (!cycles.length && !BUILTIN_QUESTSETS.length) {
    document.getElementById('form-inner').innerHTML =
      '<div id="placeholder">No cycles yet — create one first.</div>';
    return;
  }

  // Working order state: srcId → [idx, idx, ...]
  var order = [];
  // Will be set after allSrcCycles is built; placeholder for closure
  var srcId = '';

  function getCycleQuests(id) {
    var cq = quests.filter(function(q) { return q.setId === id; });
    if (cq.length) return cq.sort(function(a,b){return (a.idx||0)-(b.idx||0);});
    var bs = BUILTIN_QUESTSETS.filter(function(s){return s.id===id;})[0];
    return bs ? (bs.quests||[]).slice() : [];
  }
  function getOrder(id) {
    return getCycleQuests(id).map(function(q) { return q.idx; });
  }

  function renderOrderList() {
    var listEl = document.getElementById('dupe-list');
    if (!listEl) return;
    if (!order.length) {
      listEl.innerHTML = '<div class="dupe-row" style="justify-content:center;color:var(--ink2);font-style:italic;font-size:.85em">No quests in this cycle</div>';
      return;
    }
    var cq = getCycleQuests(srcId);
    var typeIcons = { combat: '⚔', social: '🗣', explore: '🗺', wonder: '✨' };
    listEl.innerHTML = order.map(function(idx, pos) {
      var q = cq.filter(function(x) { return x.idx === idx; })[0];
      if (!q) return '';
      return '<div class="dupe-row">' +
        '<span class="dupe-pos">' + (pos + 1) + '</span>' +
        '<span class="dupe-title">' + (q.capstone ? '⭐ ' : '') + esc(q.title || '(untitled)') + '</span>' +
        '<span class="dupe-type">' + (typeIcons[q.type] || '') + '</span>' +
        '<div class="dupe-mvs">' +
        '<button class="dupe-mv" data-pos="' + pos + '" data-dir="-1"' + (pos === 0 ? ' disabled' : '') + '>▲</button>' +
        '<button class="dupe-mv" data-pos="' + pos + '" data-dir="1"' + (pos === order.length - 1 ? ' disabled' : '') + '>▼</button>' +
        '</div></div>';
    }).join('');

    // Wire move buttons
    listEl.onclick = function(e) {
      var btn = e.target.closest('.dupe-mv');
      if (!btn || btn.disabled) return;
      var pos = parseInt(btn.getAttribute('data-pos'), 10);
      var dir = parseInt(btn.getAttribute('data-dir'), 10);
      var np  = pos + dir;
      if (np < 0 || np >= order.length) return;
      var tmp = order[pos]; order[pos] = order[np]; order[np] = tmp;
      renderOrderList();
    };
  }

  function onSrcChange() {
    srcId = document.getElementById('dupe-src').value;
    var newOrder = getOrder(srcId);
    order.splice(0, order.length);
    newOrder.forEach(function(v) { order.push(v); });
    var srcCycle = cycles.filter(function(c) { return c.id === srcId; })[0];
    if (srcCycle) {
      var nameEl = document.getElementById('dupe-name');
      if (nameEl && !nameEl.value.trim()) {
        nameEl.value = srcCycle.name + ' (copy)';
      }
    }
    renderOrderList();
  }

  // Merge built-in and custom cycles for the source dropdown
  var allSrcCycles = BUILTIN_QUESTSETS.concat(
    cycles.filter(function(c) {
      return !BUILTIN_QUESTSETS.some(function(b){return b.id===c.id;});
    })
  );
  var srcOptions = allSrcCycles.map(function(c) {
    var cq = getCycleQuests(c.id);
    return '<option value="' + esc(c.id) + '">' + esc(c.name) +
      ' (' + cq.length + ' quest' + (cq.length !== 1 ? 's' : '') + ')</option>';
  }).join('');

  var fi = document.getElementById('form-inner');
  fi.innerHTML =
    '<div id="form-title-row">' +
    '<div id="form-heading">⧉ Duplicate Cycle</div>' +
    '</div>' +

    '<p style="font-size:.88em;color:var(--ink2);margin-bottom:18px;line-height:1.6">' +
    'Creates a copy of an existing cycle with all its quests. You can reorder the quests before creating. ' +
    'The original is unchanged — the copy is saved as a private draft.</p>' +

    '<div class="fsec">' +
    '<div class="fsec-title">Source</div>' +
    '<div class="fgrid">' +
    frow('Copy From', '<select id="dupe-src">' + srcOptions + '</select>') +
    '</div></div>' +

    '<div class="fsec">' +
    '<div class="fsec-title">New Cycle Identity</div>' +
    '<div class="fgrid">' +
    frow('New Cycle Name *', '<input type="text" id="dupe-name" placeholder="e.g. Shadows Rising">') +
    '</div>' +
    '<div class="fgrid" style="margin-top:10px">' +
    frow('Theme / Description', '<textarea id="dupe-theme" rows="2" placeholder="Describe this cycle&#39;s arc…"></textarea>') +
    '</div></div>' +

    '<div class="fsec">' +
    '<div class="fsec-title">Quest Order <span class="select-hint">(▲▼ to reorder — only affects the copy)</span></div>' +
    '<div class="dupe-list-wrap"><div id="dupe-list"></div></div>' +
    '</div>' +

    '<div id="action-row">' +
    '<button class="btn btn-save" id="dupe-create">⧉ Create Copy</button>' +
    '<span id="save-flash"></span>' +
    '</div>';

  // Wire source dropdown
  document.getElementById('dupe-src').onchange = onSrcChange;

  // Wire create button
  document.getElementById('dupe-create').onclick = function() {
    var name  = (document.getElementById('dupe-name').value || '').trim();
    var theme = (document.getElementById('dupe-theme').value || '').trim();
    if (!name) { alert('Please enter a name for the new cycle.'); return; }
    if (!order.length) { alert('The source cycle has no quests to copy.'); return; }

    var srcCycle = allSrcCycles.filter(function(c) { return c.id === srcId; })[0];
    var srcQuests = getCycleQuests(srcId);

    var newId = 'custom-' + Date.now();
    var newCycle = {
      id:        newId,
      name:      name,
      theme:     theme || ('Duplicated from "' + (srcCycle ? srcCycle.name : srcId) + '"'),
      published: false,
      cycleGate: {}
    };

    // Build new quests with reassigned idx values (0, 1, 2…)
    var newQuests = [];
    order.forEach(function(srcIdx, newIdx) {
      var srcQ = srcQuests.filter(function(q) { return q.idx === srcIdx; })[0];
      if (!srcQ) return;
      newQuests.push(Object.assign({}, srcQ, {
        setId:     newId,
        idx:       newIdx,
        _custom:   true,
        _editable: true,
        published: false,
        // Preserve capstone flag only if it was capstone AND it's still last
        capstone:  srcQ.capstone && newIdx === order.length - 1
      }));
    });

    // Update local state immediately
    cycles.push(newCycle);
    newQuests.forEach(function(q) { quests.push(q); });
    collapsed[newId] = false;

    // Save to Supabase: cycle row first, then all quest rows
    var cycleRow = cycleToRow(newCycle, cycles.length - 1);
    var questRows = newQuests.map(function(q, i) { return questToRow(q, i); });

    setStatus('Saving…');
    var btn = document.getElementById('dupe-create');
    btn.disabled = true;
    btn.textContent = 'Creating…';

    sbUpsert(cycleRow).then(function() {
      if (!questRows.length) return true;
      return sbUpsert(questRows);
    }).then(function() {
      sel = { kind: 'cycle', setId: newId };
      flash('✓ "' + name + '" created with ' + newQuests.length + ' quest' + (newQuests.length !== 1 ? 's' : '') + '');
      setStatus('Cycle "' + name + '" created with ' + newQuests.length + ' quests.');
      renderList();
      showCycleForm(newId);
    }).catch(function(err) {
      btn.disabled = false;
      btn.textContent = '⧉ Create Copy';
      alert('Save failed: ' + (err.message || err));
      setStatus('Save failed: ' + (err.message || err), '#e55');
    });
  };

  // Initialize with first available cycle
  srcId = allSrcCycles.length ? allSrcCycles[0].id : '';
  if (srcId) {
    getOrder(srcId).forEach(function(v) { order.push(v); });
    document.getElementById('dupe-name').value = allSrcCycles[0].name + ' (copy)';
    document.getElementById('dupe-src').value = srcId;
  }
  renderOrderList();
}
