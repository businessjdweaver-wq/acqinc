<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="RQ Training">
  <meta name="theme-color" content="#2d4f48">
  <title>Relentless Quest Training Hall v0.1.13</title>
  <link rel="stylesheet" href="./training.css?v=0.1.13">
</head>
<body>
  <header class="topbar">
    <button id="backToRq" class="ghost">← RQ</button>
    <div><h1>Training Hall</h1><p id="authLine">Checking session…</p></div>
    <div class="top-actions"><span class="version-badge" id="versionBadge">v0.1.13</span><button id="syncBtn" class="ghost">Sync</button></div>
  </header>

  <main id="app">
    <section id="today" class="panel"></section>
    <nav class="tabs" aria-label="Training sections">
      <button data-tab="workout" class="active">Workout</button>
      <button data-tab="routine">Routine</button>
      <button data-tab="library">Library</button>
      <button data-tab="history">History</button>
      <button data-tab="body">Body Log</button>
    </nav>
    <section id="tab-workout" class="tab-panel"></section>
    <section id="tab-routine" class="tab-panel hidden"></section>
    <section id="tab-library" class="tab-panel hidden"></section>
    <section id="tab-history" class="tab-panel hidden"></section>
    <section id="tab-body" class="tab-panel hidden"></section>
  </main>

  <div id="toast" role="status" aria-live="polite"></div>
  <audio id="beep" preload="auto"></audio>
  <script src="./training-data.js?v=0.1.13"></script>
  <script src="./training-sounds.js?v=0.1.13"></script>
  <script src="./training.js?v=0.1.13"></script>
</body>
</html>
